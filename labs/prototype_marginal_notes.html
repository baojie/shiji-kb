不測之謂神」，《書》云「人惟萬物之靈」，故謂之神靈也。"}],"sentence_id":"s002"},{"id":"n006","anchor_text":"幼而徇齊，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「《墨子》曰『年踰十五，則聰明心慮無不徇通矣』。」駰案：徇，疾；齊，速也。言聖德幼而疾速也。"},{"source":"suoyin","label":"索隱","text":"斯文未是。今案：徇，齊，皆德也。《書》曰「聰明齊聖」，《左傳》曰「子雖齊聖」，謂聖德齊肅也。又案：《孔子家語》及《大戴禮》並作「叡齊」，一本作「慧齊」。叡，慧，皆智也。太史公採《大戴禮》而爲此紀，今彼文無作「徇」者。《史記》舊本亦有作「濬齊」。蓋古字假借「徇」爲「濬」，濬，深也，義亦並通。《爾雅》「齊」「速」俱訓爲疾。《尚書大傳》曰「多聞而齊給」。鄭注云「齊，疾也」。今裴氏注云徇亦訓疾，未見所出。或當讀「徇」爲「迅」，迅於《爾雅》與齊俱訓疾，則迅濬雖異字，而音同也。又《爾雅》曰「宣，徇，遍也。濬，通也」。是「遍」之與「通」義亦相近。言黃帝幼而才智周徧，且辯給也。故《墨子》亦云「年踰五十，則聰明心慮不徇通矣」。俗本作「十五」，非是。案：謂年老踰五十不聰明，何得云「十五」？"}],"sentence_id":"s002"},{"id":"n007","anchor_text":"長而敦敏，成而聰明。","items":[{"source":"zhengyi","label":"正義","text":"成謂二十冠，成人也。聰明，聞見明辯也。此以上至「軒轅」，皆《大戴禮》文。"}],"sentence_id":"s002"},{"id":"n008","anchor_text":"軒轅之時，神農氏世衰。","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「《易》稱庖犧氏沒，神農氏作，是爲炎帝。」班固曰：「教民耕農，故號曰神農。」"},{"source":"suoyin","label":"索隱","text":"世衰，謂神農氏後代子孫道德衰薄，非指炎帝之身，即班固所謂「參盧」，皇甫謐所云「帝榆罔」是也。"},{"source":"zhengyi","label":"正義","text":"《帝王世紀》云：「神農氏，姜姓也。母曰任姒，有蟜氏女，登爲少典妃，遊華陽，有神龍首，感生炎帝。人身牛首，長於姜水。有聖德，以火德王，故號炎帝。初都陳，又徙魯。又曰魁隗氏，又曰連山氏，又曰列山氏。」《括地志》云：「厲山在隨州隨縣北百里，山東有石穴。（曰）〔昔〕神農生於厲鄉，所謂列山氏也。春秋時爲厲國。」"}],"sentence_id":"s003"},{"id":"n009","anchor_text":"氏弗能征。於是軒轅乃習用干戈，以征不享，","items":[{"source":"suoyin","label":"索隱","text":"謂用干戈以征諸侯之不朝享者。本或作「亭」，亭訓直，以征諸侯之不直者。"}],"sentence_id":"s005"},{"id":"n010","anchor_text":"諸侯咸來賓從。而蚩尤最爲暴，莫能伐。","items":[{"source":"jijie","label":"集解","text":"應劭曰：「蚩尤，古天子。」瓚曰：「《孔子三朝記》曰『蚩尤，庶人之貪者』。」"},{"source":"suoyin","label":"索隱","text":"案：此紀云「諸侯相侵伐，蚩尤最爲暴」，則蚩尤非爲天子也。又《管子》曰「蚩尤受盧山之金而作五兵」，明非庶人，蓋諸侯號也。劉向《別錄》云「孔子見魯哀公問政，比三朝，退而爲此記，故曰《三朝》。凡七篇，並入《大戴記》」。今此注見《用兵篇》也。"},{"source":"zhengyi","label":"正義","text":"《龍魚河圖》云：「黃帝攝政，有蚩尤兄弟八十一人，並獸身人語，銅頭鐵額，食沙石子，造立兵仗刀戟大弩，威振天下，誅殺無道，不慈仁。萬民欲令黃帝行天子事，黃帝以仁義不能禁止蚩尤，乃仰天而歎。天遣玄女下授黃帝兵信神符，制伏蚩尤，帝因使之主兵，以制八方。蚩尤沒後，天下復擾亂，黃帝遂畫蚩尤形像以威天下，天下咸謂蚩尤不死，八方萬邦皆爲弭服。」《山海經》云：「黃帝令應龍攻蚩尤。蚩尤請風伯、雨師以從，大風雨。黃帝乃下天女曰『魃』，以止雨。雨止，遂殺蚩尤。」孔安國曰「九黎君號蚩尤」是也。"}],"sentence_id":"s006"},{"id":"n011","anchor_text":"侵陵諸侯，諸侯咸歸軒轅。軒轅乃修德振兵，","items":[{"source":"zhengyi","label":"正義","text":"振，整也。"}],"sentence_id":"s007"},{"id":"n012","anchor_text":"治五氣，","items":[{"source":"jijie","label":"集解","text":"王肅曰：「五行之氣。」"},{"source":"suoyin","label":"索隱","text":"謂春甲乙木氣，夏丙丁火氣之屬，是五氣也。"}],"sentence_id":"s008"},{"id":"n013","anchor_text":"蓺五種，","items":[{"source":"jijie","label":"集解","text":"駰案：蓺，樹也。《詩》云「蓺之荏菽」。《周禮》曰「榖宜五種」。鄭玄曰「五種，黍、稷、菽、麥、稻也」。"},{"source":"suoyin","label":"索隱","text":"藝，種也，樹也。五種即五穀也，音朱用反。此注所引見《詩大雅生民》之篇。《爾雅》云「荏菽，戎菽」也，郭璞曰「今之胡豆」，鄭氏曰「豆之大者」是也。"},{"source":"zhengyi","label":"正義","text":"蓺音魚曳反。種音腫。"}],"sentence_id":"s008"},{"id":"n014","anchor_text":"撫萬民，度四方，","items":[{"source":"jijie","label":"集解","text":"王肅曰：「度四方而安撫之。」"},{"source":"zhengyi","label":"正義","text":"度音徒洛反。"}],"sentence_id":"s008"},{"id":"n015","anchor_text":"教熊羆貔貅貙虎，","items":[{"source":"suoyin","label":"索隱","text":"《書》云「如虎如貔」，《爾雅》云「貔，白狐」，《禮》曰「前有摯獸，則載貔貅」是也。《爾雅》又曰「貙獌似貍」。此六者猛獸，可以教戰。《周禮》有服不氏，掌教擾猛獸。即古服牛乘馬，亦其類也。"},{"source":"zhengyi","label":"正義","text":"熊音雄。羆音碑。膍音毗。貅音休。貙音丑于反。羆如熊，黃白色。郭璞云：「貔，執夷，虎屬也。」案：言教士卒習戰，以猛獸之名名之，用威敵也。"}],"sentence_id":"s008"},{"id":"n016","anchor_text":"以與炎帝戰於阪泉之野。","items":[{"source":"jijie","label":"集解","text":"服虔曰：「阪泉，地名。」皇甫謐曰：「在上谷。」"},{"source":"zhengyi","label":"正義","text":"阪音白板反。《括地志》云：「阪泉，今名黃帝泉，在嬀州懷戎縣東五十六里。出五里至涿鹿東北，與涿水合。又有涿鹿故城，在嬀州東南五十里，本黃帝所都也。《晉太康地里志》云『涿鹿城東一里有阪泉，上有黃帝祠』。」案：阪泉之野則平野之地也。"}],"sentence_id":"s008"},{"id":"n017","anchor_text":"三戰，然後得其志。","items":[{"source":"zhengyi","label":"正義","text":"謂黃帝克炎帝之後。"}],"sentence_id":"s009"},{"id":"n018","anchor_text":"蚩尤作亂，不用帝命。","items":[{"source":"zhengyi","label":"正義","text":"言蚩尤不用黃帝之命也。"}],"sentence_id":"s010"},{"id":"n019","anchor_text":"於是黃帝乃徵師諸侯，與蚩尤戰於涿鹿之野，","items":[{"source":"jijie","label":"集解","text":"服虔曰：「涿鹿，山名，在涿郡。」張晏曰：「涿鹿在上谷。」"},{"source":"suoyin","label":"索隱","text":"或作「濁鹿」，古今字異耳。案：《地理志》上谷有涿鹿縣，然則服虔云「在涿郡」者，誤也。"}],"sentence_id":"s011"},{"id":"n020","anchor_text":"遂禽殺蚩尤。","items":[{"source":"jijie","label":"集解","text":"《皇覽》曰：「蚩尤冢在東平郡壽張縣闞鄉城中，高七丈，民常十月祀之。有赤氣出，如匹絳帛，民名爲蚩尤旗。肩髀冢在山陽郡鉅野縣重聚，大小與闞冢等。傳言黃帝與蚩尤戰於涿鹿之野，黃帝殺之，身體異處，故別葬之。」"},{"source":"suoyin","label":"索隱","text":"案：皇甫謐云「黃帝使應龍殺蚩尤于凶黎之谷」。或曰，黃帝斬蚩尤于中冀，因名其地曰「絕轡之野。」注「皇覽」，書名也。記先代冢墓之處，宜皇王之省覽，故日《皇覽》。是魏人王象、繆襲等所撰也。"}],"sentence_id":"s011"},{"id":"n021","anchor_text":"。天下有不順者，黃帝從而征之，平者去之，","items":[{"source":"zhengyi","label":"正義","text":"平服者即去之。"}],"sentence_id":"s013"},{"id":"n022","anchor_text":"披山通道，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「披，他本亦作『陂』。字蓋當音詖，陂者旁其邊之謂也。披語誠合今世，然古今不必同也。」"},{"source":"suoyin","label":"索隱","text":"披音如字，謂披山林草木而行以通道也。徐廣音詖，恐稍紆也。"}],"sentence_id":"s013"},{"id":"n023","anchor_text":"東至于海，登丸山，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「丸，一作『凡』。」駰案：《地理志》曰丸山在郎邪朱虛縣。"},{"source":"suoyin","label":"索隱","text":"注「丸，一作『凡』」，凡音扶嚴反。"},{"source":"zhengyi","label":"正義","text":"丸音桓。《括地志》云：「丸山即丹山，在青州臨朐縣界朱虛故縣西北二十里，丹水出焉。」丸音紈。守節案：《地志》唯有凡山，蓋凡山丸山是一山耳。諸處字誤，或「丸」或「凡」也。《漢書郊祀志》云「禪丸山」，顏師古云「在朱虛」，亦與《括地志》相合，明丸山是也。"}],"sentence_id":"s014"},{"id":"n024","anchor_text":"及岱宗。","items":[{"source":"zhengyi","label":"正義","text":"泰山，東岳也。在兗州博城縣西北三十里也。"}],"sentence_id":"s014"},{"id":"n025","anchor_text":"西至于空桐，","items":[{"source":"jijie","label":"集解","text":"應劭曰：「山名。」韋昭曰：「在隴右。」"}],"sentence_id":"s015"},{"id":"n026","anchor_text":"登雞頭。","items":[{"source":"suoyin","label":"索隱","text":"山名也。後漢王孟塞雞頭道，在隴西。一曰崆峒山之別名。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「空桐山在肅州福祿縣東南六十里。《抱朴子內篇》云『黃帝西見中黃子，受九品之方，過空桐，從廣成子受自然之經』，即此山。」《括地志》又云：「笄頭山一名崆峒山，在原州平高縣西百里，《禹貢》涇水所出。《輿地志》云或即雞頭山也。酈元云蓋大隴山異名也。《莊子》云廣成子學道崆峒山，黃帝問道於廣成子，蓋在此。」案：二處崆峒皆云黃帝登之，未詳孰是。"}],"sentence_id":"s015"},{"id":"n027","anchor_text":"南至于江，登熊、湘。","items":[{"source":"jijie","label":"集解","text":"《封禪書》曰：「南伐至于召陵，登熊山。」《地理志》曰湘山在長沙益陽縣。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「熊耳山在商州上洛縣西十里，齊桓公登之以望江漢也。湘山一名艑山，在岳州巴陵縣南十八里也。」"}],"sentence_id":"s016"},{"id":"n028","anchor_text":"北逐葷粥，","items":[{"source":"jijie","label":"集解","text":"《匈奴傳》曰：「唐虞以上有山戎、獫狁、葷粥，居于北蠻。」"},{"source":"suoyin","label":"索隱","text":"匈奴別名也。唐虞已上曰山戎，亦曰熏粥，夏曰淳維，殷曰鬼方，周曰玁狁，漢曰匈奴。"},{"source":"zhengyi","label":"正義","text":"葷音薰。粥音育。"}],"sentence_id":"s017"},{"id":"n029","anchor_text":"合符釜山，","items":[{"source":"suoyin","label":"索隱","text":"合諸侯符契圭瑞，而朝之於釜山，猶禹會諸侯於塗山然也。又案：郭子橫《洞冥記》稱東方朔云「東海大明之墟有釜山，山出瑞雲，應王者之符命」，如堯時有赤雲之祥之類。蓋黃帝黃雲之瑞，故曰「合符應於釜山」也。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「釜山在嬀州懷戎縣北三里，山上有舜廟。」"}],"sentence_id":"s017"},{"id":"n030","anchor_text":"而邑于涿鹿之阿。","items":[{"source":"zhengyi","label":"正義","text":"廣平曰阿。涿鹿，山名，已見上。涿鹿故城在山下，即黃帝所都之邑於山下平地。"}],"sentence_id":"s017"},{"id":"n031","anchor_text":"遷徙往來無常處，以師兵爲營衞。","items":[{"source":"zhengyi","label":"正義","text":"環繞軍兵爲營以自衛，若轅門即其遺象。"}],"sentence_id":"s018"},{"id":"n032","anchor_text":"官名皆以雲命，爲雲師。","items":[{"source":"jijie","label":"集解","text":"應劭曰：「黃帝受命，有雲瑞，故以雲紀事也。春官爲青雲，夏官爲縉雲，秋官爲白雲，冬官爲黑雲，中官爲黃雲。」張晏曰：「黃帝有景雲之應，因以名師與官。」"}],"sentence_id":"s019"},{"id":"n033","anchor_text":"置左右大監，監于萬國。","items":[{"source":"zhengyi","label":"正義","text":"監，上監去聲，下監平聲。若周邵分陝也。"}],"sentence_id":"s020"},{"id":"n034","anchor_text":"萬國和，而鬼神山川封禪與爲多焉。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「多，一作『朋』。」"},{"source":"suoyin","label":"索隱","text":"與音羊汝反。與猶許也。言萬國和同，而鬼神山川封禪祭祀之事，自古以來帝皇之中，推許黃帝以爲多。多猶大也。"}],"sentence_id":"s021"},{"id":"n035","anchor_text":"獲寶鼎，迎日推筴。","items":[{"source":"jijie","label":"集解","text":"晉灼曰：「策，數也，迎數之也。」瓚曰：「日月朔望未來而推之，故曰迎日。」"},{"source":"suoyin","label":"索隱","text":"《封禪書》曰「黃帝得寶鼎神策」，下云「於是推策迎日」，則神策者，神蓍也。黃帝得蓍以推筭曆數，於是逆知節氣日辰之將來，故曰推策迎日也。"},{"source":"zhengyi","label":"正義","text":"筴音策。迎，逆也。黃帝受神筴，命大撓造甲子，容成造曆是也。"}],"sentence_id":"s022"},{"id":"n036","anchor_text":"舉風后、力牧、常先、大鴻","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「風后，黃帝三公也。」班固曰：「力牧，黃帝相也。」大鴻，見《封禪書》。"},{"source":"zhengyi","label":"正義","text":"舉，任用。四人皆帝臣也。《帝王世紀》云：「黃帝夢大風吹天下之塵垢皆去，又夢人執千鈞之弩，驅羊萬羣。帝寤而歎曰：『風爲號令，執政者也。垢去土，后在也。天下豈有姓風名后者哉？夫千鈞之弩，異力者也。驅羊數萬羣，能牧民爲善者也，天下豈有姓力名牧者哉？』於是依二占而求之，得風后於海隅，登以爲相。得力牧於大澤，進以爲將。黃帝因著《占夢經》十一卷。」《藝文志》云：「《風后兵法》十三篇，圖二卷，《孤虛》二十卷，《力牧兵法》十五篇。」鄭玄云：「風后，黃帝之三公也。」案：黃帝仰天地置列侯眾官，以風后配上台，天老配中台，五聖配下台，謂之三公也。《封禪書》云「鬼臾區號大鴻，黃帝大臣也。死葬雍，故鴻冢是」。《藝文志》云「鬼容區兵法三篇」也。"}],"sentence_id":"s023"},{"id":"n037","anchor_text":"以治民。順天地之紀，","items":[{"source":"zhengyi","label":"正義","text":"言黃帝順天地陰陽四時之紀也。"}],"sentence_id":"s024"},{"id":"n038","anchor_text":"幽明之占，","items":[{"source":"zhengyi","label":"正義","text":"幽，陰；明，陽也。占，數也。言陰陽五行，黃帝占數而知之。此文見《大戴禮》。"}],"sentence_id":"s024"},{"id":"n039","anchor_text":"死生之說，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一云『幽明之數，合死生之說』。」"},{"source":"zhengyi","label":"正義","text":"說謂儀制也。民之生死。此謂作儀制禮則之說。"}],"sentence_id":"s024"},{"id":"n040","anchor_text":"存亡之難。","items":[{"source":"suoyin","label":"索隱","text":"存亡猶安危也。《易》曰「危者安其位，亡者保其存」是也。難猶說也。凡事是非未盡，假以往來之詞，則曰難。又上文有「死生之說」，故此云「存亡之難」，所以韓非著書有說林、說難也。"},{"source":"zhengyi","label":"正義","text":"難音乃憚反。存亡猶生死也。黃帝之前，未有衣裳屋宇。及黃帝造屋宇，制衣服，營殯葬，萬民故免存亡之難。"}],"sentence_id":"s024"},{"id":"n041","anchor_text":"時播百穀草木，","items":[{"source":"jijie","label":"集解","text":"王肅曰：「時，是也。」"},{"source":"suoyin","label":"索隱","text":"爲一句。"},{"source":"zhengyi","label":"正義","text":"言順四時之所宜而布種百穀草木也。"}],"sentence_id":"s025"},{"id":"n042","anchor_text":"淳化鳥獸蟲蛾，","items":[{"source":"suoyin","label":"索隱","text":"爲一句。蛾音牛綺反。一作「豸」。（豸）言淳化廣被及之。"},{"source":"zhengyi","label":"正義","text":"蛾音魚起反。又音豸，豸音直氏反。蟻，蚍蜉也。《爾雅》曰：「有足曰蟲，無足曰豸。」"}],"sentence_id":"s025"},{"id":"n043","anchor_text":"旁羅日月星辰水波","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一作『沃』。」"}],"sentence_id":"s025"},{"id":"n044","anchor_text":"土石金玉，","items":[{"source":"suoyin","label":"索隱","text":"旁，非一方。羅，廣布也。今案：《大戴禮》作「歷離」。離即羅也。言帝德旁羅日月星辰水波，及至土石金玉。謂日月揚光，海水不波，山不藏珍，皆是帝德廣被也。"},{"source":"zhengyi","label":"正義","text":"旁羅猶遍布也。日月，陰陽時節也。星，二十八宿也。辰，日月所會也。水波，瀾漪也。言天不異災，土無別害，水少波浪，山出珍寶。"}],"sentence_id":"s025"},{"id":"n045","anchor_text":"勞勤心力耳目，節用水火材物。","items":[{"source":"zhengyi","label":"正義","text":"節，時節也。水，陂障決洩也。火，山野禁放也。材，木也。物，事也。言黃帝教民，江湖陂澤山林原隰皆收採禁捕以時，用之有節，令得其利也。《大戴禮》云「宰我問於孔子曰：『予聞榮伊曰黃帝三百年。請問黃帝者人耶？何以至三百年？。』」孔子曰：『勞勤心力耳目，節用水火材物，生而民得其利百年，死而民畏其神百年，亡而民用其教百年，故曰三百年也。』」"}],"sentence_id":"s025"},{"id":"n046","anchor_text":"有土德之瑞，故號黃帝。","items":[{"source":"suoyin","label":"索隱","text":"炎帝火，黃帝土代之，即「黃龍地螾見」是也。螾，土精，大五六圍，長十餘丈。螾音引。"},{"source":"zhengyi","label":"正義","text":"螾音以刃反。"}],"sentence_id":"s026"},{"id":"n047","anchor_text":"黃帝二十五子，其得姓者十四人。","items":[{"source":"suoyin","label":"索隱","text":"舊解破四爲三，言得姓十三人耳。今案：《國語》胥臣云「黃帝之子二十五宗，其得姓者十四人，爲十二姓，姬、酉、祁、己、滕、葴、任、荀、僖、姞、儇、衣是也。唯青陽與夷鼓同己姓」。又云「青陽與蒼林爲姬姓」。是則十四人爲十二姓，其文甚明。唯姬姓再稱青陽與蒼林，蓋《國語》文誤，所以致令前儒共疑。其姬姓青陽當爲玄囂，是帝嚳祖本與黃帝同姬姓。其《國語》上文青陽，即是少昊金天氏爲己姓者耳。既理在不疑，無煩破四爲三。"}],"sentence_id":"s027"},{"id":"n048","anchor_text":"黃帝居軒轅之丘，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「受國於有熊，居軒轅之丘，故因以爲名，又以爲號。《山海經》曰『在窮山之際，西射之南』。」張晏曰：「作軒冕之服，故謂之軒轅。」"}],"sentence_id":"s028"},{"id":"n049","anchor_text":"而娶於西陵之女，","items":[{"source":"zhengyi","label":"正義","text":"西陵，國名也。"}],"sentence_id":"s028"},{"id":"n050","anchor_text":"是爲嫘祖。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「祖，一作『俎』。嫘，力追反。」"},{"source":"suoyin","label":"索隱","text":"一曰雷祖，音力堆反。"},{"source":"zhengyi","label":"正義","text":"一作「傫」。"}],"sentence_id":"s028"},{"id":"n051","anchor_text":"嫘祖爲黃帝正妃，","items":[{"source":"suoyin","label":"索隱","text":"案：黃帝立四妃，象后妃四星。皇甫謐云：「元妃西陵氏女，曰累祖，生昌意。次妃方雷氏女，曰女節，生青陽。次妃彤魚氏女，生夷鼓，一名蒼林。次妃嫫母，班在三人之下。」案：《國語》夷鼓、蒼林是二人。又案：《漢書古今人表》彤魚氏生夷鼓，嫫母生蒼林，不得如謐所說。太史公乃據《大戴禮》，以累祖生昌意及玄囂，玄囂即青陽也。皇甫謐以青陽爲少昊，乃方雷氏所生，是其所見異也。"}],"sentence_id":"s029"},{"id":"n052","anchor_text":"子，其後皆有天下：其一曰玄囂，是爲青陽，","items":[{"source":"suoyin","label":"索隱","text":"玄囂，帝嚳之祖。案：皇甫謐及宋衷皆云玄囂青陽即少昊也。今此紀下云「玄囂不得在帝位」，則太史公意青陽非少昊明矣。而此又云「玄囂是爲青陽」，當是誤也。謂二人皆黃帝子，並列其名，所以前史因誤以玄囂青陽爲一人耳。宋衷又云：「玄囂青陽是爲少昊，繼黃帝立者，而史不敍，蓋少昊金德王，非五運之次，故敍五帝不數之也。」"}],"sentence_id":"s029"},{"id":"n053","anchor_text":"青陽降居江水；","items":[{"source":"zhengyi","label":"正義","text":"《括地志》云：「安陽故城在豫州新息縣西南八十里。應劭云古江國也。《地理志》亦云安陽古江國也。」"}],"sentence_id":"s029"},{"id":"n054","anchor_text":"其二曰昌意，降居若水。","items":[{"source":"suoyin","label":"索隱","text":"降，下也。言帝子爲諸侯，降居江水、〔若水〕。江水、若水皆在蜀，即所封國也。《水經》曰「水出旄牛徼外，東南至故關爲若水，南過邛都，又東北至朱提縣爲盧江水」，是蜀有此二水也。"}],"sentence_id":"s029"},{"id":"n055","anchor_text":"蜀山氏女，曰昌僕，生高陽，高陽有聖悳焉。","items":[{"source":"zhengyi","label":"正義","text":"華陽國志及《十三州志》云：「蜀之先肇於人皇之際。黃帝爲子昌意娶蜀山氏，後子孫因封焉。帝顓頊高陽氏，黃帝之孫，昌意之子，母曰昌僕，亦謂之女樞。」《河圖》云：「瑤光如蜺貫月，正白，感女樞於幽房之宮，生顓頊，首戴干戈，有德文也。」"}],"sentence_id":"s030"},{"id":"n056","anchor_text":"黃帝崩，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「在位百年而崩，年百一十一歲。」"},{"source":"suoyin","label":"索隱","text":"案：《大戴禮》「宰我問孔子曰：『榮伊言黃帝三百年，請問黃帝何人也？抑非人也？何以至三百年乎？』對曰：『生而人得其利百年，死而人畏其神百年，亡而人用其教百年。』」則士安之說略可憑矣。"},{"source":"zhengyi","label":"正義","text":"《列仙傳》云：「軒轅自擇亡日與羣臣辭。還葬橋山，山崩，棺空，唯有劍舄在棺焉。」"}],"sentence_id":"s031"},{"id":"n057","anchor_text":"葬橋山。","items":[{"source":"jijie","label":"集解","text":"《皇覽》曰：「黃帝冢在上郡橋山。」"},{"source":"suoyin","label":"索隱","text":"《地理志》橋山在上郡陽周縣，山有黃帝冢也。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「黃帝陵在寧州羅川縣東八十里子午山。《地理志》云上郡陽周縣橋山南有黃帝冢。」案：陽周，隋改爲羅川。《爾雅》云山銳而高曰橋也。」"}],"sentence_id":"s031"},{"id":"n058","anchor_text":"帝顓頊高陽者，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「都帝丘，今東郡濮陽是也。」"},{"source":"suoyin","label":"索隱","text":"宋衷云：「顓頊，名；高陽，有天下號也。」張晏云：「高陽者，所興地名也。」"}],"sentence_id":"s033"},{"id":"n059","anchor_text":"也。靜淵以有謀，疏通而知事；養材以任地，","items":[{"source":"suoyin","label":"索隱","text":"言能養材物以任地。《大戴禮》作「養財」。"}],"sentence_id":"s034"},{"id":"n060","anchor_text":"載時","items":[{"source":"suoyin","label":"索隱","text":"載，行也。言行四時以象天。《大戴禮》作「履時以象天」。履亦踐而行也。"}],"sentence_id":"s034"},{"id":"n061","anchor_text":"以象天，依鬼神以制義，","items":[{"source":"suoyin","label":"索隱","text":"鬼神聰明正直，當盡心敬事，因制尊卑之義，故《禮》曰「降于祖廟之謂仁義」是也。"},{"source":"zhengyi","label":"正義","text":"鬼之靈者曰神也。鬼神謂山川之神也。能興雲致雨，潤養萬物也，故己依馮之剬義也。剬，古制字。"}],"sentence_id":"s034"},{"id":"n062","anchor_text":"治氣","items":[{"source":"suoyin","label":"索隱","text":"謂理四時五行之氣以教化萬人也。"}],"sentence_id":"s034"},{"id":"n063","anchor_text":"以教化，絜誠以祭祀。北至于幽陵，","items":[{"source":"zhengyi","label":"正義","text":"幽州也。"}],"sentence_id":"s034"},{"id":"n064","anchor_text":"南至于交阯，","items":[{"source":"zhengyi","label":"正義","text":"阯音止，交州也。"}],"sentence_id":"s035"},{"id":"n065","anchor_text":"西至于流沙，","items":[{"source":"jijie","label":"集解","text":"《地理志》曰流沙在張掖居延縣。"},{"source":"zhengyi","label":"正義","text":"濟，渡也。《括地志》云：「居延海南，甘州張掖縣東北千六十四里是。」"}],"sentence_id":"s035"},{"id":"n066","anchor_text":"東至于蟠木。","items":[{"source":"jijie","label":"集解","text":"海外經曰：「東海中有山焉，名曰度索。上有大桃樹，屈蟠三千里。東北有門，名曰鬼門，萬鬼所聚也。天帝使神人守之，一名神荼，一名鬱壘，主閱領萬鬼。若害人之鬼，以葦索縛之，射以桃弧，投虎食也。」"}],"sentence_id":"s035"},{"id":"n067","anchor_text":"動靜之物，","items":[{"source":"zhengyi","label":"正義","text":"動物謂鳥獸之類，靜物謂草木之類。"}],"sentence_id":"s036"},{"id":"n068","anchor_text":"大小之神，","items":[{"source":"zhengyi","label":"正義","text":"大謂五嶽、四瀆，小謂丘陵墳衍。"}],"sentence_id":"s036"},{"id":"n069","anchor_text":"日月所照，莫不砥屬。","items":[{"source":"jijie","label":"集解","text":"王肅曰：「砥，平也。四遠皆平而來服屬。」"},{"source":"suoyin","label":"索隱","text":"依王肅音止蜀，據《大戴禮》作「砥礪」也。"}],"sentence_id":"s036"},{"id":"n070","anchor_text":"帝顓頊生子曰窮蟬。","items":[{"source":"suoyin","label":"索隱","text":"《系本》作「窮係」。宋衷云：「一云窮係，謚也。」"},{"source":"zhengyi","label":"正義","text":"帝舜之高祖也。"}],"sentence_id":"s037"},{"id":"n071","anchor_text":"顓頊崩，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「在位七十八年，年九十八。」《皇覽》曰：「顓頊冢在東郡濮陽頓丘城門外廣陽里中。頓丘者城門，名頓丘道。」"},{"source":"suoyin","label":"索隱","text":"皇甫謐云：「據左氏，歲在鶉火而崩，葬東郡。」又《山海經》曰：「顓頊葬鮒魚山之陽，九嬪葬其陰。」"}],"sentence_id":"s038"},{"id":"n072","anchor_text":"帝嚳高辛者，","items":[{"source":"jijie","label":"集解","text":"張晏曰：「少昊以前，天下之號象其德。顓頊以來，天下之號因其名。高陽、高辛皆所興之地名；顓頊與嚳皆以字爲號：上古質故也。」"},{"source":"suoyin","label":"索隱","text":"宋衷曰：「高辛地名，因以爲號。嚳，名也。」皇甫謐云：「帝嚳名夋也。」"},{"source":"zhengyi","label":"正義","text":"《帝王紀》云：「俈母無聞焉。」"}],"sentence_id":"s039"},{"id":"n073","anchor_text":"黃帝之曾孫也。高辛父曰蟜極，","items":[{"source":"zhengyi","label":"正義","text":"蟜音居兆反。本作「橋」，音同。又巨遙反。帝堯之祖也。"}],"sentence_id":"s039"},{"id":"n074","anchor_text":"。自玄囂與蟜極皆不得在位，至高辛即帝位。","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「都亳，今河南偃師是。」"}],"sentence_id":"s041"},{"id":"n075","anchor_text":"高辛生而神靈，自言其名。","items":[{"source":"zhengyi","label":"正義","text":"《帝王紀》云：「帝俈高辛，姬姓也。其母生見其神異，自言其名曰岌。齠齔有聖德，年十五而佐顓頊，三十登位，都亳，以人事紀官也。」"}],"sentence_id":"s043"},{"id":"n076","anchor_text":"用之，撫教萬民而利誨之，曆日月而迎送之，","items":[{"source":"zhengyi","label":"正義","text":"言作曆弦、望、晦、朔，日月未至而迎之，過而送之，上「迎日推策」是也。"}],"sentence_id":"s048"},{"id":"n077","anchor_text":"明鬼神而敬事之。","items":[{"source":"zhengyi","label":"正義","text":"天神曰神，人神曰鬼。又云聖人之精氣謂之神，賢人之精氣謂之鬼。言明識鬼神而敬事也。"}],"sentence_id":"s048"},{"id":"n078","anchor_text":"其色郁郁，其德嶷嶷。","items":[{"source":"suoyin","label":"索隱","text":"郁郁猶穆穆也。嶷嶷，德高也。今案：《大戴禮》「郁」作「神」，「嶷」作「俟」。"}],"sentence_id":"s049"},{"id":"n079","anchor_text":"其動也時，其服也士。","items":[{"source":"suoyin","label":"索隱","text":"舉動應天時，衣服服士服，言其公且廉也。"}],"sentence_id":"s050"},{"id":"n080","anchor_text":"帝嚳溉執中而徧天下，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「古『既』字作水旁。『徧』字一作『尹』。」"},{"source":"suoyin","label":"索隱","text":"即《尚書》「允執厥中」是也。"},{"source":"zhengyi","label":"正義","text":"溉音既。言帝俈治民，若水之溉灌，平等而執中正，徧於天下也。"}],"sentence_id":"s051"},{"id":"n081","anchor_text":"日月所照，風雨所至，莫不從服。","items":[{"source":"zhengyi","label":"正義","text":"以上大戴文也。"}],"sentence_id":"s051"},{"id":"n082","anchor_text":"帝嚳娶陳鋒氏女，","items":[{"source":"suoyin","label":"索隱","text":"鋒音峯。案：《系本》作「陳酆氏」。皇甫謐云「陳鋒氏女曰慶都」。慶都，名也。"},{"source":"zhengyi","label":"正義","text":"鋒音峯。又作「豐」。《帝王紀》云「帝俈有四妃，卜其子皆有天下。元妃有邰氏女，曰姜嫄，生后稷。次妃有娀氏女，曰簡狄，生卨，次妃陳豐氏女，曰慶都，生放勛。次妃娵訾氏女，曰常儀，生帝摯」也。"}],"sentence_id":"s052"},{"id":"n083","anchor_text":"生放勳。","items":[{"source":"zhengyi","label":"正義","text":"放音方往反。勳亦作「勛」，音許云反。言堯能放上代之功，故曰放勛。謚堯。姓伊祁氏。《帝王紀》云：「帝堯陶唐氏，祁姓也。母慶都，十四月生堯。」"}],"sentence_id":"s052"},{"id":"n084","anchor_text":"娶娵訾氏女，生摯。","items":[{"source":"suoyin","label":"索隱","text":"案：皇甫謐云「女名常宜」也。"},{"source":"zhengyi","label":"正義","text":"娵，足須反。訾，紫移反。"}],"sentence_id":"s053"},{"id":"n085","anchor_text":"帝嚳崩，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「在位七十年，年百五歲。」《皇覽》曰：「帝嚳冢在東郡濮陽頓丘城南臺陰野中。」"}],"sentence_id":"s054"},{"id":"n086","anchor_text":"而摯代立。帝摯立，不善（崩），","items":[{"source":"suoyin","label":"索隱","text":"古本作「不著」，音張慮反。俗本作「不善」。不善謂微弱，不著猶不著明。衛宏云：「摯立九年而唐侯德盛，因禪位焉。」"},{"source":"zhengyi","label":"正義","text":"《帝王紀》云：「帝摯之母於四人中班最在下，而摯於兄弟最長，得登帝位。封異母弟放勛爲唐侯。摯在位九年，政微弱，而唐侯德盛，諸侯歸之，摯服其義，乃率羣臣造唐而致禪。唐侯自知有天命，乃受帝禪，乃封摯於高辛。」今定州唐縣也。"}],"sentence_id":"s054"},{"id":"n087","anchor_text":"帝堯者，","items":[{"source":"jijie","label":"集解","text":"謚法曰：「翼善傳聖曰堯。」"},{"source":"suoyin","label":"索隱","text":"堯，謚也。放勳，名。帝嚳之子，姓伊祁氏。案：皇甫謐云「堯初生時，其母在三阿之南，寄於伊長孺之家，故從母所居爲姓也」。"},{"source":"zhengyi","label":"正義","text":"徐廣云：「號陶唐。」《帝王紀》云：「堯都平陽，於詩爲唐國。」徐才宗國都城記云：「唐國，帝堯之裔子所封。其北，帝夏禹都，漢曰太原郡，在古冀州太行恆山之西。其南有晉水。」《括地志》云：「今晉州所理平陽故城是也。平陽河水一名晉水也。」"}],"sentence_id":"s056"},{"id":"n088","anchor_text":"放勳。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「號陶唐。」皇甫謐曰：「堯以甲申歲生，甲辰即帝位，甲午徵舜，甲寅舜代行天子事，辛巳崩，年百一十八，在位九十八年。」"}],"sentence_id":"s052"},{"id":"n089","anchor_text":"其仁如天，","items":[{"source":"suoyin","label":"索隱","text":"如天之函養也。"}],"sentence_id":"s057"},{"id":"n090","anchor_text":"其知如神。","items":[{"source":"suoyin","label":"索隱","text":"如神之微妙也。"}],"sentence_id":"s057"},{"id":"n091","anchor_text":"就之如日，","items":[{"source":"suoyin","label":"索隱","text":"如日之照臨，人咸依就之，若葵藿傾心以向日也。"}],"sentence_id":"s058"},{"id":"n092","anchor_text":"望之如雲。","items":[{"source":"suoyin","label":"索隱","text":"如雲之覆渥，言德化廣大而浸潤生人，人咸仰望之，故曰如百穀之仰膏雨也。"}],"sentence_id":"s058"},{"id":"n093","anchor_text":"富而不驕，貴而不舒。","items":[{"source":"suoyin","label":"索隱","text":"舒猶慢也。《大戴禮》作「不豫」。"}],"sentence_id":"s059"},{"id":"n094","anchor_text":"黃收純衣，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「純，一作『䊷』。」駰案：太古冠冕圖云「夏名冕曰收」。《禮記》曰「野夫黃冠」。鄭玄曰「純衣，士之祭服」。"},{"source":"suoyin","label":"索隱","text":"收，冕名。其色黃，故曰黃收，象古質素也。純，讀曰緇。"}],"sentence_id":"s060"},{"id":"n095","anchor_text":"彤車乘白馬。能明馴德，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「馴，古訓字。」"},{"source":"suoyin","label":"索隱","text":"《史記》「馴」字徐廣皆讀曰訓。訓，順也。言聖德能順人也。案：《尚書》作「俊德」，孔安國云「能明用俊德之士」，與此文意別也。"}],"sentence_id":"s060"},{"id":"n096","anchor_text":"以親九族。九族既睦，便章百姓。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「下云『便程東作』，然則訓平爲便也。」駰案：《尚書》並作「平」字。孔安國曰「百姓，百官」。鄭玄曰「百姓，羣臣之父子兄弟」。"},{"source":"suoyin","label":"索隱","text":"《古文尚書》作「平」，此文蓋讀「平」爲浦耕反。平既訓便，因作「便章」。其今文作「辯章」。古「平」字亦作「便」，音婢緣反。便則訓辯，遂爲辯章。鄒誕生本亦同也。"}],"sentence_id":"s062"},{"id":"n097","anchor_text":"乃命羲、和，","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「重黎之後，羲氏、和氏世掌天地之官。」"},{"source":"zhengyi","label":"正義","text":"呂刑傳云：「重即羲，黎即和，雖別爲氏族，而出自重黎也。」案：聖人不獨治，必須賢輔，乃命相天地之官，若《周禮》天官卿、地官卿也。"}],"sentence_id":"s064"},{"id":"n098","anchor_text":"敬順昊天，","items":[{"source":"zhengyi","label":"正義","text":"敬猶恭勤也。元氣昊然廣大，故云昊天。釋天云：「春爲蒼天，夏爲昊天，秋爲旻天，冬爲上天。」而獨言昊天者，以堯能敬天，大，故以昊大言之。"}],"sentence_id":"s064"},{"id":"n099","anchor_text":"數法","items":[{"source":"suoyin","label":"索隱","text":"《尚書》作「曆象日月」，則此言「數法」，是訓「曆象」二字，謂命羲和以曆數之法觀察日月星辰之早晚，以敬授人時也。"}],"sentence_id":"s064"},{"id":"n100","anchor_text":"日月星辰，","items":[{"source":"zhengyi","label":"正義","text":"曆數之法，日之甲乙，月之大小，昏明遞中之星，日月所會之辰，定其天數，以爲一歲之曆。"}],"sentence_id":"s025"},{"id":"n101","anchor_text":"敬授民時。","items":[{"source":"zhengyi","label":"正義","text":"《尚書》考靈耀云：「主春者，張昏中，可以種稷。主夏者，火昏中，可以種黍菽。主秋者，虛昏中，可以種麥。主冬者，昴昏中，可以收斂也。」天子視四星之中，知民緩急，故云敬授民時也。"}],"sentence_id":"s064"},{"id":"n102","anchor_text":"分命羲仲，居郁夷，曰暘谷。","items":[{"source":"jijie","label":"集解","text":"《尚書》作「嵎夷」。孔安國曰：「東表之地稱嵎夷。日出於暘谷。羲仲，治東方之官。」"},{"source":"suoyin","label":"索隱","text":"舊本作「湯谷」，今並依《尚書》字。案：《淮南子》曰「日出湯谷，浴於咸池」，則湯谷亦有他證明矣。又下曰「昧谷」，徐廣云「一作『柳』」，柳亦日入處地名。太史公博採經記而爲此史，廣記異聞，不必皆依《尚書》。蓋郁夷亦地之別名也。"},{"source":"zhengyi","label":"正義","text":"郁音隅。陽或作「暘」。《禹貢》青州云：「嵎夷既略。」案：嵎夷，青州也。堯命羲仲理東方青州嵎夷之地，日所出處，名曰陽明之谷。羲仲主東方之官，若《周禮》春官卿。"}],"sentence_id":"s065"},{"id":"n103","anchor_text":"敬道日出，便程東作。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「敬道出日，平均次序東作之事，以務農也。」"},{"source":"suoyin","label":"索隱","text":"劉伯莊傳皆依古史作平秩音。然《尚書大傳》曰「辯秩東作」，則是訓秩爲程，言便課其作程者也。"},{"source":"zhengyi","label":"正義","text":"道音導。便，程，並如字，後同。導，訓也。三春主東，故言日出。耕作在春，故言東作。命羲仲恭勤道訓萬民東作之事，使有程期。"}],"sentence_id":"s066"},{"id":"n104","anchor_text":"日中，星鳥，以殷中春。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「日中謂春分之日也。鳥，南方朱鳥七宿也。殷，正也。春分之昏，鳥星畢見，以正仲春之氣節。轉以推孟、季，則可知也。」"},{"source":"zhengyi","label":"正義","text":"下「中」音仲，夏、秋、冬並同。"}],"sentence_id":"s067"},{"id":"n105","anchor_text":"其民析，鳥獸字微。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「春事既起，丁壯就功，言其民老壯分析也。」乳化曰字。《尚書》「微」作「尾」字。說（文）云「尾，交接也」。"}],"sentence_id":"s068"},{"id":"n106","anchor_text":"申命羲叔，居南交。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「夏與春交，此治南方之官也。」"},{"source":"suoyin","label":"索隱","text":"孔注未是。然則冬與秋交，何故下無其文？且東嵎夷，西昧谷，北幽都，三方皆言地，而夏獨不言地，乃云與春交，斯不例之甚也。然南方地有名交阯者，或古文略舉一字名地，南交則是交阯不疑也。"},{"source":"zhengyi","label":"正義","text":"羲叔主南方官，若《周禮》夏官卿也。"}],"sentence_id":"s069"},{"id":"n107","anchor_text":"便程南爲，敬致。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「爲，化也。平序分南方化育之事，敬行其教，以致其功也。」"},{"source":"suoyin","label":"索隱","text":"爲依字讀。春言東作，夏言南爲，皆是耕作營爲勸農之事。孔安國強讀爲「訛」字，雖則訓化，解釋亦甚紆回也。"},{"source":"zhengyi","label":"正義","text":"爲音于僞反。命羲叔宜恭勤民事。致其種殖，使有程期也。"}],"sentence_id":"s070"},{"id":"n108","anchor_text":"日永，星火，以正中夏。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「永，長也，謂夏至之日。火，蒼龍之中星，舉中則七星見可知也，以正中夏之〔氣〕節。」馬融、王肅謂日長晝漏六十刻，鄭玄曰五十五刻。"}],"sentence_id":"s071"},{"id":"n109","anchor_text":"其民因，鳥獸希革。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「因，謂老弱因就在田之丁壯以助農也。夏時鳥獸毛羽希少改易也。革，改也。」"}],"sentence_id":"s072"},{"id":"n110","anchor_text":"申命和仲，","items":[{"source":"zhengyi","label":"正義","text":"和仲主西方之官，若《周禮》秋官卿也。"}],"sentence_id":"s073"},{"id":"n111","anchor_text":"居西土，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一無『土』字。以爲西者，今天水之西縣也。」駰案：鄭玄曰「西者，隴西之西，今人謂之兌山」。"}],"sentence_id":"s073"},{"id":"n112","anchor_text":"曰昧谷。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一作『柳谷』。」駰案：孔安國曰「日入于谷而天下冥，故曰昧谷。此居治西方之官，掌秋天之政也」。"}],"sentence_id":"s073"},{"id":"n113","anchor_text":"敬道日入，便程西成。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「秋，西方，萬物成也。」"}],"sentence_id":"s074"},{"id":"n114","anchor_text":"夜中，星虛，","items":[{"source":"suoyin","label":"索隱","text":"虛，舊依字讀，而鄒誕生音墟。案：虛星主墳墓，鄒氏或得其理。"}],"sentence_id":"s075"},{"id":"n115","anchor_text":"以正中秋。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「春言日，秋言夜，互相備也。虛，玄武之中星。亦言七星皆以秋分日見，以正三秋也。」"}],"sentence_id":"s075"},{"id":"n116","anchor_text":"其民夷易，鳥獸毛毨。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「夷，平也。老壯者在田，與夏平也。毨，理也。毛更生（曰）整理。」"}],"sentence_id":"s076"},{"id":"n117","anchor_text":"申命和叔；居北方，曰幽都。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「北稱幽都，謂所聚也。」"},{"source":"suoyin","label":"索隱","text":"《山海經》曰「北海之內有山名幽都」，蓋是也。"},{"source":"zhengyi","label":"正義","text":"案：北方幽州，陰聚之地，命和叔居理之。北方之官，若《周禮》冬官卿。"}],"sentence_id":"s077"},{"id":"n118","anchor_text":"便在伏物。","items":[{"source":"suoyin","label":"索隱","text":"使和叔察北方藏伏之物，謂人畜積聚等冬皆藏伏。尸子亦曰「北方者，伏方也」。《尚書》作「平在朔易」。今案：大傳云「便在伏物」，太史公據之而書。"}],"sentence_id":"s078"},{"id":"n119","anchor_text":"日短，星昴，以正中冬。","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「日短，冬至之日也。昴，白虎之中星。亦以七星並見，以正冬節也。」馬融、王肅謂日短晝漏四十刻。鄭玄曰四十五刻，失之。"}],"sentence_id":"s079"},{"id":"n120","anchor_text":"其民燠，鳥獸氄毛。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「氄音茸。」駰案：孔安國曰「民入室處，鳥獸皆生氄毳細毛以自溫也」。"}],"sentence_id":"s080"},{"id":"n121","anchor_text":"歲三百六十六日，以閏月正四時。","items":[{"source":"suoyin","label":"索隱","text":"夫周天三百六十五度四分度之一，是天度數也。而日行遲，一歲一周天；月行疾，一月一周天。日一日行一度，月一日行十三度十九分度之七。至二十九日半強，月行天一帀，又逐及日而與會。一年十二會，是爲十二月。每月二十九日過半。年分出小月六，是每歲餘六日。又大歲三百六十六日，小歲三百五十五日，舉全數云六十六日。其實一歲唯餘十一日弱。未滿三歲，已成一月，則置閏。若三年不置閏，則正月爲二月。九年差三月，則以春爲夏。十七年差六月，則四時皆反。以此四時不正，歲不成矣。故傳曰「歸餘於終，事則不悖」是也。"}],"sentence_id":"s081"},{"id":"n122","anchor_text":"信飭","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「古『勅』字。」"}],"sentence_id":"s047"},{"id":"n123","anchor_text":"堯曰：「誰可順此事？」","items":[{"source":"zhengyi","label":"正義","text":"言將登用之嗣位也。"}],"sentence_id":"s083"},{"id":"n124","anchor_text":"放齊曰：「嗣子丹朱開明。」","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「放齊，臣名。」"},{"source":"zhengyi","label":"正義","text":"放音方往反。鄭玄云：「帝堯胤嗣之子，名曰丹朱，開明也。」案：開，解而達也。《帝王紀》云：「堯娶散宜氏女，曰女皇，生丹朱。」汲冢紀年云：「后稷放帝子丹朱。」范汪荊州記云：「丹水縣在丹川，堯子朱之所封也。」《括地志》云：「丹水故城在鄧州內鄉縣西南百三十里。丹水故爲縣。」"}],"sentence_id":"s084"},{"id":"n125","anchor_text":"堯曰：「吁！頑凶，不用。」","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「吁，疑怪之辭。」"},{"source":"zhengyi","label":"正義","text":"《左傳》云：「口不道忠信之言爲嚚，心不則德義之經爲頑。」凶，訟也。言丹朱心既頑嚚，又好爭訟，不可用之。"}],"sentence_id":"s086"},{"id":"n126","anchor_text":"可者？」讙兜曰：「共工旁聚布功，可用。」","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「讙兜，臣名。」鄭玄曰：「共工，水官名。」"},{"source":"zhengyi","label":"正義","text":"兜音斗侯反。"}],"sentence_id":"s088"},{"id":"n127","anchor_text":"：「共工善言，其用僻，似恭漫天，不可。」","items":[{"source":"zhengyi","label":"正義","text":"漫音莫干反。共工善爲言語，用意邪僻也。似於恭敬，罪惡漫天，不可用也。"}],"sentence_id":"s089"},{"id":"n128","anchor_text":"堯又曰：「嗟，四嶽，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「四嶽，四時官，主方嶽之事。」"},{"source":"zhengyi","label":"正義","text":"嗟嘆鴻水，問四嶽誰能理也。孔安國云：「四嶽，即上羲和四子也。分掌四嶽之諸侯，故稱焉。」"}],"sentence_id":"s090"},{"id":"n129","anchor_text":"湯湯洪水滔天，浩浩懷山襄陵，","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「懷，包；襄，上也。」"},{"source":"zhengyi","label":"正義","text":"湯音商，今讀如字。蕩蕩，廣平之貌。言水奔突有所滌除，地上之物爲水漂流蕩蕩然。案：懷，藏，包裹之義，故懷爲包。釋言以襄爲駕，駕乘牛馬皆在上也。言水襄上乘陵，浩浩盛大，勢若漫天。"}],"sentence_id":"s090"},{"id":"n130","anchor_text":"下民其憂，有能使治者？」皆曰鯀可。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「鯀，臣名，禹父。」"}],"sentence_id":"s090"},{"id":"n131","anchor_text":"堯曰：「鯀負命毀族，不可。」","items":[{"source":"zhengyi","label":"正義","text":"負音佩，依字通。負，違也。族，類也。鯀性很戾，違負教命，毀敗善類，不可用也。《詩》云「貪人敗類」也。"}],"sentence_id":"s092"},{"id":"n132","anchor_text":"嶽曰：「异哉，試不可用而已。」","items":[{"source":"zhengyi","label":"正義","text":"异音異。孔安國云：「异，已；已，退也。言餘人盡已，唯鯀可試，無成乃退。」"}],"sentence_id":"s093"},{"id":"n133","anchor_text":"堯於是聽嶽用鯀。九歲，功用不成。","items":[{"source":"zhengyi","label":"正義","text":"《爾雅》釋天云：「載，歲也。夏曰祀，周曰年，唐、虞曰載。」李巡云：「各自紀事，示不相襲也。」孫炎云：「歲，取歲星行一次也。祀，取四時祭祀一訖也。年，取禾穀一熟也。載，取萬物終更始也。載者，年之別名，故以載爲年也。」案：功用不成，水害不息，故放退也。至明年得舜，乃殛之羽山，而用其子禹也。"}],"sentence_id":"s094"},{"id":"n134","anchor_text":"四嶽：朕在位七十載，汝能庸命，踐朕位？」","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「言汝諸侯之中有能順事用天命者，入處我位，統治天子之事者乎？」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「堯年十六，以唐侯升爲天子，在位七十載，時八十六，老將求代也。」"}],"sentence_id":"s097"},{"id":"n135","anchor_text":"嶽應曰：「鄙悳忝帝位。」","items":[{"source":"zhengyi","label":"正義","text":"四嶽皆云，鄙俚無德，若便行天子事，是辱帝位。言己等不堪也。"}],"sentence_id":"s098"},{"id":"n136","anchor_text":"」眾皆言於堯曰：「有矜在民閒，曰虞舜。」","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「無妻曰矜。」"},{"source":"zhengyi","label":"正義","text":"矜，古頑反。"}],"sentence_id":"s100"},{"id":"n137","anchor_text":"母嚚，弟傲，能和以孝，烝烝治，不至姦。」","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「不至於姦惡。」"},{"source":"zhengyi","label":"正義","text":"烝，之升反，進也。言父頑，母嚚，弟傲，舜皆和以孝，進之於善，不至於姦惡也。"}],"sentence_id":"s104"},{"id":"n138","anchor_text":"堯曰：「吾其試哉。」","items":[{"source":"zhengyi","label":"正義","text":"欲以二女試舜，觀其理家之道也。"}],"sentence_id":"s105"},{"id":"n139","anchor_text":"於是堯妻之二女，","items":[{"source":"zhengyi","label":"正義","text":"妻音七計反。二女，娥皇、女英也。娥皇無子，女英生商均。舜升天子，娥皇爲后，女英爲妃。"}],"sentence_id":"s106"},{"id":"n140","anchor_text":"觀其德於二女。","items":[{"source":"zhengyi","label":"正義","text":"視其爲德行於二女，以理家而觀國也。"}],"sentence_id":"s106"},{"id":"n141","anchor_text":"舜飭下二女於嬀汭，","items":[{"source":"jijie","label":"集解","text":"孔安國曰：「舜所居嬀水之汭。」"},{"source":"suoyin","label":"索隱","text":"《列女傳》云二女長曰娥皇，次曰女英。《系本》作「女瑩」。《大戴禮》作「女匽」。皇甫謐云：「嬀水在河東虞鄉縣歷山西。汭，水涯也，猶洛汭、渭汭然也。」"},{"source":"zhengyi","label":"正義","text":"飭音勑。下音胡亞反。汭音芮。舜能整齊二女以義理，下二女之心於嬀汭，使行婦道於虞氏也。《括地志》云：「嬀汭水源出蒲州河東南山。許慎云：『水涯曰汭。』案：地記云『河東郡青山東山中有二泉，下南流者嬀水，北流者汭水。二水異源，合流出谷，西注河。嬀水北曰汭也』。又云『河東縣二里故蒲坂城，舜所都也。城中有舜廟，城外有舜宅及二妃壇』。」"}],"sentence_id":"s107"},{"id":"n142","anchor_text":"如婦禮。堯善之，乃使舜慎和五典，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「五典，五教也。蓋試以司徒之職。」"}],"sentence_id":"s108"},{"id":"n143","anchor_text":"。賓於四門，四門穆穆，諸侯遠方賓客皆敬。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「四門，四方之門。諸侯羣臣朝者，舜賓迎之，皆有美德也。」"}],"sentence_id":"s110"},{"id":"n144","anchor_text":"堯使舜入山林","items":[{"source":"suoyin","label":"索隱","text":"《尚書》云「納于大麓」，穀梁傳云「林屬於山曰麓」，是山足曰麓，故此以爲入山林不迷。孔氏以麓訓錄，言令舜大錄萬幾之政，與此不同。"}],"sentence_id":"s111"},{"id":"n145","anchor_text":"聖，召舜曰：「女謀事至而言可績，三年矣。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「三年者，賓四門之後三年也。」"}],"sentence_id":"s112"},{"id":"n146","anchor_text":"女登帝位。」舜讓於德不懌。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「音亦。《今文尚書》作『不怡』。怡，懌也。」"},{"source":"suoyin","label":"索隱","text":"古文作「不嗣」，今文作「不怡」，怡即懌也。謂辭讓於德不堪，所以心意不悅懌也。俗本作「澤」，誤爾，亦當爲「懌」。"}],"sentence_id":"s114"},{"id":"n147","anchor_text":"正月上日，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「上日，朔日也。」"},{"source":"zhengyi","label":"正義","text":"鄭玄云：「帝王易代，莫不改正。堯正建丑，舜正建子，此時未改，故依堯正月上日也。」"}],"sentence_id":"s115"},{"id":"n148","anchor_text":"舜受終於文祖。文祖者，堯大祖也。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「文祖者，五府之大名，猶周之明堂。」"},{"source":"suoyin","label":"索隱","text":"《尚書》帝命驗曰：「五府，五帝之廟。蒼曰靈府，赤曰文祖，黃曰神斗，白曰顯紀，黑曰玄矩。唐虞謂之五府，夏謂世室，殷謂重屋，周謂明堂，皆祀五帝之所也。」"},{"source":"zhengyi","label":"正義","text":"舜受堯終帝之事於文祖也。《尚書》帝命驗云：「帝者承天立五府，以尊天重象也。五府者，黃曰神斗。」注云：「唐虞謂之天府，夏謂之世室，殷謂之重屋，周謂之明堂，皆祀五帝之所也。文祖者，赤帝熛怒之府，名曰文祖。火精光明，文章之祖，故謂之文祖。周曰明堂。神斗者，黃帝含樞紐之府，名曰神斗。斗，主也。土精澄靜，四行之主，故謂之神斗。周曰太室。顯紀者，白帝招拒之府，名顯紀。紀，法也。金精斷割萬物，故謂之顯紀。周曰總章。玄矩者，黑帝汁光紀之府，名曰玄矩。矩，法也。水精玄味，能權輕重，故謂之玄矩。周曰玄堂。靈府者，蒼帝靈威仰之府，名曰靈府。周曰青陽。」"}],"sentence_id":"s115"},{"id":"n149","anchor_text":"政，以觀天命。舜乃在璿璣玉衡，以齊七政。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「璿璣，玉衡，渾天儀也。七政，日月五星也。」"},{"source":"zhengyi","label":"正義","text":"說文云：「璿，赤玉也。」案：舜雖受堯命，猶不自安，更以璿璣玉衡以正天文。璣爲運轉，衡爲橫簫，運璣使動於下，以衡望之，是王者正天文器也，觀其齊與不齊。今七政齊，則己受禪爲是。蔡邕云：「玉衡長八尺，孔徑一寸，下端望之，以視星宿，並縣璣以象天，而以衡望之，轉璣窺衡，以知星宿。璣徑八尺，圓周二丈五尺而強也。」鄭玄云：「運轉者爲璣，持正者爲衡。」《尚書大傳》云：「政者，齊中也。謂春秋冬夏天文地理人道，所以爲政也，道正而萬事順成，故天道政之大也。」"}],"sentence_id":"s118"},{"id":"n150","anchor_text":"遂類于上帝，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「禮祭上帝于圜丘。」"},{"source":"zhengyi","label":"正義","text":"五經異義云：「非時祭天謂之類，言以事類告也。時舜告攝，非常祭也。」王制云：「天子將出，類于上帝。」鄭玄云：「昊天上帝謂天皇大帝，北辰之星。」"}],"sentence_id":"s119"},{"id":"n151","anchor_text":"禋于六宗，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「六宗，星、辰、司中、司命、風師、雨師也。」駰案：六宗義眾矣。愚謂鄭說爲長。"},{"source":"zhengyi","label":"正義","text":"周語云「精意以享曰禋」也。孫炎云：「禋，絜敬之祭也。」　案：星，五緯星也。辰，日月所會十二次也。司中、司命，文昌第五、第四星也。風師，箕星也。雨師，畢星也。孔安國云：「四時寒暑也，日月星也，水旱也。」禮祭法云：「埋少牢於大昭，祭時也。禳祈於坎壇，祭寒暑也。王宮，祭日也。夜明，祭月也。幽禜，祭星。雩禜，祭水旱也。」司馬彪《續漢書》云：「安帝立六宗，祀於洛陽城西北亥地，禮比大社。魏因之。至晉初，荀顗言新祀，以六宗之神諸家說不同，乃廢之也。」"}],"sentence_id":"s119"},{"id":"n152","anchor_text":"望于山川，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「名山大川。」"},{"source":"zhengyi","label":"正義","text":"望者，遙望而祭山川也。山川，五嶽、四瀆也。《爾雅》云：「梁山，晉望也。」"}],"sentence_id":"s119"},{"id":"n153","anchor_text":"辯于羣神。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「辯音班。」駰案：鄭玄曰「羣神若丘陵墳衍」。"},{"source":"zhengyi","label":"正義","text":"辯音遍。謂祭羣神也。"}],"sentence_id":"s119"},{"id":"n154","anchor_text":"揖五瑞，擇吉月日，見四嶽諸牧，班瑞。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「揖，斂也。五瑞，公侯伯子男所執，以爲瑞信也。堯將禪舜，使羣牧斂之，使舜親往班之。」"},{"source":"zhengyi","label":"正義","text":"揖音集。《周禮》典瑞云：「王執鎮圭，尺二寸。公執桓圭，九寸。侯執信圭，七寸。伯執躬圭，五寸。子執穀璧，男執蒲璧，皆五寸。言五瑞者，王不在中也。」孔文祥云：「宋末，會稽修禹廟，於廟庭山土中得五等圭璧百餘枚，形與《周禮》同，皆短小。此即禹會諸侯於會稽，執以禮山神而埋之。其璧今猶有在也。」"}],"sentence_id":"s120"},{"id":"n155","anchor_text":"歲二月，東巡狩，至於岱宗，祡，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「舜受終後五年之二月。」鄭玄曰：「建卯之月也。祡祭東嶽者，考績。祡，燎也。」"},{"source":"zhengyi","label":"正義","text":"案：既班瑞羣后即東巡者，守土之諸侯會岱宗之嶽，焚柴告至也。王者巡狩，以諸侯自專一國，威福任己，恐其壅遏上命，澤不下流，故巡行問人疾苦也。風俗通云：「太，山之尊者，一曰岱宗，始也，長也，萬物之始，陰陽交代，故爲五嶽之長也。」案：二月，仲月也。仲，中也，言得其中也。"}],"sentence_id":"s121"},{"id":"n156","anchor_text":"望秩於山川。","items":[{"source":"zhengyi","label":"正義","text":"乃以秩望祭東方諸侯境內之名山大川也。言秩者，五嶽視三公，四瀆視諸侯。"}],"sentence_id":"s121"},{"id":"n157","anchor_text":"遂見東方君長，合時月正日，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「協正四時之月數及日名，備有失誤。」"},{"source":"zhengyi","label":"正義","text":"既見東方君長，乃合同四時氣節，月之大小，日之甲乙，使齊一也。《周禮》：「太史掌正歲年以序事，頒正朔於邦國。」則節氣晦朔皆天子頒之。猶恐諸侯國異，或不齊同，因巡狩合正之。"}],"sentence_id":"s122"},{"id":"n158","anchor_text":"同律度量衡，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「律，音律；度，丈尺；量，斗斛；衡，斤兩也。」"},{"source":"zhengyi","label":"正義","text":"律之十二律，度之丈尺，量之斗斛，衡之斤兩，皆使天下相同，無制度長短輕重異也。漢《律曆志》云：「《虞書》云『同律度量衡』，所以齊遠近，立民信也。律有十二，陽六爲律，陰六爲呂。律以統氣類物，一曰黃鍾，二曰太蔟，三曰姑洗，四曰蕤賓，五曰夷則，六曰無射。呂以旅陽宣氣，一曰林鍾，二曰南呂，三曰應鍾，四曰大呂，五曰夾鍾，六曰中呂。度者，分、寸、尺、丈、引也，所以度長短也。本起黃鍾之管長，以子穀秬黍中者一黍爲一分，十分爲一寸，十寸爲尺，十尺爲丈，十丈爲引，而五度審矣。量者，龠、合、升、斗、斛也，所以量多少也。本起黃鍾之龠，以子穀秬黍中者千有二百實爲一龠，合龠爲合，十合爲升，十升爲斗，十斗爲斛，而五量嘉矣。衡權者，銖、兩、斤、鈞、石也，所以稱物輕重也。本起於黃鍾之重，一龠容千二百黍，重十二銖，二十四銖爲兩，十六兩爲斤，三十斤爲鈞，四鈞爲石，而五權謹矣。衡，平也。權，重也。」"}],"sentence_id":"s122"},{"id":"n159","anchor_text":"脩五禮","items":[{"source":"jijie","label":"集解","text":"馬融曰：「吉、凶、賓、軍、嘉也。」"},{"source":"zhengyi","label":"正義","text":"《周禮》「以吉禮事邦國之鬼神祇，以凶禮哀邦國之憂，以賓禮親邦國，以軍禮同邦國，以嘉禮親萬民」也。《尚書堯典》云「類于上帝」，吉禮也；「如喪考妣」，凶禮也；「羣后四朝」，賓禮也；大禹謨云「汝徂征」，軍禮也；《堯典》云「女于時」，嘉禮也。女音女慮反。"}],"sentence_id":"s122"},{"id":"n160","anchor_text":"五玉","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「即五瑞也。執之曰瑞，陳列曰玉。」"}],"sentence_id":"s122"},{"id":"n161","anchor_text":"三帛","items":[{"source":"jijie","label":"集解","text":"馬融曰：「三孤所執也。」鄭玄曰：「帛，所以薦玉也。必三者，高陽氏後用赤繒，高辛氏後用黑繒，其餘諸侯皆用白繒。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「諸侯世子執纁，公之孤執玄，附庸之君執黃也。」案：三統紀推伏羲爲天統，色尚赤。神農爲地統，色尚黑。黃帝爲人統，色尚白。少昊，黃帝子，亦尚白。故高陽氏又天統，亦尚亦。堯爲人統，故用白。"}],"sentence_id":"s122"},{"id":"n162","anchor_text":"二生","items":[{"source":"zhengyi","label":"正義","text":"羔、鴈也。鄭玄注《周禮》大宗伯云：「羔，小羊也，取其羣不失其類也。鴈，取其候時而行也。卿執羔，大夫執鴈。」案：羔、鴈性馴，可生爲贄。"}],"sentence_id":"s122"},{"id":"n163","anchor_text":"一死","items":[{"source":"zhengyi","label":"正義","text":"雉也。馬融云：「一死雉，士所執也。」案：不可生爲贄，故死。雉，取其守介死不失節也。"}],"sentence_id":"s122"},{"id":"n164","anchor_text":"爲摯，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「摯：二生，羔、鴈，卿大夫所執；一死，雉，士所執。」"},{"source":"zhengyi","label":"正義","text":"摯音至。贄，執也。鄭玄云：「贄之言至，所以自致也。」韋昭云：「贄，六贄：孤執皮帛，卿執羔，大夫執鴈，士執雉，庶人執鶩，工商執雞也。」"}],"sentence_id":"s122"},{"id":"n165","anchor_text":"如五器，卒乃復。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「五器，上五玉。五玉禮終則還之，三帛已下不還也。」"},{"source":"zhengyi","label":"正義","text":"卒音子律反。復音伏。"}],"sentence_id":"s122"},{"id":"n166","anchor_text":"十一月，北巡狩：皆如初。歸，至于祖禰廟，","items":[{"source":"zhengyi","label":"正義","text":"禰音乃禮反。何休云：「生曰父，死曰考，廟曰禰。」"}],"sentence_id":"s123"},{"id":"n167","anchor_text":"用特牛禮。五歲一巡狩，羣后四朝。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「巡狩之年，諸侯見於方嶽之下。其閒四年，四方諸侯分來朝於京師也。」"}],"sentence_id":"s125"},{"id":"n168","anchor_text":"徧告以言，","items":[{"source":"zhengyi","label":"正義","text":"徧音遍。言遍告天子治理之言也。"}],"sentence_id":"s126"},{"id":"n169","anchor_text":"明試以功，車服以庸。","items":[{"source":"zhengyi","label":"正義","text":"孔安國云：「功成則錫車服，以表顯其能用也。」"}],"sentence_id":"s126"},{"id":"n170","anchor_text":"肇十有二州，決川。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「禹平水土，置九州。舜以冀州之北廣大，分置并州。燕、齊遼遠，分燕置幽州，分齊爲營州。於是爲十二州也。」鄭玄曰：「更爲之定界，濬水害也。」"}],"sentence_id":"s127"},{"id":"n171","anchor_text":"象以典刑，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「言咎繇制五常之刑，無犯之者，但有其象，無其人也。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「象，法也。法用常刑，用不越法也。」"}],"sentence_id":"s128"},{"id":"n172","anchor_text":"流宥五刑，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「流，放；宥，寬也。一曰幼少，二曰老耄，三曰蠢愚。五刑，墨、劓、剕、宮、大辟。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「以流放之法寬五刑也。」鄭玄云：「三宥，一曰弗識，二曰過失，三曰遺忘也。」"}],"sentence_id":"s128"},{"id":"n173","anchor_text":"鞭作官刑，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「爲辨治官事者爲刑。」"}],"sentence_id":"s128"},{"id":"n174","anchor_text":"扑作教刑，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「扑，檟楚也。扑爲教官爲刑者。」"}],"sentence_id":"s128"},{"id":"n175","anchor_text":"金作贖刑。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「金，黃金也。意善功惡，使出金贖罪，坐不戒慎者。」"}],"sentence_id":"s128"},{"id":"n176","anchor_text":"眚烖過，赦；","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「眚烖，爲人作患害者也。過失，雖有害則赦之。」"}],"sentence_id":"s129"},{"id":"n177","anchor_text":"怙終","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一作『眾』。」"}],"sentence_id":"s129"},{"id":"n178","anchor_text":"賊，刑。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「怙其姦邪，終身以爲殘賊，則用刑之。」"}],"sentence_id":"s129"},{"id":"n179","anchor_text":"欽哉，欽哉，惟刑之靜哉！","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「今文云『惟刑之謐哉』。《爾雅》曰『謐，靜也』。」"},{"source":"suoyin","label":"索隱","text":"注「惟形之謐哉」，案：古文作「恤哉」，且今文是伏生口誦，卹謐聲近，遂作「謐」也。"}],"sentence_id":"s130"},{"id":"n180","anchor_text":"讙兜進言共工，","items":[{"source":"zhengyi","label":"正義","text":"讙兜，渾沌也。共工，窮奇也。鯀，檮杌也。三苗，饕餮也。《左傳》云「舜臣堯，流四凶，投諸四裔，以禦魑魅」也。"}],"sentence_id":"s131"},{"id":"n181","anchor_text":"堯曰不可而試之工師，","items":[{"source":"zhengyi","label":"正義","text":"工師，若今大匠卿也。"}],"sentence_id":"s131"},{"id":"n182","anchor_text":"共工果淫辟。","items":[{"source":"zhengyi","label":"正義","text":"匹亦反。"}],"sentence_id":"s131"},{"id":"n183","anchor_text":"嶽彊請試之，試之而無功，故百姓不便。三苗","items":[{"source":"jijie","label":"集解","text":"馬融曰：「國名也。」"},{"source":"zhengyi","label":"正義","text":"《左傳》云自古諸侯不用王命，虞有三苗，夏有觀扈。孔安國云：「縉雲氏之後爲諸侯，號饕餮也。」吳起云：「三苗之國，左洞庭而右彭蠡。」案：洞庭，湖名，在岳州巴陵西南一里，南與青草湖連。彭蠡，湖名，在江州潯陽縣東南五十二里。以天子在北，故洞庭在西爲左，彭蠡在東爲右。今江州、鄂州、岳州，三苗之地也。"}],"sentence_id":"s132"},{"id":"n184","anchor_text":"在江淮、荊州","items":[{"source":"zhengyi","label":"正義","text":"淮，讀曰匯，音胡罪反，今彭蠡湖也。本屬荊州。《尚書》云「南入于江，東匯澤爲彭蠡」是也。"}],"sentence_id":"s133"},{"id":"n185","anchor_text":"爲亂。於是舜歸而言於帝，請流共工於幽陵，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「北裔也。」"},{"source":"zhengyi","label":"正義","text":"《尚書》及《大戴禮》皆作「幽州」。《括地志》云：「故龔城在檀州燕樂縣界。故老傳云舜流共工幽州，居此城。」《神異經》云：「西北荒有人焉，人面，朱髴，蛇身，人手足，而食五穀禽獸，頑愚，名曰共工。」"}],"sentence_id":"s134"},{"id":"n186","anchor_text":"以變北狄；","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「變，一作『燮』。」"},{"source":"suoyin","label":"索隱","text":"變謂變其形及衣服，同於夷狄也。徐廣云作「燮」。燮，和也。"},{"source":"zhengyi","label":"正義","text":"言四凶流四裔，各於四夷放共工等爲中國之風俗也。"}],"sentence_id":"s134"},{"id":"n187","anchor_text":"放驩兜於崇山，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「南裔也。」"},{"source":"zhengyi","label":"正義","text":"《神異經》云：「南方荒中有人焉，人面鳥喙而有翼，兩手足扶翼而行，食海中魚，爲人很惡，不畏風雨禽獸，犯死乃休，名曰驩兜也。」"}],"sentence_id":"s134"},{"id":"n188","anchor_text":"以變南蠻；遷三苗於三危，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「西裔也。」"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「三危山有三峯，故曰三危，俗亦名卑羽山，在沙州敦煌縣東南三十里。」《神異經》云：「西荒中有人焉，面目手足皆人形，而胳下有翼不能飛，爲人饕餮，淫逸無理，名曰苗民。」又《山海經》云大荒北經「黑水之北，有人有翼，名曰苗民」也。"}],"sentence_id":"s134"},{"id":"n189","anchor_text":"以變西戎；殛鯀於羽山，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「殛，誅也。羽山，東裔也。」"},{"source":"zhengyi","label":"正義","text":"殛音紀力反。孔安國云：「殛，竄，放，流，皆誅也。」《括地志》云：「羽山在沂州臨沂縣界。」《神異經》云：「東方有人焉，人形而身多毛，自解水土，知通塞，爲人自用，欲爲欲息，皆（曰）云是鯀也。」"}],"sentence_id":"s134"},{"id":"n190","anchor_text":"子之政，薦之於天。堯辟位凡二十八年而崩。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「堯在位凡九十八年。」駰案：《皇覽》曰「堯冢在濟陰城陽。劉向曰『堯葬濟陰，丘壠皆小』。呂氏春秋曰『堯葬穀林』。」皇甫謐曰「穀林即城陽。堯都平陽，於詩爲唐國」。"},{"source":"zhengyi","label":"正義","text":"皇甫謐云：「堯即位九十八年，通舜攝二十八年也，凡年百一十七歲。」孔安國云：「堯壽百一十六歲。」《括地志》云：「堯陵在濮州雷澤縣西三里。郭緣生述征記云『城陽縣東有堯冢，亦曰堯陵，有碑』是也。」《括地志》云：「雷澤縣本漢城陽縣也。」"}],"sentence_id":"s135"},{"id":"n191","anchor_text":"百姓悲哀，如喪父母。三年，四方莫舉樂，","items":[{"source":"zhengyi","label":"正義","text":"《尚書》「三載，四海遏密八音」是也。"}],"sentence_id":"s137"},{"id":"n192","anchor_text":"以思堯。堯知子丹朱之不肖，","items":[{"source":"suoyin","label":"索隱","text":"鄭玄云：「肖，似也。不似，言不如父也。」皇甫謐云：「堯娶散宜氏之女，曰女皇，生丹朱。又有庶子九人，皆不肖也。」"}],"sentence_id":"s139"},{"id":"n193","anchor_text":"不足授天下，於是乃權授舜。","items":[{"source":"suoyin","label":"索隱","text":"父子繼立，常道也。求賢而禪，權道也。權者，反常而合道。"},{"source":"zhengyi","label":"正義","text":"五帝官天下，老則禪賢，故權試舜也。"}],"sentence_id":"s139"},{"id":"n194","anchor_text":"堯崩，三年之喪畢，舜讓辟丹朱於南河之南。","items":[{"source":"jijie","label":"集解","text":"劉熙曰：「南河，九河之最在南者。」"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「故堯城在濮州鄄城縣東北十五里。竹《書》云昔堯德衰，爲舜所囚也。又有偃朱故城，在縣西北十五里。竹《書》云舜囚堯，復偃塞丹朱，使不與父相見也。」案濮州北臨漯，大川也。河在堯都之南，故曰南河，《禹貢》「至于南河」是也。其偃朱城所居，即「舜讓避丹朱於南河之南」處也。"}],"sentence_id":"s142"},{"id":"n195","anchor_text":"。舜曰「天也」，夫而後之中國踐天子位焉，","items":[{"source":"jijie","label":"集解","text":"劉熙曰：「天子之位不可曠年，於是遂反，格于文祖而當帝位。帝王所都爲中，故曰中國。」"}],"sentence_id":"s144"},{"id":"n196","anchor_text":"虞舜者，","items":[{"source":"jijie","label":"集解","text":"謚法曰：「仁聖盛明曰舜。」"},{"source":"suoyin","label":"索隱","text":"虞，國名，在河東大陽縣。舜，謚也。皇甫謐云「舜字都君」也。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「故虞城在陝州河北縣東北五十里虞山之上。酈元《注水經》云幹橋東北有虞城，堯以女嬪于虞之地也。又宋州虞城大襄國所封之邑，杜預云舜後諸侯也。又越州餘姚縣，顧野王云舜後支庶所封之地。舜姚姓，故云餘姚。縣西七十里有漢上虞故縣。會稽舊記云舜上虞人，去虞三十里有姚丘，即舜所生也。周處風土記云舜東夷之人，生姚丘。」《括地志》又云：「姚墟在濮州雷澤縣東十三里。孝經援神契云舜生於姚墟。」案：二所未詳也。"}],"sentence_id":"s145"},{"id":"n197","anchor_text":"名曰重華。","items":[{"source":"jijie","label":"集解","text":"徐廣曰﹕「皇甫謐云『舜以堯之二十一年甲子生，三十一年甲午徵用，七十九年壬午即真，百歲癸卯崩』。」"},{"source":"zhengyi","label":"正義","text":"《尚書》云﹕「重華協於帝。」孔安國云。「華謂文德也，言其光文重合於堯。」瞽叟姓嬀。妻曰握登，見大虹意感而生舜於姚墟，故姓姚。目重瞳子，故曰重華。字都君。龍顏，大口，黑色，身長六尺一寸。"}],"sentence_id":"s145"},{"id":"n198","anchor_text":"重華父曰瞽叟，","items":[{"source":"zhengyi","label":"正義","text":"先后反。孔安國云﹕「無目曰瞽。舜父有目不能分別好惡，故時人謂之瞽，配字曰『叟』。叟，無目之稱也。」"}],"sentence_id":"s146"},{"id":"n199","anchor_text":"瞽叟父曰橋牛，","items":[{"source":"zhengyi","label":"正義","text":"橋又音嬌。"}],"sentence_id":"s146"},{"id":"n200","anchor_text":"橋牛父曰句望，","items":[{"source":"zhengyi","label":"正義","text":"句，古侯反。望音亡。"}],"sentence_id":"s146"},{"id":"n201","anchor_text":"舜父瞽叟盲，而舜母","items":[{"source":"suoyin","label":"索隱","text":"皇甫謐云：「舜母名握登，生舜於姚墟，因姓姚氏也。」"}],"sentence_id":"s148"},{"id":"n202","anchor_text":"舜，冀州之人也。","items":[{"source":"zhengyi","label":"正義","text":"蒲州河東縣本屬冀州。宋永初山川記云：「蒲坂城中有舜廟，城外有舜宅及二妃檀。」《括地志》云：「嬀州有嬀水，源出城中。耆舊傳云即舜釐降二女於嬀汭之所。外城中有舜井，城北有歷山，山上有舜廟，未詳。」案：嬀州亦冀州城是也。"}],"sentence_id":"s151"},{"id":"n203","anchor_text":"舜耕歷山，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「在河東。」"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「蒲州河東縣雷首山，一名中條山，亦名歷山，亦名首陽山，亦名蒲山，亦名襄山，亦名甘棗山，亦名猪山，亦名狗頭山，亦名薄山，亦名吳山。此山西起雷首山，東至吳坂，凡十一名，隨州縣分之。歷山南有舜井。」又云：「越州餘姚縣有歷山舜井，濮州雷澤縣有歷山舜井，二所又有姚墟，云生舜處也。及嬀州歷山舜井，皆云舜所耕處，未詳也。」"}],"sentence_id":"s152"},{"id":"n204","anchor_text":"漁雷澤，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「雷夏，兗州澤，今屬濟陰。」"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「雷夏澤在濮州雷澤縣郭外西北。《山海經》云雷澤有雷神，龍身人頭，鼓其腹則雷也。」"}],"sentence_id":"s152"},{"id":"n205","anchor_text":"陶河濱，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「濟陰定陶西南陶丘亭是也。」"},{"source":"zhengyi","label":"正義","text":"案：於曹州濱河作瓦器也。《括地志》云：「陶城在蒲州河東縣北三十里，即舜所都也。南去歷山不遠。或耕或陶，所在則可，何必定陶方得爲陶也？舜之陶也，斯或一焉。」"}],"sentence_id":"s152"},{"id":"n206","anchor_text":"作什器於壽丘，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「在魯東門之北。」"},{"source":"suoyin","label":"索隱","text":"什器，什，數也。蓋人家常用之器非一，故以十爲數，猶今云「什物」也。壽丘，地名，黃帝生處。"},{"source":"zhengyi","label":"正義","text":"壽音受。顏師古云：「軍法，伍人爲伍，二伍爲什，則共器物，故謂生生之具爲什器，亦猶從軍及作役者十人爲火，共畜調度也。」"}],"sentence_id":"s152"},{"id":"n207","anchor_text":"就時於負夏。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「負夏，衞地。」"},{"source":"suoyin","label":"索隱","text":"就時猶逐時，若言乘時射利也。《尚書大傳》曰「販於頓丘，就時負夏」，孟子曰「遷于負夏」是也。"}],"sentence_id":"s152"},{"id":"n208","anchor_text":"舜年二十以孝聞。三十而帝堯問可用者，","items":[{"source":"zhengyi","label":"正義","text":"可用，謂可爲天子也。"}],"sentence_id":"s157"},{"id":"n209","anchor_text":"汭，內行彌謹。堯二女不敢以貴驕事舜親戚，","items":[{"source":"zhengyi","label":"正義","text":"二女不敢以帝女驕慢舜之親戚。親戚，謂父瞽叟，後母弟象，妹顆手等也。顆音苦果反。"}],"sentence_id":"s160"},{"id":"n210","anchor_text":"甚有婦道。堯九男皆益篤。","items":[{"source":"zhengyi","label":"正義","text":"篤，惇也。非唯二女恭勤婦道，九男事舜皆益惇厚謹敬也。"}],"sentence_id":"s161"},{"id":"n211","anchor_text":"舜耕歷山，歷山之人皆讓畔；","items":[{"source":"zhengyi","label":"正義","text":"韓非子「歷山之農相侵略，舜往耕，朞年，耕者讓畔」也。"}],"sentence_id":"s162"},{"id":"n212","anchor_text":"雷澤上人皆讓居；陶河濱，河濱器皆不苦窳。","items":[{"source":"jijie","label":"集解","text":"《史記音隱》曰：「音游甫反。」駰謂寙，病也。"},{"source":"zhengyi","label":"正義","text":"苦，讀如盬，音古。盬，麤也。寙音庾。"}],"sentence_id":"s162"},{"id":"n213","anchor_text":"一年而所居成聚，","items":[{"source":"zhengyi","label":"正義","text":"聚，在喻反，謂村落也。"}],"sentence_id":"s163"},{"id":"n214","anchor_text":"二年成邑，三年成都。","items":[{"source":"zhengyi","label":"正義","text":"《周禮》郊野法云「九夫爲井，四井爲邑，四邑爲丘，四丘爲甸，四甸爲縣，四縣爲都」也。"}],"sentence_id":"s163"},{"id":"n215","anchor_text":"堯乃賜舜絺衣，","items":[{"source":"zhengyi","label":"正義","text":"絺，勑遲反，細葛布衣也。鄒氏音竹几反。"}],"sentence_id":"s164"},{"id":"n216","anchor_text":"火焚廩。舜乃以兩笠自扞而下，去，得不死。","items":[{"source":"suoyin","label":"索隱","text":"言以笠自扞己身，有似鳥張翅而輕下，得不損傷。皇甫謐云「兩繖」，繖，笠類。《列女傳》云「二女教舜鳥工上廩」是也。"},{"source":"zhengyi","label":"正義","text":"通史云：「瞽叟使舜滌廩，舜告堯二女，女曰：『時其焚汝，鵲汝衣裳，鳥工往。』舜既登廩，得免去也。」"}],"sentence_id":"s166"},{"id":"n217","anchor_text":"後瞽叟又使舜穿井，舜穿井爲匿空","items":[{"source":"suoyin","label":"索隱","text":"音孔。《列女傳》所謂「龍工入井」是也。"}],"sentence_id":"s167"},{"id":"n218","anchor_text":"旁出。","items":[{"source":"zhengyi","label":"正義","text":"言舜潛匿穿孔旁，從他井而出也。通史云：「舜穿井，又告二女。二女曰：『去汝裳衣。龍工往。』入井，瞽叟與象下土實井，舜從他井出去也。」《括地志》云：「舜井在嬀州懷戎縣西外城中。其西又有一井，耆舊傳云並舜井也，舜自中出。《帝王紀》云河東有舜井，未詳也。」"}],"sentence_id":"s167"},{"id":"n219","anchor_text":"舜既入深，瞽叟與象共下土實井，","items":[{"source":"suoyin","label":"索隱","text":"亦作「填井」。"}],"sentence_id":"s168"},{"id":"n220","anchor_text":"舜從匿空出，去。","items":[{"source":"jijie","label":"集解","text":"劉熙曰：「舜以權謀自免，亦大聖有神人之助也。」"}],"sentence_id":"s168"},{"id":"n221","anchor_text":"爲已死。象曰「本謀者象。」象與其父母分，","items":[{"source":"zhengyi","label":"正義","text":"扶問反。"}],"sentence_id":"s171"},{"id":"n222","anchor_text":"象取之。牛羊倉廩予父母。」象乃止舜宮居，","items":[{"source":"zhengyi","label":"正義","text":"宮即室也。《爾雅》云「室謂之宮」。《禮》云「命士已上，父子異宮」也。"}],"sentence_id":"s164"},{"id":"n223","anchor_text":"我思舜正鬱陶！」舜曰：「然，爾其庶矣！」","items":[{"source":"suoyin","label":"索隱","text":"言汝猶當庶幾於友悌之情義也。如孟子取《尚書》文，又云「惟茲臣庶，女其于予治」，蓋欲令象共我理臣庶也。"}],"sentence_id":"s175"},{"id":"n224","anchor_text":"昔高陽氏有才子八人，","items":[{"source":"jijie","label":"集解","text":"名見《左傳》。"}],"sentence_id":"s179"},{"id":"n225","anchor_text":"世得其利，謂之「八愷」。","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「愷，和也。」"},{"source":"suoyin","label":"索隱","text":"《左傳》史克對魯宣公曰：「昔高陽氏有才子八人，倉舒、隤皚、檮戭、大臨、尨降、庭堅、仲容、叔達。」"}],"sentence_id":"s179"},{"id":"n226","anchor_text":"昔高陽氏有才子八人，","items":[{"source":"jijie","label":"集解","text":"名見《左傳》。"}],"sentence_id":"s179"},{"id":"n227","anchor_text":"世謂之「八元」。","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「元，善也。」"},{"source":"suoyin","label":"索隱","text":"《左傳》：「高辛氏有才子八人，伯奮、仲堪、叔獻、季仲、伯虎、仲熊、叔豹、季貍。」"}],"sentence_id":"s180"},{"id":"n228","anchor_text":"此十六族者，世濟其美，","items":[{"source":"suoyin","label":"索隱","text":"謂元、愷各有親族，故稱族也。濟，成也，言後代成前代也。"}],"sentence_id":"s181"},{"id":"n229","anchor_text":"。至於堯，堯未能舉。舜舉八愷，使主后土，","items":[{"source":"jijie","label":"集解","text":"王肅曰：「君治九土之宜。」杜預曰：「后土地官。」"},{"source":"suoyin","label":"索隱","text":"主土。禹爲司空，司空主土，則禹在八愷之中。"},{"source":"zhengyi","label":"正義","text":"春秋《正義》云：「后，君也。天曰皇天，地曰后土。」"}],"sentence_id":"s183"},{"id":"n230","anchor_text":"以揆百事，莫不時序。","items":[{"source":"zhengyi","label":"正義","text":"言禹度九土之宜，無不以時得其次序也。"}],"sentence_id":"s183"},{"id":"n231","anchor_text":"舉八元，使布五教于四方，","items":[{"source":"suoyin","label":"索隱","text":"契爲司徒，司徒敷五教，則契在八元之數。"}],"sentence_id":"s184"},{"id":"n232","anchor_text":"父義，母慈，兄友，弟恭，子孝，內平外成。","items":[{"source":"zhengyi","label":"正義","text":"杜預云：「內諸夏，外夷狄也。」案：契作五常之教，諸夏太平，夷狄向化也。"}],"sentence_id":"s184"},{"id":"n233","anchor_text":"昔帝鴻氏有不才子，","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「帝鴻，黃帝也。不才子，其苗裔讙兜也。」"}],"sentence_id":"s185"},{"id":"n234","anchor_text":"掩義隱賊，好行凶慝，天下謂之渾沌。","items":[{"source":"zhengyi","label":"正義","text":"慝，惡也。一本云「天下之民，謂之渾沌」。渾沌即讙兜也。言掩義事，陰爲賊害，而好凶惡，故謂之渾沌也。杜預云：「渾沌，不開通之貌。」《神異經》云：「崑崙西有獸焉，其狀如犬，長毛，四足，似羆而無爪，有目而不見，行不開，有兩耳而不聞，有人知性，有腹無五藏，有腸直而不旋，食徑過。人有德行而往扺觸之，有凶德則往依憑之。名渾沌。」又莊子云：「南海之帝爲儵，北海之帝爲忽，中央之帝爲渾沌。儵、忽乃相遇於渾沌之地，渾沌待之甚善。儵與忽謀欲報渾沌之德，曰：『人皆有七竅以視聽食息，此獨無有，嘗試鑿之。』日鑿一竅，七日而渾沌死。」案：言讙兜性似，故號之也。"}],"sentence_id":"s185"},{"id":"n235","anchor_text":"少暤氏","items":[{"source":"jijie","label":"集解","text":"服虔曰：「金天氏帝號。」"}],"sentence_id":"s186"},{"id":"n236","anchor_text":"才子，毀信惡忠，崇飾惡言，天下謂之窮奇。","items":[{"source":"jijie","label":"集解","text":"服虔曰：「謂共工氏也。其行窮而好奇。」"},{"source":"zhengyi","label":"正義","text":"謂共工。言毀敗信行，惡其忠直，有惡言語，高粉飾之，故謂之窮奇。案常行終必窮極，好諂諛奇異於人也。《神異經》云：「西北有獸，其狀似虎，有翼能飛，便勦食人，知人言語，聞人鬬輒食直者，聞人忠信輒食其鼻，聞人惡逆不善輒殺獸往饋之，名曰窮奇。」案：言共工性似，故號之也。"}],"sentence_id":"s186"},{"id":"n237","anchor_text":"才子，不可教訓，不知話言，天下謂之檮杌。","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「檮杌，頑凶無疇匹之貌，謂鯀也。」"},{"source":"zhengyi","label":"正義","text":"檮音道刀反。杌音五骨反。謂鯀也。凶頑不可教訓，不從詔令，故謂之檮杌。案：言無疇匹，言自縱恣也。《神異經》云：「西方荒中有獸焉，其狀如虎而大，毛長二尺，人面，虎足，豬口牙，尾長一丈八尺，攪亂荒中，名檮杌。一名傲很，一名難訓。」案：言鯀性似，故號之也。"}],"sentence_id":"s187"},{"id":"n238","anchor_text":"此三族世憂之。至于堯，堯未能去。縉雲氏","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「縉雲氏，姜姓也，炎帝之苗裔，當黃帝時任縉雲之官也。」"},{"source":"zhengyi","label":"正義","text":"今括州縉雲縣，蓋其所封也。《字書》云縉，赤繒也。"}],"sentence_id":"s188"},{"id":"n239","anchor_text":"才子，貪于飲食，冒于貨賄，天下謂之饕餮。","items":[{"source":"zhengyi","label":"正義","text":"謂三苗也。言貪飲食，冒貨賄，故謂之饕餮。《神異經》云：「西南有人焉，身多毛，頭上戴豕，性很惡，好息，積財而不用，善奪人穀物。強者奪老弱者，畏羣而擊單，名饕餮。」言三苗性似，故號之。"}],"sentence_id":"s190"},{"id":"n240","anchor_text":"天下惡之，比之三凶。","items":[{"source":"jijie","label":"集解","text":"杜預曰：「非帝子孫，故別之以比三凶也。」"},{"source":"zhengyi","label":"正義","text":"此以上四處皆《左傳》文。或本有並文次相類四凶，故書之，恐本錯脫耳。"}],"sentence_id":"s191"},{"id":"n241","anchor_text":"舜賓於四門，","items":[{"source":"zhengyi","label":"正義","text":"杜預云：「闢四門，達四聰，以賓禮眾賢也。」"}],"sentence_id":"s192"},{"id":"n242","anchor_text":"乃流四凶族，遷于四裔，","items":[{"source":"jijie","label":"集解","text":"賈逵曰：「四裔之地，去王城四千里。」"}],"sentence_id":"s192"},{"id":"n243","anchor_text":"以御螭魅，","items":[{"source":"jijie","label":"集解","text":"服虔曰：「螭魅，人面獸身，四足，好惑人，山林異氣所生，以爲人害。」"},{"source":"zhengyi","label":"正義","text":"御音魚呂反。螭音丑知反。魅音媚。案：御魑魅，恐更有邪諂之人，故流放四凶以禦之也。故下云「無凶人」也。"}],"sentence_id":"s192"},{"id":"n244","anchor_text":"三年喪畢，讓丹朱，天下歸舜。而禹、皋陶、","items":[{"source":"zhengyi","label":"正義","text":"高姚二音。"}],"sentence_id":"s197"},{"id":"n245","anchor_text":"契、后稷、伯夷、夔、龍、倕、益、彭祖","items":[{"source":"suoyin","label":"索隱","text":"彭祖即陸終氏之第三子，籛鏗之後，後爲大彭，亦稱彭祖。"},{"source":"zhengyi","label":"正義","text":"皋陶字庭堅。英六二國是其後也。契音薛，殷之祖也。伯夷，齊太公之祖也。夔，巨龜反，樂官也。倕音垂，亦作「垂」，內言之官也。益，伯翳也，即秦、趙之祖。彭祖自堯時舉用，歷夏、殷封於大彭。"}],"sentence_id":"s198"},{"id":"n246","anchor_text":"自堯時而皆舉用，未有分職。","items":[{"source":"zhengyi","label":"正義","text":"分音符問反，又如字。分謂封疆爵土也。"}],"sentence_id":"s198"},{"id":"n247","anchor_text":"方耳目，命十二牧論帝德，行厚德，遠佞人，","items":[{"source":"zhengyi","label":"正義","text":"舜命十二牧論帝堯之德，又敦之於民，遠離邪佞之人。言能如此，則夷狄亦服從也。"}],"sentence_id":"s199"},{"id":"n248","anchor_text":"則蠻夷率服。舜謂四嶽曰：「有能奮庸","items":[{"source":"jijie","label":"集解","text":"馬融曰：「奮，明；庸，功也。」"}],"sentence_id":"s200"},{"id":"n249","anchor_text":"，讓於稷、契與皋陶。舜曰：「然，往矣。」","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「然其舉得其人。汝往居此官，不聽其所讓也。」"}],"sentence_id":"s204"},{"id":"n250","anchor_text":"舜曰：「弃，黎民始飢，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「《今文尚書》作『祖飢』。祖，始也。」"},{"source":"suoyin","label":"索隱","text":"古文作「阻飢」。孔氏以爲阻，難也。祖阻聲相近，未知誰得。"}],"sentence_id":"s206"},{"id":"n251","anchor_text":"汝后稷播時百穀。」","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「時，讀曰蒔。」"},{"source":"zhengyi","label":"正義","text":"稷，農官也。播時謂順四時而種百穀。"}],"sentence_id":"s206"},{"id":"n252","anchor_text":"舜曰：「契，百姓不親，五品不馴，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「五品，父、母、兄、弟、子也。」王肅曰：「五品，五常也。」"},{"source":"zhengyi","label":"正義","text":"馴音訓。"}],"sentence_id":"s207"},{"id":"n253","anchor_text":"汝爲司徒，而敬敷五教，在寬。」","items":[{"source":"jijie","label":"集解","text":"馬融曰：「五品之教。」"}],"sentence_id":"s207"},{"id":"n254","anchor_text":"舜曰：「皋陶，蠻夷猾夏，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「猾夏，侵亂中國也。」"}],"sentence_id":"s208"},{"id":"n255","anchor_text":"寇賊姦軌，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「由內爲姦，起外爲軌。」"},{"source":"zhengyi","label":"正義","text":"亦作「宄」。"}],"sentence_id":"s208"},{"id":"n256","anchor_text":"汝作士，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「獄官之長。」"},{"source":"zhengyi","label":"正義","text":"案：若大理卿也。"}],"sentence_id":"s208"},{"id":"n257","anchor_text":"五刑有服，五服三就；","items":[{"source":"jijie","label":"集解","text":"馬融曰：「五刑，墨、劓、剕、宮、大辟。三就，謂大罪陳諸原野，次罪於市朝，同族適甸師氏。既服五刑，當就三處。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「服，從也，言得輕重之中正也。」案：墨，點鑿其額，涅以墨。劓，截鼻也。剕，刖足也。宮，淫刑也，男子割勢，婦人幽閉也。大辟，死刑也。"}],"sentence_id":"s208"},{"id":"n258","anchor_text":"五流有度，","items":[{"source":"zhengyi","label":"正義","text":"度音徒洛反。《尚書》作「宅」。孔安國云「五刑之流，各有所居」也。"}],"sentence_id":"s208"},{"id":"n259","anchor_text":"五度三居：","items":[{"source":"zhengyi","label":"正義","text":"案：謂度其遠近，爲三等之居也。"}],"sentence_id":"s208"},{"id":"n260","anchor_text":"維明能信。」","items":[{"source":"jijie","label":"集解","text":"馬融曰：「謂在八議，君不忍刑，宥之以遠。五等之差亦有三等之居：大罪投四裔，次九州之外，次中國之外。當明其罪，能使信服之。」"}],"sentence_id":"s208"},{"id":"n261","anchor_text":"舜曰：「誰能馴予工？」","items":[{"source":"jijie","label":"集解","text":"馬融曰：「謂主百工之官也。」"}],"sentence_id":"s209"},{"id":"n262","anchor_text":"皆曰垂可。於是以垂爲共工。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「爲司空，共理百工之事。」"}],"sentence_id":"s211"},{"id":"n263","anchor_text":"舜曰：「誰能馴予上下","items":[{"source":"jijie","label":"集解","text":"馬融曰：「上謂原，下謂隰。」"}],"sentence_id":"s212"},{"id":"n264","anchor_text":"草木鳥獸？」皆曰益可。於是以益爲朕虞。","items":[{"source":"jijie","label":"集解","text":"馬融曰：「虞，掌山澤之官名。」"}],"sentence_id":"s214"},{"id":"n265","anchor_text":"益拜稽首，讓于諸臣朱虎、熊羆。","items":[{"source":"suoyin","label":"索隱","text":"即高辛氏之子伯虎、仲熊也。"},{"source":"zhengyi","label":"正義","text":"孔安國云：「朱虎，熊羆，二臣名。垂、益所讓四人，皆在元凱之中也。」"}],"sentence_id":"s215"},{"id":"n266","anchor_text":"曰：「往矣，汝諧。」遂以朱虎、熊羆爲佐。","items":[{"source":"zhengyi","label":"正義","text":"爲益之佐也。"}],"sentence_id":"s217"},{"id":"n267","anchor_text":"舜曰：「嗟！四嶽，有能典朕三禮？」","items":[{"source":"jijie","label":"集解","text":"馬融曰：「三禮，天神、地祇、人鬼之禮也。」鄭玄曰：「天事、地事、人事之禮。」"}],"sentence_id":"s219"},{"id":"n268","anchor_text":"曰伯夷可。舜曰：「嗟！伯夷，以汝爲秩宗，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「主次秩尊卑。」"},{"source":"zhengyi","label":"正義","text":"若太常也。《漢書百官表》云「王莽改太常曰秩宗」，依古也。孔安國云：「秩，序；宗，尊也。主郊廟之官也。」"}],"sentence_id":"s222"},{"id":"n269","anchor_text":"夙夜維敬，直哉維靜絜。」","items":[{"source":"zhengyi","label":"正義","text":"靜，清也。絜，明也。孔安國云：「職典禮，施政教，使正直而清明。」"}],"sentence_id":"s222"},{"id":"n270","anchor_text":"伯夷讓夔、龍。舜曰：「然。","items":[{"source":"zhengyi","label":"正義","text":"孔安國云：「然其推賢，不許其讓也。」"}],"sentence_id":"s223"},{"id":"n271","anchor_text":"以夔爲典樂，教稺子，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「國子也。」案：《尚書》作「冑子」，稺冑聲相近。"},{"source":"zhengyi","label":"正義","text":"稺，冑雉反。孔安國云：「冑，長也。謂元子以下，至卿大夫子弟，以歌詩蹈之舞之，教長國子中和祗庸孝友。」"}],"sentence_id":"s225"},{"id":"n272","anchor_text":"直而溫，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「正直而色溫和。」"}],"sentence_id":"s225"},{"id":"n273","anchor_text":"寬而栗，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「寬大而謹敬戰栗也。」"}],"sentence_id":"s225"},{"id":"n274","anchor_text":"剛而毋虐，簡而毋傲；","items":[{"source":"zhengyi","label":"正義","text":"孔安國云：「剛失之虐，簡失之傲，教之以防其失也。」"}],"sentence_id":"s225"},{"id":"n275","anchor_text":"詩言意，歌長言，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「歌，所以長言詩之意也。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「詩言志以導其心，歌詠其義以長其言也。」"}],"sentence_id":"s225"},{"id":"n276","anchor_text":"聲依永，律和聲，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「聲之曲折又依長言，聲中律乃爲和也。」"},{"source":"zhengyi","label":"正義","text":"孔安國云：「聲，五聲，宮、商、角、徵、羽也。律謂六律六呂，十二月之音氣也。當依聲律和樂也。」"}],"sentence_id":"s225"},{"id":"n277","anchor_text":"八音能諧，毋相奪倫，神人以和。」","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「祖考來格，羣后德讓，其一隅也。」"},{"source":"zhengyi","label":"正義","text":"八音，金、石、絲、竹、匏、土、革、木也。孔安國云：「倫，理也。八音能諧，理不錯奪，則神人咸和，命夔使勉也。」"}],"sentence_id":"s225"},{"id":"n278","anchor_text":"夔曰：「於！予擊石拊石，百獸率舞。」","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「百獸，服不氏所養者也。率舞，言音和也。」"},{"source":"zhengyi","label":"正義","text":"於音烏。孔安國云：「石磬，音之清者。拊亦擊也。舉清者和，則其餘皆從矣。樂感百獸，使相率而舞，則神人和可知也。」案：磬，一片黑石也。不音福尤反。周《禮》云「夏官有服不氏，掌服猛獸，下士一人，徒四人」。鄭玄云「服不服之獸也」。"}],"sentence_id":"s227"},{"id":"n279","anchor_text":"舜曰：「龍，朕畏忌讒說殄僞，振驚朕眾，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「一云『齊說殄行，振驚眾』。」駰案：鄭玄曰「所謂色取仁而行違，是驚動我之眾臣，使之疑惑」。"},{"source":"zhengyi","label":"正義","text":"僞音危睡反。言畏惡利口讒說之人，兼殄絕姦僞人黨，恐其驚動我眾，使龍遏絕之，出入其命惟信實也。此「僞」字太史公變《尚書》文也。《尚書》僞字作「行」，音下孟反。言己畏忌有利口讒說之人，殄絕無德行之官也。"}],"sentence_id":"s228"},{"id":"n280","anchor_text":"命汝爲納言，夙夜出入朕命，惟信。」","items":[{"source":"zhengyi","label":"正義","text":"孔安國云：「納言，喉舌之官也。聽下言納於上，受上言宣於下，必信也。」"}],"sentence_id":"s228"},{"id":"n281","anchor_text":"舜曰：「嗟！女二十有二人，","items":[{"source":"jijie","label":"集解","text":"馬融曰：「稷、契、皋陶皆居官久，有成功，但述而美之，無所復勅。禹及垂已下皆初命，凡六人，與上十二牧四嶽，凡二十二人。」鄭玄曰：「皆格于文祖時所勅命也。」"}],"sentence_id":"s230"},{"id":"n282","anchor_text":"敬哉，惟時相天事。」","items":[{"source":"zhengyi","label":"正義","text":"相，視也。舜命二十二人各敬行其職，惟在順時，視天所宜而行事也。"}],"sentence_id":"s230"},{"id":"n283","anchor_text":"考功，三考絀陟，遠近眾功咸興。分北三苗。","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「所竄三苗爲西裔諸侯者猶爲惡，乃復分析流之。」"}],"sentence_id":"s231"},{"id":"n284","anchor_text":"此二十二人咸成厥功：皋陶爲大理，平，","items":[{"source":"zhengyi","label":"正義","text":"皋陶作士，正平天下罪惡也。"}],"sentence_id":"s233"},{"id":"n285","anchor_text":"伏得其實；伯夷主禮，上下咸讓；垂主工師，","items":[{"source":"zhengyi","label":"正義","text":"工師，若今大匠卿也。"}],"sentence_id":"s233"},{"id":"n286","anchor_text":"百工致功；益主虞，山澤辟；","items":[{"source":"zhengyi","label":"正義","text":"婢亦反，開也。"}],"sentence_id":"s233"},{"id":"n287","anchor_text":"主賓客，遠人至；十二牧行而九州莫敢辟違；","items":[{"source":"zhengyi","label":"正義","text":"禹九州之民無敢辟違舜十二牧也。"}],"sentence_id":"s233"},{"id":"n288","anchor_text":"唯禹之功爲大，披九山，","items":[{"source":"zhengyi","label":"正義","text":"披音皮義反。謂傍其山邊以通。"}],"sentence_id":"s233"},{"id":"n289","anchor_text":"宜。方五千里，至于荒服。南撫交阯、北發，","items":[{"source":"suoyin","label":"索隱","text":"一句。"}],"sentence_id":"s234"},{"id":"n290","anchor_text":"宜。方五千里，至于荒服。南撫交阯、北發，","items":[{"source":"suoyin","label":"索隱","text":"一句。"}],"sentence_id":"s234"},{"id":"n291","anchor_text":"北山戎、發、息慎，","items":[{"source":"jijie","label":"集解","text":"鄭玄曰：「息慎，或謂之肅慎，東北夷。」"}],"sentence_id":"s235"},{"id":"n292","anchor_text":"東長、鳥夷，","items":[{"source":"suoyin","label":"索隱","text":"此言帝舜之德皆撫及四方夷人，故先以「撫」字總之。北發當云「北戶」，南方有地名北戶。又案《漢書》，北發是北方國名，今以北發爲南方之國，誤也。此文省略，四夷之名錯亂。「西戎」上少一「西」字，「山戎」下少一「北」字，「長」字下少一「夷」字。長夷也，鳥夷也，其意宜然。今案：《大戴禮》亦云「長夷」，則長是夷號。又云「鮮支、渠搜」，則鮮支當此析枝也。鮮析音相近。鄒氏、劉氏云「息並音肅」，非也。且夷狄之名，古書不必皆同，今讀如字也。"},{"source":"zhengyi","label":"正義","text":"注「鳥」或作「島」。《括地志》云：「百濟國西南海中有大島十五所，皆置邑，有人居，屬百濟。又倭國西南大海中島居凡百餘小國，在京南萬三千五百里。」案：武后改倭國爲日本國。"}],"sentence_id":"s235"},{"id":"n293","anchor_text":"四海之內","items":[{"source":"zhengyi","label":"正義","text":"《爾雅》云：「九夷八狄七戎六蠻謂之四海。」"}],"sentence_id":"s235"},{"id":"n294","anchor_text":"咸戴帝舜之功。於是禹乃興九招之樂，","items":[{"source":"suoyin","label":"索隱","text":"招音韶，即舜樂簫韶。九成，故曰九招。"}],"sentence_id":"s236"},{"id":"n295","anchor_text":"子事，年五十八堯崩，年六十一代堯踐帝位。","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「舜所都，或言蒲阪，或言平陽，或言潘。潘，今上谷也。」"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「平陽，今晉州城是也。潘，今嬀州城是也。蒲阪，今蒲州南二里河東縣界蒲阪故城是也。」"}],"sentence_id":"s238"},{"id":"n296","anchor_text":"，崩於蒼梧之野。葬於江南九疑，是爲零陵。","items":[{"source":"jijie","label":"集解","text":"《皇覽》曰：「舜冢在零陵營浦縣。其山九谿皆相似，故曰九疑。傳曰『舜葬蒼梧，象爲之耕』。《禮記》曰『舜葬蒼梧，二妃不從』。《山海經》曰『蒼梧山，帝舜葬于陽，丹朱葬于陰』。」皇甫謐曰：「或曰二妃葬衡山。」"}],"sentence_id":"s240"},{"id":"n297","anchor_text":"踐帝位，載天子旗，往朝父瞽叟，夔夔唯謹，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「和敬貌。」"}],"sentence_id":"s241"},{"id":"n298","anchor_text":"如子道。封弟象爲諸侯。","items":[{"source":"jijie","label":"集解","text":"孟子曰：「封之有庳。」音鼻。"},{"source":"zhengyi","label":"正義","text":"《帝王紀》云：「舜弟象封於有鼻。」《括地志》云：「鼻亭神在營道縣北六十里。故老傳云，舜葬九疑，象來至此，後人立祠，名爲鼻亭神。《輿地志》云零陵郡應陽縣東有山，山有象廟。王隱《晉書》云本泉陵縣，北部東五里有鼻墟，象所封也。」"}],"sentence_id":"s242"},{"id":"n299","anchor_text":"舜子商均亦不肖，","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「娥皇無子，女英生商均。」"},{"source":"zhengyi","label":"正義","text":"譙周云：「以虞封舜子，今宋州虞城縣。」《括地志》云：「虞國，舜後所封邑也。或云封舜子均於商，故號商均也。」"}],"sentence_id":"s243"},{"id":"n300","anchor_text":"舜乃豫薦禹於天。","items":[{"source":"suoyin","label":"索隱","text":"謂告天使之攝位也。"}],"sentence_id":"s243"},{"id":"n301","anchor_text":"十七年而崩。三年喪畢，禹亦乃讓舜子，","items":[{"source":"zhengyi","label":"正義","text":"《括地志》云：「禹居洛州陽城者，避商均，非時久居也。」"}],"sentence_id":"s245"},{"id":"n302","anchor_text":"踐天子位。堯子丹朱，舜子商均，皆有疆土，","items":[{"source":"jijie","label":"集解","text":"譙周曰：「以唐封堯之子，以虞封舜之子。」"},{"source":"suoyin","label":"索隱","text":"《漢書律曆志》云封堯子朱於丹淵爲諸侯。商均封虞，在梁國，今虞城縣也。"},{"source":"zhengyi","label":"正義","text":"《括地志》云：「定州唐縣，堯後所封。宋州虞城縣，舜後所封也。」"}],"sentence_id":"s247"},{"id":"n303","anchor_text":"以奉先祀。服其服，禮樂如之。以客見天子，","items":[{"source":"zhengyi","label":"正義","text":"爲天子之賓客也。"}],"sentence_id":"s248"},{"id":"n304","anchor_text":"帝至舜、禹，皆同姓而異其國號，以章明德。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「外傳曰『黃帝二十五子，其得姓者十四人』。虞翻云『以德爲氏姓』。又虞說以凡有二十五人，其二人同姓姬，又十一人爲十一姓，酉、祁、已、滕、葴、任、荀、釐、姞、儇、衣是也，餘十二姓德薄不紀錄。」"},{"source":"zhengyi","label":"正義","text":"釐音力其反。姞音其吉反。儇音在宣反。"}],"sentence_id":"s250"},{"id":"n305","anchor_text":"，帝顓頊爲高陽，帝嚳爲高辛，帝堯爲陶唐，","items":[{"source":"jijie","label":"集解","text":"韋昭曰：「陶唐皆國名，猶湯稱殷商矣。」張晏曰：「堯爲唐侯，國於中山，唐縣是也。」"}],"sentence_id":"s251"},{"id":"n306","anchor_text":"帝舜爲有虞。","items":[{"source":"jijie","label":"集解","text":"皇甫謐曰：「舜嬪于虞，因以爲氏，今河東大陽西山上虞城是也。」"}],"sentence_id":"s251"},{"id":"n307","anchor_text":"禹爲夏后而別氏，姓姒氏。契爲商，姓子氏。","items":[{"source":"suoyin","label":"索隱","text":"禮緯曰：「禹母脩己吞薏苡而生禹，因姓姒氏。」而契姓子氏者，亦以其母吞乙子而生。"}],"sentence_id":"s252"},{"id":"n308","anchor_text":"弃爲周，姓姬氏。","items":[{"source":"jijie","label":"集解","text":"鄭玄駮許慎五經異義曰：「《春秋左傳》『無駭卒，羽父請謚與族。公問族於眾仲，眾仲對曰：「天子建德，因生以賜姓，胙之土而命之氏。諸侯以字爲氏，因以爲族。官有世功，則有官族，邑亦如之。」公命以字爲展氏』。以此言之，天子賜姓命氏，諸侯命族。族者，氏之別名也。姓者，所以統繫百世，使不別也。氏者，所以別子孫之所出。故《世本》之篇，言姓則在上，言氏則在下也。」"}],"sentence_id":"s254"},{"id":"n309","anchor_text":"太史公曰：","items":[{"source":"zhengyi","label":"正義","text":"太史公，司馬遷自謂也。自敍傳云「太史公曰先人有言」，又云「太史公曰余聞之董生」，又云「太史公遭李陵之禍」。明太史公，司馬遷自號也。遷爲太史公官，題贊首也。虞憙云：「古者主天官者皆上公，非獨遷。」"}],"sentence_id":"s255"},{"id":"n310","anchor_text":"學者多稱五帝，尚矣。","items":[{"source":"suoyin","label":"索隱","text":"尚，上也，言久遠也。然「尚矣」文出《大戴禮》。"}],"sentence_id":"s255"},{"id":"n311","anchor_text":"》獨載堯以來；而百家言黃帝，其文不雅馴，","items":[{"source":"zhengyi","label":"正義","text":"馴，訓也。謂百家之言皆非典雅之訓。"}],"sentence_id":"s256"},{"id":"n312","anchor_text":"薦紳先生難言之。","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「薦紳即縉紳也，古字假借。」"}],"sentence_id":"s256"},{"id":"n313","anchor_text":"孔子所傳宰予問《五帝德》及帝繫姓，","items":[{"source":"zhengyi","label":"正義","text":"繫音奚計反。"}],"sentence_id":"s257"},{"id":"n314","anchor_text":"儒者或不傳。","items":[{"source":"suoyin","label":"索隱","text":"《五帝德》、帝繫姓皆《大戴禮》及《孔子家語》篇名。以二者皆非正經，故漢時儒者以爲非聖人之言，故多不傳學也。"}],"sentence_id":"s257"},{"id":"n315","anchor_text":"余嘗西至空桐，","items":[{"source":"zhengyi","label":"正義","text":"余，太史公自稱也。嘗，曾也。空桐山在原州平高縣西百里，黃帝問道於廣成子處。"}],"sentence_id":"s258"},{"id":"n316","anchor_text":"北過涿鹿，","items":[{"source":"zhengyi","label":"正義","text":"涿鹿山在嬀州東南五十里，山側有涿鹿城，即黃帝、堯、舜之都也。"}],"sentence_id":"s017"},{"id":"n317","anchor_text":"舜之處，風教固殊焉，總之不離古文者近是。","items":[{"source":"suoyin","label":"索隱","text":"古文即帝德、帝系二書也。近是聖人之說。"}],"sentence_id":"s258"},{"id":"n318","anchor_text":"《國語》，其發明《五帝德》、帝繫姓章矣，","items":[{"source":"suoyin","label":"索隱","text":"太史公言己以春秋、《國語》古書博加考驗，益以發明《五帝德》等說甚章著也。"}],"sentence_id":"s259"},{"id":"n319","anchor_text":"顧弟弗深考，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「弟，但也。《史記》、《漢書》見此者非一。又左思蜀都賦曰『弟如滇池』，而不詳者多以爲字誤。學者安可不博觀乎？」"},{"source":"zhengyi","label":"正義","text":"顧，念也。弟，且也。太史公言博考古文，擇其言表見之不虛，甚章著矣，思念亦且不須更深考論。"}],"sentence_id":"s259"},{"id":"n320","anchor_text":"其所表見皆不虛。","items":[{"source":"suoyin","label":"索隱","text":"言帝德、帝系所有表見者皆不爲虛妄也。"}],"sentence_id":"s259"},{"id":"n321","anchor_text":"書缺有閒矣，","items":[{"source":"zhengyi","label":"正義","text":"言《古文尚書》缺失其閒多矣，而無說黃帝之語。"}],"sentence_id":"s260"},{"id":"n322","anchor_text":"其軼乃時時見於他說。","items":[{"source":"suoyin","label":"索隱","text":"言古典殘缺有年載，故曰「有閒」。然皇帝遺事散軼，乃時時旁見於他記說，即帝德、帝系等說也。故己今採案而備論黃帝已來事耳。"}],"sentence_id":"s260"},{"id":"n323","anchor_text":"余并論次，擇其言尤雅者，故著爲本紀書首。","items":[{"source":"zhengyi","label":"正義","text":"太史公據古文并諸子百家論次，擇其言語典雅者，故著爲《五帝本紀》，在《史記》百三十篇書之首。"}],"sentence_id":"s262"}]};

// ── Block 渲染器 ──
function renderBlock(b) {
  const eid = id => id ? `pn-${id.replace(/\./g, '-')}` : null;
  const paraNum = id => id ? `<a class="para-num" id="${eid(id)}">${id}</a> ` : '';
  const indentStyle = b.indent ? ' style="margin-left:2em;"' : '';

  switch(b.t) {
    case 'h2': return `<h2>${b.text}</h2>`;
    case 'h3': return `<h3>${b.text}</h3>`;
    case 'hr': return '<hr style="border:none;border-top:1px solid #e0d8cc;margin:28px 0;">';
    case 'p': {
      let inner = b.html;
      return `<p${indentStyle}>${paraNum(b.id)}${inner}</p>`;
    }
    case 'causal': {
      const paraLine = b.id ? `<p>${paraNum(b.id)}</p>` : '';
      const ind = b.indent !== false ? ' style="margin-left:2em;"' : '';
      return `${paraLine}<div class="causal"${ind} data-rel-id="${b.rid}">\n        <div class="cause" data-rel-id="${b.cause.rid}">${b.cause.html}</div>\n        <div class="effect" data-rel-id="${b.effect.rid}" data-rel-from="${b.cause.rid}" data-rel-type="causal" data-rel-anchor="tail">${b.effect.html}</div>\n      </div>`;
    }
    case 'escalation':
      return `<div class="escalation" data-rel-id="${b.rid}" data-rel-from="${b.from}" data-rel-type="escalation" data-rel-anchor="${b.anchor||'head'}">${b.html}</div>`;
    case 'sequel':
      return `<p${indentStyle} data-rel-id="${b.rid}" data-rel-from="${b.from}" data-rel-type="sequel" data-rel-anchor="${b.anchor||'head'}">${b.html}</p>`;
    case 'summary':
      return `<div class="summary-line" data-rel-id="${b.rid||''}" ${b.from ? `data-rel-from="${b.from}" data-rel-type="summary" data-rel-anchor="${b.anchor||'head'}"` : ''}>${b.html}</div>`;
    case 'list': {
      const items = (b.items||[]).map(it => `<li>${it}</li>`).join('');
      return `<ul${indentStyle} style="list-style:none;padding:0;">${items}</ul>`;
    }
    case 'parallel': {
      const items = (b.items||[]).map(it => `<span class="item">${it}</span>`).join(' ');
      return `<div class="parallel"${indentStyle}>${items}</div>`;
    }
    case 'dialogue': {
      const hdr = b.id ? `<p>${paraNum(b.id)}</p>` : '';
      const dlines = (b.lines||[]).map(l =>
        `<li>${paraNum(l.id)}${l.html}</li>`
      ).join('');
      return `${hdr}<ul${indentStyle} style="list-style:none;padding:0;">${dlines}</ul>`;
    }
    case 'continuation':
      return `<p${indentStyle}>${b.html}</p>`;
    case 'cite':
      return `<p class="citation">${b.html}</p>`;
    case 'block': {
      const inner = (b.blocks||[]).map(renderBlock).join('');
      return `<div class="block-indent">${inner}</div>`;
    }
    default: return '';
  }
}

function renderAllBlocks(blocks) {
  return blocks.map(renderBlock).join('\n');
}

// ── 注释面板渲染 ──
function renderNotes(notes) {
  const BADGE = {
    jijie:   {label:'集解', cls:'badge-jijie'},
    suoyin:  {label:'索隱', cls:'badge-suoyin'},
    zhengyi: {label:'正義', cls:'badge-zhengyi'},
  };
  let html = '<h3>三家注 <span style="font-size:0.8em;color:#aaa;font-weight:normal;">(' + notes.length + '条)</span></h3>';
  for (const note of notes) {
    if (!note.items || !note.items.length) continue;
    const srcs = note.items.map(i => i.source);
    const grpCls = srcs.length === 1 ? srcs[0] : 'mixed';
    const itemsHtml = note.items.map(it => {
      const b = BADGE[it.source] || {label:it.source, cls:''};
      return `<div class="note-item"><span class="badge ${b.cls}">${b.label}</span><span class="note-text">${it.text}</span></div>`;
    }).join('');
    const ref = note.anchor_text ? note.anchor_text.slice(0, 20) : note.id;
    const sidAttr = note.sentence_id ? ` data-sid="${note.sentence_id}"` : '';
    html += `<div class="note-group ${grpCls}" id="${note.id}"${sidAttr} data-anchor="${(note.anchor_text||'').slice(0,12).replace(/"/g,'&quot;')}">\n      <div class="note-ref">&#9658; ${ref}</div>\n      ${itemsHtml}\n    </div>`;
  }
  return html;
}

// ── 注释锚点文字匹配 ──
function matchAnchors(notes) {
  const main = document.getElementById('mainContent');
  for (const note of notes) {
    const raw = (note.anchor_text || '').trim();
    const key = raw.replace(/[，。：；！？、""''「」（）【】〖〗〔〕〈〉，。：；、]/g, '').slice(0, 8);
    if (key.length < 2) continue;
    if (main.querySelector(`[data-note="${note.id}"]`)) continue;

    const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT, {
      acceptNode: n => n.parentElement.closest('.note-anchor') ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
    });
    let found = false;
    while (!found && walker.nextNode()) {
      const tn = walker.currentNode;
      const idx = tn.textContent.indexOf(key);
      if (idx < 0) continue;
      try {
        const range = document.createRange();
        range.setStart(tn, idx);
        range.setEnd(tn, idx + key.length);
        const span = document.createElement('span');
        span.className = 'note-anchor';
        span.dataset.note = note.id;
        range.surroundContents(span);
        found = true;
      } catch(e) { /* range spans elements, skip */ }
    }
  }
}

// ── 初始化 ──
// 旧式锚点 ID → 新注释面板 ID 的硬编码映射表
// （旧ID来自 semantic JSON，新ID来自 001-notes.json，按 anchor_text 匹配预计算）
const LEGACY_ID_MAP = {
  'n1':    'n002',
  'n1b':   'n003',
  'n1c':   'n005',
  'n1_1a': 'n008',
  'n1_1b': 'n010',
  'n1_1c': 'n016',
  'n1_2a': 'n019',
  'n2a':   'n029',
  'n2b':   'n030',
  'n4_1':  'n048',
  'n5':    'n058',
};

function remapLegacyAnchors() {
  document.querySelectorAll('.note-anchor[data-note]').forEach(el => {
    const oldId = el.dataset.note;
    if (LEGACY_ID_MAP[oldId]) el.dataset.note = LEGACY_ID_MAP[oldId];
  });
}

// ── 句子编号：在正文文本节点中，按 。！？ 切分，给每段加 data-sid ──
function addSentenceIds() {
  const main = document.getElementById('mainContent');
  // 建立 sentence文本 → sid 的查找表（简体，去首尾标点）
  const sidMap = new Map(); // text_key → sid
  for (const s of SENTENCES.sentences) {
    const key = s.text.replace(/[。！？，、：；\s]/g, '').slice(0, 10);
    if (key) sidMap.set(key, s.id);
  }

  // 遍历所有文本节点，找到包含句末标点的节点，按 。！？ 拆分并包裹 span
  const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT, {
    acceptNode: n => n.parentElement.closest('h1,h2,h3') ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  let globalSidIdx = 0;
  for (const tn of textNodes) {
    if (!/[。！？]/.test(tn.textContent)) continue;
    // 按 。！？ 拆分（保留标点在片段末尾）
    const parts = tn.textContent.split(/(?<=[。！？])/);
    if (parts.length <= 1) continue;
    const frag = document.createDocumentFragment();
    for (const part of parts) {
      if (!part) continue;
      const key = part.replace(/[。！？，、：；\s]/g, '').slice(0, 10);
      const sid = sidMap.get(key) || `sx${++globalSidIdx}`;
      const span = document.createElement('span');
      span.dataset.sid = sid;
      span.textContent = part;
      frag.appendChild(span);
    }
    tn.parentNode.replaceChild(frag, tn);
  }
}

// ── 注释点击：用 sentence_id 定位正文 ──
// note-group click 时，优先用 sentence_id 跳转，其次用 note-anchor
function scrollToSentence(sid) {
  if (!sid) return false;
  const el = document.querySelector(`[data-sid="${sid}"]`);
  if (!el) return false;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('sent-highlight');
  setTimeout(() => el.classList.remove('sent-highlight'), 1800);
  return true;
}

function initReader() {
  document.getElementById('mainContent').innerHTML = renderAllBlocks(SEMANTIC.blocks);
  document.getElementById('notesPanel').innerHTML = renderNotes(NOTES_RAW.notes);
  addSentenceIds();
  matchAnchors(NOTES_RAW.notes);
  remapLegacyAnchors();
  bindNoteInteractions();
}

document.addEventListener('DOMContentLoaded', initReader);
</script>
