<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>右侧注释原型 — 五帝本纪</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Serif SC", "Source Han Serif", "SimSun", serif;
            background: #faf8f0;
            color: #2c2c2c;
            line-height: 2.0;
            font-size: 18px;
        }

        .page {
            display: grid;
            grid-template-columns: 1fr 400px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* ── 左栏：原文 ── */
        .main-text {
            padding: 40px 48px 60px 48px;
            border-right: 1px solid #d4c9a8;
        }

        .main-text h1 {
            font-size: 1.6em;
            color: #8B4513;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 10px;
            margin-bottom: 24px;
        }

        .main-text h2 {
            font-size: 1.2em;
            color: #8B4513;
            margin: 28px 0 12px;
        }

        .main-text p {
            margin: 12px 0;
            font-size: 1.05em;
            text-indent: 0;
        }

        .para-num {
            font-size: 0.75em;
            color: #999;
            margin-right: 4px;
            text-decoration: none;
            font-family: sans-serif;
        }

        /* 实体高亮 */
        .person { color: #1a5fb4; }
        .place { color: #26a269; }
        .official { color: #c64600; }
        .clan { color: #8B4513; }
        .mythical { color: #9141ac; font-style: italic; }
        .artifact { color: #b5835a; }
        .tribe { color: #613583; }
        .biology { color: #2ec27e; font-style: italic; }
        .concept { color: #7a6a00; }
        .celestial { color: #5b4fa0; }
        .timeref { color: #888; font-size: 0.92em; }
        .action { color: #c05080; }

        /* 句子高亮动画 */
        @keyframes sentFlash {
            0%   { background: #ffe066; }
            100% { background: transparent; }
        }
        .sent-highlight {
            animation: sentFlash 1.8s ease-out forwards;
            border-radius: 2px;
        }

        /* 缩进块（::: 围栏） */
        .block-indent {
            margin-left: 2em;
            padding-left: 0.8em;
            border-left: 2px solid #e0d0b0;
        }

        /* 赋/赞引文 */
        p.citation {
            margin: 4px 0 4px 2em;
            color: #5a4a3a;
            font-style: italic;
        }

        /* ── 语义开关控件 ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 20;
            background: #faf8f0;
            padding: 8px 0;
            border-bottom: 1px solid #e0d8cc;
        }
        .toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border: 1px solid #c0a060;
            border-radius: 4px;
            background: #fff9e6;
            cursor: pointer;
            font-size: 0.8em;
            color: #8B4513;
            user-select: none;
            font-family: sans-serif;
        }
        .toggle-btn:hover { background: #f5ecd0; }
        .toggle-btn.off { background: #f0ece4; color: #999; border-color: #d0d0d0; }
        .toggle-btn:disabled { background: #f0ece4; color: #ccc; border-color: #e0e0e0; cursor: not-allowed; }
        .toggle-indicator {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #26a269;
        }
        .toggle-btn.off .toggle-indicator { background: #ccc; }

        /* 关闭语法高亮时的样式 */
        .main-text.highlight-off .person,
        .main-text.highlight-off .place,
        .main-text.highlight-off .official,
        .main-text.highlight-off .clan,
        .main-text.highlight-off .mythical,
        .main-text.highlight-off .artifact,
        .main-text.highlight-off .tribe,
        .main-text.highlight-off .biology,
        .main-text.highlight-off .concept,
        .main-text.highlight-off .celestial,
        .main-text.highlight-off .timeref,
        .main-text.highlight-off .action {
            color: inherit !important;
            font-style: inherit !important;
            font-size: inherit !important;
        }
        .notes-panel.highlight-off .person,
        .notes-panel.highlight-off .place,
        .notes-panel.highlight-off .official,
        .notes-panel.highlight-off .clan,
        .notes-panel.highlight-off .mythical,
        .notes-panel.highlight-off .artifact,
        .notes-panel.highlight-off .tribe,
        .notes-panel.highlight-off .biology {
            color: inherit !important;
            font-style: inherit !important;
        }

        /* 关闭语义排版时的样式 — 用 !important 确保覆盖 */
        .main-text.semantic-off .causal,
        .main-text.semantic-off .escalation,
        .main-text.semantic-off .summary-line,
        .main-text.semantic-off .contrast {
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
            background: none !important;
            border: none !important;
            border-left: none !important;
            font-size: inherit !important;
            color: inherit !important;
            grid-template-columns: none !important;
        }
        .main-text.semantic-off .cause,
        .main-text.semantic-off .effect {
            display: inline !important;
            padding: 0 !important;
            padding-left: 0 !important;
            border: none !important;
            border-left: none !important;
            margin: 0 !important;
            margin-left: 0 !important;
            font-size: inherit !important;
            color: inherit !important;
        }
        .main-text.semantic-off .effect::before { content: none !important; }
        .main-text.semantic-off .escalation {
            margin: 0 !important;
            margin-left: 0 !important;
            padding: 0 !important;
            padding-left: 0 !important;
            border: none !important;
            border-left: none !important;
            color: inherit !important;
            font-size: inherit !important;
        }
        .main-text.semantic-off .escalation::before { content: none !important; }
        .main-text.semantic-off .contrast { display: block !important; }
        .main-text.semantic-off .contrast > div { display: inline !important; }
        .main-text.semantic-off .contrast > div::after { content: " "; }

        /* ── 关系连线 SVG ── */
        .rel-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        .rel-svg.visible { display: block; }
        .main-text { position: relative; }

        /* ── 语义关系排版 ── */

        /* 因果：原因正常，结果缩进+左边线 */
        .causal { margin: 8px 0; }
        .cause { color: #2a1f14; }
        .effect {
            padding-left: 1.5em;
            color: #5a4a3a;
            font-size: 0.95em;
            border-left: 2px solid #d4c5a9;
            margin-left: 0.2em;
            margin-top: 2px;
        }

        /* 并列/时序：横排 */
        .parallel {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 20px;
            margin: 6px 0;
        }
        .parallel .item { white-space: nowrap; }

        /* 递进 */
        .escalation {
            margin: 4px 0 4px 1.5em;
            color: #3a2a1a;
            font-size: 0.95em;
            border-left: 2px solid #c8a882;
            padding-left: 0.8em;
        }

        /* 总结句 */
        .summary-line {
            margin-top: 8px;
            padding: 5px 12px;
            background: #f3ede3;
            border-left: 3px solid #c8a882;
            font-size: 0.95em;
            color: #5a3a1a;
            border-radius: 0 4px 4px 0;
        }

        /* 对举（正反/对比） */
        .contrast {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 24px;
            margin: 6px 0;
        }
        .contrast .pos { color: #2a5a1a; }
        .contrast .neg { color: #8a3a1a; }

        /* 注释锚点高亮 */
        .note-anchor {
            border-bottom: 2px dashed #c0a060;
            cursor: pointer;
            position: relative;
            transition: background 0.2s, border-color 0.2s;
        }
        .note-anchor:hover {
            background: #fff3d0;
            border-bottom-color: #8B4513;
        }
        .note-anchor.active {
            background: #ffe8a0;
            border-bottom: 2px solid #8B4513;
            animation: pulse-bg 1.5s ease-in-out;
        }
        @keyframes pulse-bg {
            0% { background: #ffd060; }
            100% { background: #ffe8a0; }
        }

        /* ── 右栏：注释 ── */
        .notes-panel {
            padding: 40px 20px 60px 20px;
            background: #f5f0e4;
            font-size: 0.88em;
            line-height: 1.7;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .notes-panel h3 {
            font-size: 0.9em;
            color: #8B4513;
            margin-bottom: 16px;
            padding-bottom: 6px;
            border-bottom: 1px solid #c0a060;
        }

        .note-group {
            margin-bottom: 20px;
            padding: 10px 12px;
            background: #fffdf5;
            border-radius: 6px;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .note-group:hover {
            box-shadow: 0 1px 8px rgba(0,0,0,0.12);
            transform: translateX(-2px);
        }
        .note-group.active {
            box-shadow: 0 2px 12px rgba(139,69,19,0.25);
            transform: translateX(-4px);
            animation: pulse-note 1.5s ease-in-out;
        }
        @keyframes pulse-note {
            0% { box-shadow: 0 0 20px rgba(139,69,19,0.4); }
            100% { box-shadow: 0 2px 12px rgba(139,69,19,0.25); }
        }

        .note-group .note-ref {
            font-size: 0.78em;
            color: #888;
            margin-bottom: 4px;
            font-family: sans-serif;
        }

        .note-item {
            margin: 6px 0;
            padding-left: 0;
        }

        /* 三家注 badge */
        .badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 1px 6px;
            border-radius: 3px;
            margin-right: 4px;
            font-weight: bold;
            vertical-align: middle;
        }
        .badge-jijie {
            background: #d0f0d0;
            color: #1a6e1a;
            border-left-color: #1a6e1a;
        }
        .badge-suoyin {
            background: #ffe8cc;
            color: #b45309;
            border-left-color: #b45309;
        }
        .badge-zhengyi {
            background: #d0e0ff;
            color: #1a4fb4;
            border-left-color: #1a4fb4;
        }

        .note-group.jijie { border-left-color: #1a6e1a; }
        .note-group.suoyin { border-left-color: #b45309; }
        .note-group.zhengyi { border-left-color: #1a4fb4; }
        .note-group.mixed { border-left-color: #8B4513; }

        .note-text {
            color: #444;
        }
        .note-text .book-title {
            font-style: italic;
        }

        /* ── 注释模式切换 ── */
        .mode-switch {
            display: inline-flex;
            border: 1px solid #c0a060;
            border-radius: 4px;
            overflow: hidden;
            font-size: 0.8em;
            font-family: sans-serif;
        }
        .mode-switch button {
            padding: 4px 10px;
            background: #fff9e6;
            border: none;
            cursor: pointer;
            color: #999;
            border-right: 1px solid #c0a060;
        }
        .mode-switch button:last-child { border-right: none; }
        .mode-switch button.active {
            background: #8B4513;
            color: #fff;
        }
        .mode-switch button:hover:not(.active) { background: #f5ecd0; }

        /* 弹窗模式：隐藏右栏，扩展左栏 */
        .page.popup-mode {
            grid-template-columns: 1fr;
            max-width: 900px;
        }
        .page.popup-mode .notes-panel { display: none; }
        .page.popup-mode .main-text { border-right: none; }

        /* 浮动注释弹窗 */
        #notePopup {
            display: none;
            position: fixed;
            z-index: 200;
            max-width: 420px;
            min-width: 260px;
            background: #fffdf5;
            border: 1px solid #c0a060;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            padding: 14px 16px 12px;
            font-size: 0.85em;
            line-height: 1.7;
            pointer-events: auto;
        }
        #notePopup.visible { display: block; }
        #notePopup .popup-title {
            font-size: 0.78em;
            color: #8B4513;
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e0d0b0;
            font-family: sans-serif;
        }
        #notePopup .popup-close {
            float: right;
            cursor: pointer;
            color: #aaa;
            font-size: 1.1em;
            line-height: 1;
            padding: 0 2px;
            font-family: sans-serif;
        }
        #notePopup .popup-close:hover { color: #8B4513; }
        #notePopup .note-item { margin: 5px 0; }

        /* ── 移动端 ── */
        @media (max-width: 860px) {
            .page {
                grid-template-columns: 1fr;
            }
            .notes-panel {
                position: relative;
                height: auto;
                border-top: 2px solid #c0a060;
            }
            .main-text {
                border-right: none;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="page">
    <!-- ════ 左栏：原文 ════ -->
    <div class="main-text semantic-off">
        <h1>五帝本纪</h1>

        <div class="toolbar">
            <button class="toggle-btn off" id="toggleSemantic" onclick="toggleSemantic()">
                <span class="toggle-indicator"></span>
                语义排版
            </button>
            <button class="toggle-btn off" id="toggleLines" onclick="toggleLines()" disabled>
                <span class="toggle-indicator"></span>
                关系连线
            </button>
            <button class="toggle-btn" id="toggleHighlight" onclick="toggleHighlight()">
                <span class="toggle-indicator"></span>
                语法高亮
            </button>
            <span style="flex:1"></span>
            <div class="mode-switch">
                <button id="modeSidebar" class="active" onclick="setNoteMode('sidebar')">侧栏</button>
                <button id="modePopup" onclick="setNoteMode('popup')">弹窗</button>
            </div>
        </div>

        <!-- 弹窗容器 -->
        <div id="notePopup">
            <div class="popup-title" id="popupTitle">
                <span class="popup-close" onclick="closePopup()">✕</span>
                <span id="popupRef"></span>
            </div>
            <div id="popupBody"></div>
        </div>
        <svg id="relSvg" class="rel-svg"></svg>

        <div id="mainContent"></div>

    </div>

    <!-- ════ 右栏：注释 ════ -->
    <div class="notes-panel" id="notesPanel"></div>
</div>
<script>
let noteMode = 'sidebar';

function setNoteMode(mode) {
    noteMode = mode;
    document.querySelector('.page').classList.toggle('popup-mode', mode === 'popup');
    document.getElementById('modeSidebar').classList.toggle('active', mode === 'sidebar');
    document.getElementById('modePopup').classList.toggle('active', mode === 'popup');
    closePopup();
    clearActive();
    if (document.getElementById('relSvg').classList.contains('visible')) drawLines();
}

function closePopup() {
    document.getElementById('notePopup').classList.remove('visible');
    document.querySelectorAll('.note-anchor.active').forEach(a => a.classList.remove('active'));
}

function showPopup(anchor, noteEl) {
    cancelPopupClose();
    const popup = document.getElementById('notePopup');
    const ref = noteEl.querySelector('.note-ref');
    document.getElementById('popupRef').textContent = ref ? ref.textContent : '';

    // 克隆注释内容（去掉 note-ref 行）
    const body = document.getElementById('popupBody');
    body.innerHTML = '';
    noteEl.querySelectorAll('.note-item').forEach(item => {
        body.appendChild(item.cloneNode(true));
    });

    // 先加 visible 以便量尺寸，再定位
    const ar = anchor.getBoundingClientRect();
    popup.classList.add('visible');
    const pw = popup.offsetWidth || 320;
    const ph = popup.offsetHeight || 120;
    let left = ar.right + 8;
    let top = ar.bottom + 4;
    if (left + pw > window.innerWidth - 12) left = ar.left - pw - 8;
    if (top + ph > window.innerHeight - 12) top = Math.max(8, ar.top - ph - 4);
    popup.style.left = Math.max(8, left) + 'px';
    popup.style.top = top + 'px';
}

// 语义排版开关
function toggleSemantic() {
    const btn = document.getElementById('toggleSemantic');
    const linesBtn = document.getElementById('toggleLines');
    const main = document.querySelector('.main-text');
    const isOff = main.classList.toggle('semantic-off');
    btn.classList.toggle('off', isOff);
    // 语义排版关闭时，禁用关系连线并自动关闭
    linesBtn.disabled = isOff;
    if (isOff) {
        document.getElementById('relSvg').classList.remove('visible');
        linesBtn.classList.add('off');
    } else {
        if (document.getElementById('relSvg').classList.contains('visible')) drawLines();
    }
}

// 语法高亮开关
function toggleHighlight() {
    const btn = document.getElementById('toggleHighlight');
    const main = document.querySelector('.main-text');
    const notes = document.querySelector('.notes-panel');
    const isOff = main.classList.toggle('highlight-off');
    notes.classList.toggle('highlight-off', isOff);
    btn.classList.toggle('off', isOff);
}

// 关系连线开关
function toggleLines() {
    const btn = document.getElementById('toggleLines');
    const svg = document.getElementById('relSvg');
    const isOff = !svg.classList.toggle('visible');
    btn.classList.toggle('off', isOff);
    if (!isOff) drawLines();
}

// 关系类型→颜色/线型
const REL_STYLES = {
    causal:     { color: '#c05020', label: '因', dash: '' },
    escalation: { color: '#8a6a00', label: '递', dash: '6,3' },
    sequel:     { color: '#1a5fb4', label: '续', dash: '4,4' },
    summary:    { color: '#26a269', label: '总', dash: '' },
    parallel:   { color: '#613583', label: '并', dash: '2,4' },
};

function drawLines() {
    const svg = document.getElementById('relSvg');
    const main = document.querySelector('.main-text');
    const mainRect = main.getBoundingClientRect();

    // 调整SVG尺寸
    svg.style.height = main.scrollHeight + 'px';
    svg.setAttribute('viewBox', `0 0 ${main.offsetWidth} ${main.scrollHeight}`);
    svg.innerHTML = '';

    // 箭头marker定义
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    for (const [type, style] of Object.entries(REL_STYLES)) {
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        marker.setAttribute('id', `arrow-${type}`);
        marker.setAttribute('viewBox', '0 0 10 10');
        marker.setAttribute('refX', '10');
        marker.setAttribute('refY', '5');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('orient', 'auto-start-reverse');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
        path.setAttribute('fill', style.color);
        marker.appendChild(path);
        defs.appendChild(marker);
    }
    svg.appendChild(defs);

    // 找所有有 data-rel-from 的元素
    const targets = main.querySelectorAll('[data-rel-from]');

    // 用Range精确定位文本首/尾字符位置
    function getTextEndPos(el) {
        const range = document.createRange();
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        let lastText = null;
        while (walker.nextNode()) lastText = walker.currentNode;
        if (lastText && lastText.length > 0) {
            range.setStart(lastText, Math.max(0, lastText.length - 1));
            range.setEnd(lastText, lastText.length);
            const r = range.getBoundingClientRect();
            return { x: r.right - mainRect.left, y: r.top - mainRect.top + r.height / 2 };
        }
        const r = el.getBoundingClientRect();
        return { x: r.right - mainRect.left - 10, y: r.top - mainRect.top + r.height / 2 };
    }

    function getTextStartPos(el) {
        const range = document.createRange();
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        const firstText = walker.nextNode();
        if (firstText && firstText.length > 0) {
            range.setStart(firstText, 0);
            range.setEnd(firstText, 1);
            const r = range.getBoundingClientRect();
            return { x: r.left - mainRect.left, y: r.top - mainRect.top + r.height / 2 };
        }
        const r = el.getBoundingClientRect();
        return { x: r.left - mainRect.left + 10, y: r.top - mainRect.top + r.height / 2 };
    }

    targets.forEach((target) => {
        const fromId = target.dataset.relFrom;
        const relType = target.dataset.relType || 'causal';
        const anchor = target.dataset.relAnchor || 'tail'; // 'head' or 'tail'
        const source = main.querySelector(`[data-rel-id="${fromId}"]`);
        if (!source) return;

        const style = REL_STYLES[relType] || REL_STYLES.causal;

        if (anchor === 'tail') {
            // ── 尾连尾：句子末尾用右侧折线树连接 ──
            const p1 = getTextEndPos(source);
            const p2 = getTextEndPos(target);
            p1.y += 5;  // 起点偏低，避免与上一段终点重叠
            p2.y -= 5;  // 终点偏高，避免与下一段起点重叠
            const xOut = Math.max(p1.x, p2.x) + 16;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d',
                `M ${p1.x} ${p1.y} L ${xOut} ${p1.y} L ${xOut} ${p2.y} L ${p2.x} ${p2.y}`);
            path.setAttribute('stroke', style.color);
            path.setAttribute('stroke-width', '1.2');
            path.setAttribute('fill', 'none');
            path.setAttribute('opacity', '0.45');
            path.setAttribute('stroke-dasharray', '4,3');
            path.setAttribute('marker-end', `url(#arrow-${relType})`);
            svg.appendChild(path);

            // 标签在折线竖段中点
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', xOut + 4);
            text.setAttribute('y', (p1.y + p2.y) / 2 + 4);
            text.setAttribute('font-size', '10');
            text.setAttribute('fill', style.color);
            text.setAttribute('font-family', 'sans-serif');
            text.setAttribute('opacity', '0.7');
            text.textContent = style.label;
            svg.appendChild(text);

        } else {
            // ── 头连头：左侧短弧线+箭头 ──
            const srcRect = source.getBoundingClientRect();
            const tgtRect = target.getBoundingClientRect();
            const xLeft = Math.min(srcRect.left, tgtRect.left) - mainRect.left;
            const y1 = srcRect.top - mainRect.top + srcRect.height / 2 + 5;  // 起点偏低
            const y2 = tgtRect.top - mainRect.top + tgtRect.height / 2 - 5;  // 终点偏高
            const bulge = 18; // 弧线向左凸出的距离

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d',
                `M ${xLeft - 2} ${y1} C ${xLeft - bulge} ${y1}, ${xLeft - bulge} ${y2}, ${xLeft - 2} ${y2}`);
            path.setAttribute('stroke', style.color);
            path.setAttribute('stroke-width', '1.2');
            path.setAttribute('fill', 'none');
            path.setAttribute('opacity', '0.5');
            path.setAttribute('stroke-dasharray', '4,3');
            path.setAttribute('marker-end', `url(#arrow-${relType})`);
            svg.appendChild(path);

            // 标签在弧线中点
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', xLeft - bulge - 3);
            text.setAttribute('y', (y1 + y2) / 2 + 4);
            text.setAttribute('font-size', '10');
            text.setAttribute('fill', style.color);
            text.setAttribute('font-family', 'sans-serif');
            text.setAttribute('text-anchor', 'end');
            text.setAttribute('opacity', '0.7');
            text.textContent = style.label;
            svg.appendChild(text);
        }

        // 两端小圆点
        const p1 = anchor === 'tail' ? getTextEndPos(source) : getTextStartPos(source);
        const p2 = anchor === 'tail' ? getTextEndPos(target) : getTextStartPos(target);
        for (const p of [p1, p2]) {
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', p.x);
            dot.setAttribute('cy', p.y);
            dot.setAttribute('r', '2.5');
            dot.setAttribute('fill', style.color);
            dot.setAttribute('opacity', '0.5');
            svg.appendChild(dot);
        }
    });
}

// 窗口resize时重绘
window.addEventListener('resize', () => {
    if (document.getElementById('relSvg').classList.contains('visible')) drawLines();
});

// ── 注释关联系统 ──

// 连线SVG（跨两栏的overlay）
const connSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
connSvg.id = 'connSvg';
connSvg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;';
document.body.appendChild(connSvg);

function clearActive() {
    document.querySelectorAll('.note-anchor.active').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.note-group.active').forEach(n => n.classList.remove('active'));
    connSvg.innerHTML = '';
}

function drawConnLine(anchor, noteEl) {
    connSvg.innerHTML = '';
    const ar = anchor.getBoundingClientRect();
    const nr = noteEl.getBoundingClientRect();

    // 检查两个元素是否都在视口内可见
    if (ar.width === 0 || nr.width === 0) return;
    if (nr.top > window.innerHeight || nr.bottom < 0) return;

    // 从锚点右边缘到注释左边缘画贝塞尔曲线
    const x1 = ar.right;
    const y1 = ar.top + ar.height / 2;
    const x2 = nr.left;
    const y2 = nr.top + nr.height / 2;

    // 安全检查：坐标应在合理范围内
    if (x2 <= x1 || Math.abs(y2 - y1) > window.innerHeight) return;

    const cx1 = x1 + (x2 - x1) * 0.4;
    const cx2 = x1 + (x2 - x1) * 0.6;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`);
    path.setAttribute('stroke', '#8B4513');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.4');
    path.setAttribute('stroke-dasharray', '4,3');
    connSvg.appendChild(path);

    // 两端小圆点
    for (const [cx, cy] of [[x1, y1], [x2, y2]]) {
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', cx);
        dot.setAttribute('cy', cy);
        dot.setAttribute('r', '3');
        dot.setAttribute('fill', '#8B4513');
        dot.setAttribute('opacity', '0.5');
        connSvg.appendChild(dot);
    }
}

function activatePair(anchor, noteEl) {
    clearActive();
    anchor.classList.add('active');
    noteEl.classList.add('active');
    drawConnLine(anchor, noteEl);
}

// 锁定状态（click后锁定，不随mouseleave消失）
let locked = false;

// 弹窗自动关闭计时器
let popupCloseTimer = null;
function schedulePopupClose() {
    cancelPopupClose();
    popupCloseTimer = setTimeout(() => closePopup(), 2000);
}
function cancelPopupClose() {
    if (popupCloseTimer) { clearTimeout(popupCloseTimer); popupCloseTimer = null; }
}

// 弹窗：鼠标进入取消关闭，离开重新计时
document.getElementById('notePopup').addEventListener('mouseenter', cancelPopupClose);
document.getElementById('notePopup').addEventListener('mouseleave', schedulePopupClose);


function bindNoteInteractions() {
    // 左侧锚点：hover预览 + click锁定
    document.querySelectorAll('.note-anchor').forEach(anchor => {
        anchor.addEventListener('mouseenter', () => {
            if (noteMode === 'popup') {
                const noteEl = document.getElementById(anchor.dataset.note);
                if (!noteEl) return;
                showPopup(anchor, noteEl);
                anchor.classList.add('active');
                return;
            }
            if (locked) return;
            const noteEl = document.getElementById(anchor.dataset.note);
            if (!noteEl) return;
            activatePair(anchor, noteEl);
            noteEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(() => { if (!locked) drawConnLine(anchor, noteEl); }, 350);
        });

        anchor.addEventListener('mouseleave', () => {
            if (noteMode === 'popup') { schedulePopupClose(); return; }
            if (locked) return;
            clearActive();
        });

        anchor.addEventListener('click', (e) => {
            e.stopPropagation();
            const noteEl = document.getElementById(anchor.dataset.note);
            if (!noteEl) return;
            if (noteMode === 'popup') {
                showPopup(anchor, noteEl);
                document.querySelectorAll('.note-anchor.active').forEach(a => a.classList.remove('active'));
                anchor.classList.add('active');
                return;
            }
            locked = true;
            activatePair(anchor, noteEl);
            noteEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(() => drawConnLine(anchor, noteEl), 350);
        });
    });

    // 右侧注释：hover预览 + click锁定
    document.querySelectorAll('.note-group').forEach(note => {
        note.addEventListener('mouseenter', () => {
            if (locked) return;
            const anchor = document.querySelector(`.note-anchor[data-note="${note.id}"]`);
            if (!anchor) return;
            activatePair(anchor, note);
        });

        note.addEventListener('mouseleave', () => {
            if (locked) return;
            clearActive();
        });

        note.addEventListener('click', (e) => {
            e.stopPropagation();
            const anchor = document.querySelector(`.note-anchor[data-note="${note.id}"]`);
            // 优先用 sentence_id 跳转
            const sid = note.dataset.sid;
            if (anchor) {
                locked = true;
                activatePair(anchor, note);
                anchor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => drawConnLine(anchor, note), 350);
            } else if (sid) {
                // 没有精确锚点时，跳到对应句子
                note.classList.add('active');
                scrollToSentence(sid);
            }
        });
    });

    // 任何滚动时重绘锁定的连线
    let scrollTimer;
    function onScroll() {
        if (!locked) return;
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
            const activeAnchor = document.querySelector('.note-anchor.active');
            const activeNote = document.querySelector('.note-group.active');
            if (activeAnchor && activeNote) drawConnLine(activeAnchor, activeNote);
        }, 50);
    }
    document.querySelector('.notes-panel').addEventListener('scroll', onScroll);
}

window.addEventListener('scroll', onScroll);

// 点击空白区域解除锁定并清除
document.addEventListener('click', (e) => {
    if (noteMode === 'popup') {
        if (!e.target.closest('.note-anchor') && !e.target.closest('#notePopup')) {
            closePopup();
            document.querySelectorAll('.note-anchor.active').forEach(a => a.classList.remove('active'));
        }
        return;
    }
    if (!e.target.closest('.note-anchor') && !e.target.closest('.note-group')) {
        locked = false;
        clearActive();
    }
});
</script>
<script>
// ── 内联数据 ──
const SENTENCES = {"chapter": "001_五帝本纪", "sentences": [{"id": "s001", "text": "黄帝者，少典之子，姓公孙，名曰轩辕。"}, {"id": "s002", "text": "生而神灵，弱而能言，幼而徇齐，长而敦敏，成而聪明。"}, {"id": "s003", "text": "轩辕之时，神农氏世衰。"}, {"id": "s004", "text": "诸侯相侵伐，暴虐百姓，而神农氏弗能征。"}, {"id": "s005", "text": "於是轩辕乃习用干戈，以征不享，诸侯咸来宾从。"}, {"id": "s006", "text": "而蚩尤最为暴，莫能伐。"}, {"id": "s007", "text": "炎帝欲侵陵诸侯，诸侯咸归轩辕。"}, {"id": "s008", "text": "轩辕乃修德振兵，治五气，蓺五种，抚万民，度四方，教熊罴貔貅貙虎，以与炎帝战於阪泉之野。"}, {"id": "s009", "text": "三战，然後得其志。"}, {"id": "s010", "text": "蚩尤作乱，不用帝命。"}, {"id": "s011", "text": "於是黄帝乃徵师诸侯，与蚩尤战於涿鹿之野，遂禽杀蚩尤。"}, {"id": "s012", "text": "而诸侯咸尊轩辕为天子，代神农氏，是为黄帝。"}, {"id": "s013", "text": "天下有不顺者，黄帝从而征之，平者去之，披山通道，未尝宁居。"}, {"id": "s014", "text": "东至于海，登丸山，及岱宗。"}, {"id": "s015", "text": "西至于空桐，登鸡头。"}, {"id": "s016", "text": "南至于江，登熊、湘。"}, {"id": "s017", "text": "北逐荤粥，合符釜山，而邑于涿鹿之阿。"}, {"id": "s018", "text": "迁徙往来无常处，以师兵为营卫。"}, {"id": "s019", "text": "官名皆以云命，为云师。"}, {"id": "s020", "text": "置左右大监，监于万国。"}, {"id": "s021", "text": "万国和，而鬼神山川封禅与为多焉。"}, {"id": "s022", "text": "获宝鼎，迎日推筴。"}, {"id": "s023", "text": "举风后、力牧、常先、大鸿以治民。"}, {"id": "s024", "text": "顺天地之纪，幽明之占，死生之说，存亡之难。"}, {"id": "s025", "text": "时播百穀草木，淳化鸟兽蟲蛾，旁罗日月星辰水波土石金玉，劳勤心力耳目，节用水火材物。"}, {"id": "s026", "text": "有土德之瑞，故号黄帝。"}, {"id": "s027", "text": "黄帝二十五子，其得姓者十四人。"}, {"id": "s028", "text": "黄帝居轩辕之丘，而娶於西陵之女，是为嫘祖。"}, {"id": "s029", "text": "嫘祖为黄帝正妃，生二子，其後皆有天下：其一曰玄嚣，是为青阳，青阳降居江水；其二曰昌意，降居若水。"}, {"id": "s030", "text": "昌意娶蜀山氏女，曰昌仆，生高阳，高阳有圣德焉。"}, {"id": "s031", "text": "黄帝崩，葬桥山。"}, {"id": "s032", "text": "其孙昌意之子高阳立，是为帝颛顼也。"}, {"id": "s033", "text": "帝颛顼高阳者，黄帝之孙而昌意之子也。"}, {"id": "s034", "text": "静渊以有谋，疏通而知事；养材以任地，载时以象天，依鬼神以制义，治气以教化，絜诚以祭祀。"}, {"id": "s035", "text": "北至于幽陵，南至于交阯，西至于流沙，东至于蟠木。"}, {"id": "s036", "text": "动静之物，大小之神，日月所照，莫不砥属。"}, {"id": "s037", "text": "帝颛顼生子曰穷蝉。"}, {"id": "s038", "text": "颛顼崩，而玄嚣之孙高辛立，是为帝喾。"}, {"id": "s039", "text": "帝喾高辛者，黄帝之曾孙也。"}, {"id": "s040", "text": "高辛父曰蟜极，蟜极父曰玄嚣，玄嚣父曰黄帝。"}, {"id": "s041", "text": "自玄嚣与蟜极皆不得在位，至高辛即帝位。"}, {"id": "s042", "text": "高辛於颛顼为族子。"}, {"id": "s043", "text": "高辛生而神灵，自言其名。"}, {"id": "s044", "text": "普施利物，不於其身。"}, {"id": "s045", "text": "聪以知远，明以察微。"}, {"id": "s046", "text": "顺天之义，知民之急。"}, {"id": "s047", "text": "仁而威，惠而信，脩身而天下服。"}, {"id": "s048", "text": "取地之财而节用之，抚教万民而利诲之，历日月而迎送之，明鬼神而敬事之。"}, {"id": "s049", "text": "其色郁郁，其德嶷嶷。"}, {"id": "s050", "text": "其动也时，其服也士。"}, {"id": "s051", "text": "帝喾溉执中而遍天下，日月所照，风雨所至，莫不从服。"}, {"id": "s052", "text": "帝喾娶陈锋氏女，生放勋。"}, {"id": "s053", "text": "娶娵訾氏女，生挚。"}, {"id": "s054", "text": "帝喾崩，而挚代立。"}, {"id": "s055", "text": "帝挚立，不善，而弟放勋立，是为帝尧。"}, {"id": "s056", "text": "帝尧者，放勋。"}, {"id": "s057", "text": "其仁如天，其知如神。"}, {"id": "s058", "text": "就之如日，望之如云。"}, {"id": "s059", "text": "富而不骄，贵而不舒。"}, {"id": "s060", "text": "黄收纯衣，彤车乘白马。"}, {"id": "s061", "text": "能明驯德，以亲九族。"}, {"id": "s062", "text": "九族既睦，便章百姓。"}, {"id": "s063", "text": "百姓昭明，合和万国。"}, {"id": "s064", "text": "乃命羲、和，敬顺昊天，数法日月星辰，敬授民时。"}, {"id": "s065", "text": "分命羲仲，居郁夷，曰旸谷。"}, {"id": "s066", "text": "敬道日出，便程东作。"}, {"id": "s067", "text": "日中，星鸟，以殷中春。"}, {"id": "s068", "text": "其民析，鸟兽字微。"}, {"id": "s069", "text": "申命羲叔，居南交。"}, {"id": "s070", "text": "便程南为，敬致。"}, {"id": "s071", "text": "日永，星火，以正中夏。"}, {"id": "s072", "text": "其民因，鸟兽希革。"}, {"id": "s073", "text": "申命和仲，居西土，曰昧谷。"}, {"id": "s074", "text": "敬道日入，便程西成。"}, {"id": "s075", "text": "夜中，星虚，以正中秋。"}, {"id": "s076", "text": "其民夷易，鸟兽毛毨。"}, {"id": "s077", "text": "申命和叔；居北方，曰幽都。"}, {"id": "s078", "text": "便在伏物。"}, {"id": "s079", "text": "日短，星昴，以正中冬。"}, {"id": "s080", "text": "其民燠，鸟兽氄毛。"}, {"id": "s081", "text": "岁三百六十六日，以闰月正四时。"}, {"id": "s082", "text": "信饬百官，众功皆兴。"}, {"id": "s083", "text": "尧曰：“谁可顺此事？"}, {"id": "s084", "text": "”放齐曰：“嗣子丹硃开明。"}, {"id": "s085", "text": "”尧曰：“吁！"}, {"id": "s086", "text": "顽凶，不用。"}, {"id": "s087", "text": "”尧又曰：“谁可者？"}, {"id": "s088", "text": "”讙兜曰：“共工旁聚布功，可用。"}, {"id": "s089", "text": "”尧曰：“共工善言，其用僻，似恭漫天，不可。"}, {"id": "s090", "text": "”尧又曰：“嗟，四岳，汤汤洪水滔天，浩浩怀山襄陵，下民其忧，有能使治者？"}, {"id": "s091", "text": "”皆曰鲧可。"}, {"id": "s092", "text": "尧曰：“鲧负命毁族，不可。"}, {"id": "s093", "text": "”岳曰：“异哉，试不可用而已。"}, {"id": "s094", "text": "”尧於是听岳用鲧。"}, {"id": "s095", "text": "九岁，功用不成。"}, {"id": "s096", "text": "尧曰：“嗟！"}, {"id": "s097", "text": "四岳：朕在位七十载，汝能庸命，践朕位？"}, {"id": "s098", "text": "”岳应曰：“鄙德忝帝位。"}, {"id": "s099", "text": "”尧曰：“悉举贵戚及疏远隐匿者。"}, {"id": "s100", "text": "”众皆言於尧曰：“有矜在民间，曰虞舜。"}, {"id": "s101", "text": "”尧曰：“然，朕闻之。"}, {"id": "s102", "text": "其何如？"}, {"id": "s103", "text": "”岳曰：“盲者子。"}, {"id": "s104", "text": "父顽，母嚚，弟傲，能和以孝，烝烝治，不至奸。"}, {"id": "s105", "text": "”尧曰：“吾其试哉。"}, {"id": "s106", "text": "”於是尧妻之二女，观其德於二女。"}, {"id": "s107", "text": "舜饬下二女於妫汭，如妇礼。"}, {"id": "s108", "text": "尧善之，乃使舜慎和五典，五典能从。"}, {"id": "s109", "text": "乃遍入百官，百官时序。"}, {"id": "s110", "text": "宾於四门，四门穆穆，诸侯远方宾客皆敬。"}, {"id": "s111", "text": "尧使舜入山林川泽，暴风雷雨，舜行不迷。"}, {"id": "s112", "text": "尧以为圣，召舜曰：“女谋事至而言可绩，三年矣。"}, {"id": "s113", "text": "女登帝位。"}, {"id": "s114", "text": "”舜让於德不怿。"}, {"id": "s115", "text": "正月上日，舜受终於文祖。"}, {"id": "s116", "text": "文祖者，尧大祖也。"}, {"id": "s117", "text": "於是帝尧老，命舜摄行天子之政，以观天命。"}, {"id": "s118", "text": "舜乃在璿玑玉衡，以齐七政。"}, {"id": "s119", "text": "遂类于上帝，禋于六宗，望于山川，辩于群神。"}, {"id": "s120", "text": "揖五瑞，择吉月日，见四岳诸牧，班瑞。"}, {"id": "s121", "text": "岁二月，东巡狩，至於岱宗，祡，望秩於山川。"}, {"id": "s122", "text": "遂见东方君长，合时月正日，同律度量衡，脩五礼五玉三帛二生一死为挚，如五器，卒乃复。"}, {"id": "s123", "text": "五月，南巡狩；八月，西巡狩；十一月，北巡狩：皆如初。"}, {"id": "s124", "text": "归，至于祖祢庙，用特牛礼。"}, {"id": "s125", "text": "五岁一巡狩，群后四朝。"}, {"id": "s126", "text": "遍告以言，明试以功，车服以庸。"}, {"id": "s127", "text": "肇十有二州，决川。"}, {"id": "s128", "text": "象以典刑，流宥五刑，鞭作官刑，扑作教刑，金作赎刑。"}, {"id": "s129", "text": "眚灾过，赦；怙终贼，刑。"}, {"id": "s130", "text": "钦哉，钦哉，惟刑之静哉！"}, {"id": "s131", "text": "讙兜进言共工，尧曰不可而试之工师，共工果淫辟。"}, {"id": "s132", "text": "四岳举鲧治鸿水，尧以为不可，岳彊请试之，试之而无功，故百姓不便。"}, {"id": "s133", "text": "三苗在江淮、荆州数为乱。"}, {"id": "s134", "text": "於是舜归而言於帝，请流共工於幽陵，以变北狄；放驩兜於崇山，以变南蛮；迁三苗於三危，以变西戎；殛鲧於羽山，以变东夷：四罪而天下咸服。"}, {"id": "s135", "text": "尧立七十年得舜，二十年而老，令舜摄行天子之政，荐之於天。"}, {"id": "s136", "text": "尧辟位凡二十八年而崩。"}, {"id": "s137", "text": "百姓悲哀，如丧父母。"}, {"id": "s138", "text": "三年，四方莫举乐，以思尧。"}, {"id": "s139", "text": "尧知子丹硃之不肖，不足授天下，於是乃权授舜。"}, {"id": "s140", "text": "授舜，则天下得其利而丹硃病；授丹硃，则天下病而丹硃得其利。"}, {"id": "s141", "text": "尧曰“终不以天下之病而利一人”，而卒授舜以天下。"}, {"id": "s142", "text": "尧崩，三年之丧毕，舜让辟丹硃於南河之南。"}, {"id": "s143", "text": "诸侯朝觐者不之丹硃而之舜，狱讼者不之丹硃而之舜，讴歌者不讴歌丹硃而讴歌舜。"}, {"id": "s144", "text": "舜曰“天也”，夫而後之中国践天子位焉，是为帝舜。"}, {"id": "s145", "text": "虞舜者，名曰重华。"}, {"id": "s146", "text": "重华父曰瞽叟，瞽叟父曰桥牛，桥牛父曰句望，句望父曰敬康，敬康父曰穷蝉，穷蝉父曰帝颛顼，颛顼父曰昌意：以至舜七世矣。"}, {"id": "s147", "text": "自从穷蝉以至帝舜，皆微为庶人。"}, {"id": "s148", "text": "舜父瞽叟盲，而舜母死，瞽叟更娶妻而生象，象傲。"}, {"id": "s149", "text": "瞽叟爱後妻子，常欲杀舜，舜避逃；及有小过，则受罪。"}, {"id": "s150", "text": "顺事父及後母与弟，日以笃谨，匪有解。"}, {"id": "s151", "text": "舜，冀州之人也。"}, {"id": "s152", "text": "舜耕历山，渔雷泽，陶河滨，作什器於寿丘，就时於负夏。"}, {"id": "s153", "text": "舜父瞽叟顽，母嚚，弟象傲，皆欲杀舜。"}, {"id": "s154", "text": "舜顺適不失子道，兄弟孝慈。"}, {"id": "s155", "text": "欲杀，不可得；即求，尝在侧。"}, {"id": "s156", "text": "舜年二十以孝闻。"}, {"id": "s157", "text": "三十而帝尧问可用者，四岳咸荐虞舜，曰可。"}, {"id": "s158", "text": "於是尧乃以二女妻舜以观其内，使九男与处以观其外。"}, {"id": "s159", "text": "舜居妫汭，内行弥谨。"}, {"id": "s160", "text": "尧二女不敢以贵骄事舜亲戚，甚有妇道。"}, {"id": "s161", "text": "尧九男皆益笃。"}, {"id": "s162", "text": "舜耕历山，历山之人皆让畔；渔雷泽，雷泽上人皆让居；陶河滨，河滨器皆不苦窳。"}, {"id": "s163", "text": "一年而所居成聚，二年成邑，三年成都。"}, {"id": "s164", "text": "尧乃赐舜絺衣，与琴，为筑仓廪，予牛羊。"}, {"id": "s165", "text": "瞽叟尚复欲杀之，使舜上涂廪，瞽叟从下纵火焚廪。"}, {"id": "s166", "text": "舜乃以两笠自扞而下，去，得不死。"}, {"id": "s167", "text": "後瞽叟又使舜穿井，舜穿井为匿空旁出。"}, {"id": "s168", "text": "舜既入深，瞽叟与象共下土实井，舜从匿空出，去。"}, {"id": "s169", "text": "瞽叟、象喜，以舜为已死。"}, {"id": "s170", "text": "象曰“本谋者象。"}, {"id": "s171", "text": "”象与其父母分，於是曰：“舜妻尧二女，与琴，象取之。"}, {"id": "s172", "text": "牛羊仓廪予父母。"}, {"id": "s173", "text": "”象乃止舜宫居，鼓其琴。"}, {"id": "s174", "text": "舜往见之。"}, {"id": "s175", "text": "象鄂不怿，曰：“我思舜正郁陶！"}, {"id": "s176", "text": "”舜曰：“然，尔其庶矣！"}, {"id": "s177", "text": "”舜复事瞽叟爱弟弥谨。"}, {"id": "s178", "text": "於是尧乃试舜五典百官，皆治。"}, {"id": "s179", "text": "昔高阳氏有才子八人，世得其利，谓之“八恺”。"}, {"id": "s180", "text": "高辛氏有才子八人，世谓之“八元”。"}, {"id": "s181", "text": "此十六族者，世济其美，不陨其名。"}, {"id": "s182", "text": "至於尧，尧未能举。"}, {"id": "s183", "text": "舜举八恺，使主后土，以揆百事，莫不时序。"}, {"id": "s184", "text": "举八元，使布五教于四方，父义，母慈，兄友，弟恭，子孝，内平外成。"}, {"id": "s185", "text": "昔帝鸿氏有不才子，掩义隐贼，好行凶慝，天下谓之浑沌。"}, {"id": "s186", "text": "少暤氏有不才子，毁信恶忠，崇饰恶言，天下谓之穷奇。"}, {"id": "s187", "text": "颛顼氏有不才子，不可教训，不知话言，天下谓之檮杌。"}, {"id": "s188", "text": "此三族世忧之。"}, {"id": "s189", "text": "至于尧，尧未能去。"}, {"id": "s190", "text": "缙云氏有不才子，贪于饮食，冒于货贿，天下谓之饕餮。"}, {"id": "s191", "text": "天下恶之，比之三凶。"}, {"id": "s192", "text": "舜宾於四门，乃流四凶族，迁于四裔，以御螭魅，於是四门辟，言毋凶人也。"}, {"id": "s193", "text": "舜入于大麓，烈风雷雨不迷，尧乃知舜之足授天下。"}, {"id": "s194", "text": "尧老，使舜摄行天子政，巡狩。"}, {"id": "s195", "text": "舜得举用事二十年，而尧使摄政。"}, {"id": "s196", "text": "摄政八年而尧崩。"}, {"id": "s197", "text": "三年丧毕，让丹硃，天下归舜。"}, {"id": "s198", "text": "而禹、皋陶、契、后稷、伯夷、夔、龙、倕、益、彭祖自尧时而皆举用，未有分职。"}, {"id": "s199", "text": "於是舜乃至於文祖，谋于四岳，辟四门，明通四方耳目，命十二牧论帝德，行厚德，远佞人，则蛮夷率服。"}, {"id": "s200", "text": "舜谓四岳曰：“有能奋庸美尧之事者，使居官相事？"}, {"id": "s201", "text": "”皆曰：“伯禹为司空，可美帝功。"}, {"id": "s202", "text": "”舜曰：“嗟，然！"}, {"id": "s203", "text": "禹，汝平水土，维是勉哉。"}, {"id": "s204", "text": "”禹拜稽首，让於稷、契与皋陶。"}, {"id": "s205", "text": "舜曰：“然，往矣。"}, {"id": "s206", "text": "”舜曰：“弃，黎民始饥，汝后稷播时百穀。"}, {"id": "s207", "text": "”舜曰：“契，百姓不亲，五品不驯，汝为司徒，而敬敷五教，在宽。"}, {"id": "s208", "text": "”舜曰：“皋陶，蛮夷猾夏，寇贼奸轨，汝作士，五刑有服，五服三就；五流有度，五度三居：维明能信。"}, {"id": "s209", "text": "”舜曰：“谁能驯予工？"}, {"id": "s210", "text": "”皆曰垂可。"}, {"id": "s211", "text": "於是以垂为共工。"}, {"id": "s212", "text": "舜曰：“谁能驯予上下草木鸟兽？"}, {"id": "s213", "text": "”皆曰益可。"}, {"id": "s214", "text": "於是以益为朕虞。"}, {"id": "s215", "text": "益拜稽首，让于诸臣硃虎、熊罴。"}, {"id": "s216", "text": "舜曰：“往矣，汝谐。"}, {"id": "s217", "text": "”遂以硃虎、熊罴为佐。"}, {"id": "s218", "text": "舜曰：“嗟！"}, {"id": "s219", "text": "四岳，有能典朕三礼？"}, {"id": "s220", "text": "”皆曰伯夷可。"}, {"id": "s221", "text": "舜曰：“嗟！"}, {"id": "s222", "text": "伯夷，以汝为秩宗，夙夜维敬，直哉维静絜。"}, {"id": "s223", "text": "”伯夷让夔、龙。"}, {"id": "s224", "text": "舜曰：“然。"}, {"id": "s225", "text": "以夔为典乐，教稺子，直而温，宽而栗，刚而毋虐，简而毋傲；诗言意，歌长言，声依永，律和声，八音能谐，毋相夺伦，神人以和。"}, {"id": "s226", "text": "”夔曰：“於！"}, {"id": "s227", "text": "予击石拊石，百兽率舞。"}, {"id": "s228", "text": "”舜曰：“龙，朕畏忌谗说殄伪，振惊朕众，命汝为纳言，夙夜出入朕命，惟信。"}, {"id": "s229", "text": "”舜曰：“嗟！"}, {"id": "s230", "text": "女二十有二人，敬哉，惟时相天事。"}, {"id": "s231", "text": "”三岁一考功，三考绌陟，远近众功咸兴。"}, {"id": "s232", "text": "分北三苗。"}, {"id": "s233", "text": "此二十二人咸成厥功：皋陶为大理，平，民各伏得其实；伯夷主礼，上下咸让；垂主工师，百工致功；益主虞，山泽辟；弃主稷，百穀时茂；契主司徒，百姓亲和；龙主宾客，远人至；十二牧行而九州莫敢辟违；唯禹之功为大，披九山，通九泽，决九河，定九州，各以其职来贡，不失厥宜。"}, {"id": "s234", "text": "方五千里，至于荒服。"}, {"id": "s235", "text": "南抚交阯、北发，西戎、析枝、渠廋、氐、羌，北山戎、发、息慎，东长、鸟夷，四海之内咸戴帝舜之功。"}, {"id": "s236", "text": "於是禹乃兴九招之乐，致异物，凤皇来翔。"}, {"id": "s237", "text": "天下明德皆自虞帝始。"}, {"id": "s238", "text": "舜年二十以孝闻，年三十尧举之，年五十摄行天子事，年五十八尧崩，年六十一代尧践帝位。"}, {"id": "s239", "text": "践帝位三十九年，南巡狩，崩於苍梧之野。"}, {"id": "s240", "text": "葬於江南九疑，是为零陵。"}, {"id": "s241", "text": "舜之践帝位，载天子旗，往朝父瞽叟，夔夔唯谨，如子道。"}, {"id": "s242", "text": "封弟象为诸侯。"}, {"id": "s243", "text": "舜子商均亦不肖，舜乃豫荐禹於天。"}, {"id": "s244", "text": "十七年而崩。"}, {"id": "s245", "text": "三年丧毕，禹亦乃让舜子，如舜让尧子。"}, {"id": "s246", "text": "诸侯归之，然後禹践天子位。"}, {"id": "s247", "text": "尧子丹硃，舜子商均，皆有疆土，以奉先祀。"}, {"id": "s248", "text": "服其服，礼乐如之。"}, {"id": "s249", "text": "以客见天子，天子弗臣，示不敢专也。"}, {"id": "s250", "text": "自黄帝至舜、禹，皆同姓而异其国号，以章明德。"}, {"id": "s251", "text": "故黄帝为有熊，帝颛顼为高阳，帝喾为高辛，帝尧为陶唐，帝舜为有虞。"}, {"id": "s252", "text": "帝禹为夏后而别氏，姓姒氏。"}, {"id": "s253", "text": "契为商，姓子氏。"}, {"id": "s254", "text": "弃为周，姓姬氏。"}, {"id": "s255", "text": "太史公曰：学者多称五帝，尚矣。"}, {"id": "s256", "text": "然尚书独载尧以来；而百家言黄帝，其文不雅驯，荐绅先生难言之。"}, {"id": "s257", "text": "孔子所传宰予问五帝德及帝系姓，儒者或不传。"}, {"id": "s258", "text": "余尝西至空桐，北过涿鹿，东渐於海，南浮江淮矣，至长老皆各往往称黄帝、尧、舜之处，风教固殊焉，总之不离古文者近是。"}, {"id": "s259", "text": "予观春秋、国语，其发明五帝德、帝系姓章矣，顾弟弗深考，其所表见皆不虚。"}, {"id": "s260", "text": "书缺有间矣，其轶乃时时见於他说。"}, {"id": "s261", "text": "非好学深思，心知其意，固难为浅见寡闻道也。"}, {"id": "s262", "text": "余并论次，择其言尤雅者，故著为本纪书首。"}, {"id": "s263", "text": "帝出少典，居于轩丘。"}, {"id": "s264", "text": "既代炎历，遂禽蚩尤。"}, {"id": "s265", "text": "高阳嗣位，静深有谋。"}, {"id": "s266", "text": "小大远近，莫不怀柔。"}, {"id": "s267", "text": "爰洎帝喾，列圣同休。"}, {"id": "s268", "text": "帝挚之弟，其号放勋。"}, {"id": "s269", "text": "就之如日，望之如云。"}, {"id": "s270", "text": "郁夷东作，昧谷西曛。"}, {"id": "s271", "text": "明扬仄陋，玄德升闻。"}, {"id": "s272", "text": "能让天下，贤哉二君！"}]};
const SEMANTIC = {"blocks": [{"t": "h2", "text": "黄帝"}, {"t": "h3", "text": "兴起与征讨"}, {"t": "p", "id": "1", "note": "n1", "html": "<span class=\"note-anchor\" data-note=\"n1\"><span class=\"person\">黄帝</span>者，</span><span class=\"note-anchor\" data-note=\"n1b\"><span class=\"person\">少典</span>之子，</span>姓<span class=\"person\">公孙</span>，名曰<span class=\"person\">轩辕</span>。<span class=\"note-anchor\" data-note=\"n1c\">生而<span class=\"mythical\">神灵</span>，</span>弱而能言，幼而徇齐，长而敦敏，成而聪明。"}, {"t": "causal", "rid": "c1", "cause": {"rid": "c1a", "html": "<span class=\"note-anchor\" data-note=\"n1_1a\"><span class=\"clan\">神农氏</span>世衰。</span><span class=\"official\">诸侯</span>相侵伐，暴虐百姓，而<span class=\"clan\">神农氏</span>弗能征。"}, "effect": {"rid": "c1b", "from": "c1a", "html": "於是<span class=\"person\">轩辕</span>乃习用<span class=\"artifact\">干戈</span>，以征不享，诸侯咸来宾从。"}}, {"t": "causal", "rid": "c2", "id": "1.1", "indent": true, "cause": {"rid": "c2a", "html": "而<span class=\"note-anchor\" data-note=\"n1_1b\"><span class=\"person\">蚩尤</span>最为暴，</span>莫能伐。<span class=\"person\">炎帝</span>欲侵陵诸侯，诸侯咸归<span class=\"person\">轩辕</span>。"}, "effect": {"rid": "c2b", "from": "c2a", "html": "<span class=\"person\">轩辕</span>乃修德振兵，治五气，蓺五种，抚万民，度四方，教<span class=\"biology\">熊</span><span class=\"biology\">罴</span><span class=\"biology\">貔貅</span><span class=\"biology\">貙</span><span class=\"biology\">虎</span>，以与<span class=\"person\">炎帝</span>战於<span class=\"note-anchor\" data-note=\"n1_1c\"><span class=\"place\">阪泉之野</span></span>。三战，然後得其志。"}}, {"t": "causal", "rid": "c3", "id": "1.2", "indent": true, "cause": {"rid": "c3a", "html": "<span class=\"person\">蚩尤</span>作乱，不用帝命。"}, "effect": {"rid": "c3b", "from": "c3a", "html": "於是<span class=\"person\">黄帝</span>乃徵师诸侯，与<span class=\"person\">蚩尤</span>战於<span class=\"note-anchor\" data-note=\"n1_2a\"><span class=\"place\">涿鹿之野</span></span>，遂禽杀<span class=\"person\">蚩尤</span>。"}}, {"t": "causal", "rid": "c4", "id": "1.3", "indent": true, "cause": {"rid": "c4a", "html": "而诸侯咸尊<span class=\"person\">轩辕</span>为<span class=\"official\">天子</span>，代<span class=\"clan\">神农氏</span>，是为<span class=\"person\">黄帝</span>。"}, "effect": {"rid": "c4b", "from": "c4a", "html": "<span class=\"concept\">天下</span>有不顺者，<span class=\"person\">黄帝</span>从而征之，平者去之，披山通道，未尝宁居。"}}, {"t": "h3", "text": "疆域与治理"}, {"t": "list", "id": "2", "indent": true, "items": ["东至于<span class=\"place\">海</span>，登<span class=\"place\">丸山</span>，及<span class=\"place\">岱宗</span>。", "西至于<span class=\"place\">空桐</span>，登<span class=\"place\">鸡头</span>。", "南至于<span class=\"place\">江</span>，登<span class=\"place\">熊</span>、<span class=\"place\">湘</span>。", "北逐<span class=\"tribe\">荤粥</span>，合符<span class=\"note-anchor\" data-note=\"n2a\"><span class=\"place\">釜山</span></span>，而邑于<span class=\"note-anchor\" data-note=\"n2b\"><span class=\"place\">涿鹿之阿</span></span>。"]}, {"t": "p", "id": "3", "html": "迁徙往来无常处，以师兵为营卫。官名皆以云命，为<span class=\"official\">云师</span>。置<span class=\"official\">左右大监</span>，监于万国。万国和，而<span class=\"mythical\">鬼神</span><span class=\"place\">山川</span><span class=\"concept\">封禅</span>与为多焉。获<span class=\"artifact\">宝鼎</span>，迎日推筴。举<span class=\"person\">风后</span>、<span class=\"person\">力牧</span>、<span class=\"person\">常先</span>、<span class=\"person\">大鸿</span>以治民。顺<span class=\"celestial\">天地</span>之纪，幽明之占，死生之说，存亡之难。时播<span class=\"biology\">百穀</span><span class=\"biology\">草木</span>，淳化<span class=\"biology\">鸟兽</span><span class=\"biology\">蟲蛾</span>，旁罗<span class=\"celestial\">日月星辰</span>水波土石<span class=\"artifact\">金玉</span>，劳勤心力耳目，节用水火材物。有<span class=\"concept\">土德</span>之瑞，故号<span class=\"person\">黄帝</span>。"}, {"t": "p", "id": "4", "html": "<span class=\"person\">黄帝</span>二十五子，其得姓者十四人。"}, {"t": "h3", "text": "后裔与世系"}, {"t": "p", "id": "4.1", "note": "n4_1", "html": "<span class=\"note-anchor\" data-note=\"n4_1\"><span class=\"person\">黄帝</span>居<span class=\"place\">轩辕之丘</span>，</span>而娶於<span class=\"place\">西陵</span>之女，是为<span class=\"person\">嫘祖</span>。<span class=\"person\">嫘祖</span>为<span class=\"person\">黄帝</span>正妃，生二子，其後皆有<span class=\"concept\">天下</span>："}, {"t": "list", "indent": true, "items": ["其一曰<span class=\"person\">玄嚣</span>，是为<span class=\"person\">青阳</span>，<span class=\"person\">青阳</span>降居<span class=\"place\">江水</span>；", "其二曰<span class=\"person\">昌意</span>，降居<span class=\"place\">若水</span>。<span class=\"person\">昌意</span>娶<span class=\"clan\">蜀山氏</span>女，曰<span class=\"person\">昌仆</span>，生<span class=\"person\">高阳</span>，<span class=\"person\">高阳</span>有<span class=\"concept\">圣德</span>焉。"]}, {"t": "causal", "rid": "c5", "id": "4.2", "cause": {"rid": "c5a", "html": "<span class=\"person\">黄帝</span>崩，葬<span class=\"place\">桥山</span>。"}, "effect": {"rid": "c5b", "from": "c5a", "html": "其孙<span class=\"person\">昌意</span>之子<span class=\"person\">高阳</span>立，是为<span class=\"person\">帝颛顼</span>也。"}}, {"t": "hr"}, {"t": "h2", "text": "帝颛顼"}, {"t": "p", "id": "5", "note": "n5", "html": "<span class=\"note-anchor\" data-note=\"n5\"><span class=\"person\">帝颛顼高阳</span>者，<span class=\"person\">黄帝</span>之孙而<span class=\"person\">昌意</span>之子也。</span>静渊以有谋，疏通而知事；养材以任地，载时以象天，依<span class=\"mythical\">鬼神</span>以制义，治气以教化，絜诚以<span class=\"concept\">祭祀</span>。"}, {"t": "list", "indent": true, "items": ["北至于<span class=\"place\">幽陵</span>，", "南至于<span class=\"place\">交阯</span>，", "西至于<span class=\"place\">流沙</span>，", "东至于<span class=\"place\">蟠木</span>。"]}, {"t": "p", "id": "5.1", "indent": true, "html": "<span class=\"concept\">动静</span>之物，大小之神，<span class=\"concept\">日月</span>所照，莫不砥属。"}, {"t": "causal", "rid": "c6", "id": "6", "cause": {"rid": "c6a", "html": "<span class=\"person\">帝颛顼</span>生子曰<span class=\"person\">穷蝉</span>。<span class=\"person\">颛顼</span>崩，"}, "effect": {"rid": "c6b", "from": "c6a", "html": "而<span class=\"person\">玄嚣</span>之孙<span class=\"person\">高辛</span>立，是为<span class=\"person\">帝喾</span>。"}}, {"t": "hr"}, {"t": "h2", "text": "帝喾"}, {"t": "p", "id": "7", "html": "<span class=\"person\">帝喾高辛</span>者，<span class=\"person\">黄帝</span>之曾孙也。<span class=\"person\">高辛</span>父曰<span class=\"person\">蟜极</span>，<span class=\"person\">蟜极</span>父曰<span class=\"person\">玄嚣</span>，<span class=\"person\">玄嚣</span>父曰<span class=\"person\">黄帝</span>。自<span class=\"person\">玄嚣</span>与<span class=\"person\">蟜极</span>皆不得在位，至<span class=\"person\">高辛</span>即帝位。<span class=\"person\">高辛</span>於<span class=\"person\">颛顼</span>为族子。"}, {"t": "p", "id": "8", "html": "<span class=\"person\">高辛</span>生而<span class=\"mythical\">神灵</span>，自言其名。普施利物，不於其身。聪以知远，明以察微。顺天之义，知民之急。仁而威，惠而信，脩身而<span class=\"concept\">天下</span>服。"}, {"t": "list", "indent": true, "items": ["取地之财而节用之，", "抚教万民而利诲之，", "历<span class=\"concept\">日月</span>而迎送之，", "明<span class=\"mythical\">鬼神</span>而敬事之。"]}, {"t": "p", "id": "8.1", "indent": true, "html": "其色郁郁，其德嶷嶷。其动也时，其服也<span class=\"official\">士</span>。<span class=\"person\">帝喾</span>溉执中而遍<span class=\"concept\">天下</span>，<span class=\"concept\">日月</span>所照，风雨所至，莫不从服。"}, {"t": "causal", "rid": "c7", "id": "9", "cause": {"rid": "c7a", "html": "<span class=\"person\">帝喾</span>娶<span class=\"clan\">陈锋氏</span>女，生<span class=\"person\">放勋</span>。娶<span class=\"clan\">娵訾氏</span>女，生<span class=\"person\">挚</span>。<span class=\"person\">帝喾</span>崩，而<span class=\"person\">挚</span>代立。<span class=\"person\">帝挚</span>立，不善，"}, "effect": {"rid": "c7b", "from": "c7a", "html": "而弟<span class=\"person\">放勋</span>立，是为<span class=\"person\">帝尧</span>。"}}, {"t": "hr"}, {"t": "h2", "text": "帝尧"}, {"t": "h3", "text": "钦明文思"}, {"t": "p", "id": "10", "html": "<span class=\"person\">帝尧</span>者，<span class=\"person\">放勋</span>。其仁如天，其知如神。就之如日，望之如云。富而不骄，贵而不舒。黄收纯衣，彤车乘<span class=\"place\">白马</span>。能明驯德，以亲九族。九族既睦，便章百姓。百姓<span class=\"person\">昭明</span>，合和万国。"}, {"t": "h3", "text": "历法与农时"}, {"t": "p", "id": "11", "html": "乃命<span class=\"person\">羲</span>、<span class=\"person\">和</span>，敬顺<span class=\"place\">昊天</span>，数法<span class=\"celestial\">日月星辰</span>，敬授民时。"}, {"t": "list", "indent": true, "items": ["[11.1] 分命<span class=\"person\">羲仲</span>，居<span class=\"place\">郁夷</span>，曰<span class=\"place\">旸谷</span>。敬道日出，便程东作。<span class=\"celestial\">日中</span>，<span class=\"celestial\">星鸟</span>，以殷<span class=\"celestial\">中春</span>。其民析，<span class=\"biology\">鸟兽</span>字微。", "[11.2] 申命<span class=\"person\">羲叔</span>，居<span class=\"place\">南交</span>。便程南为，敬致。<span class=\"celestial\">日永</span>，<span class=\"celestial\">星火</span>，以正<span class=\"celestial\">中夏</span>。其民因，<span class=\"biology\">鸟兽</span>希革。", "[11.3] 申命<span class=\"person\">和仲</span>，居<span class=\"place\">西土</span>，曰<span class=\"place\">昧谷</span>。敬道日入，便程西成。<span class=\"celestial\">夜中</span>，<span class=\"celestial\">星虚</span>，以正<span class=\"celestial\">中秋</span>。其民夷易，<span class=\"biology\">鸟兽</span>毛毨。", "[11.4] 申命<span class=\"person\">和叔</span>；居<span class=\"place\">北方</span>，曰<span class=\"place\">幽都</span>。便在伏物。<span class=\"celestial\">日短</span>，<span class=\"celestial\">星昴</span>，以正<span class=\"celestial\">中冬</span>。其民燠，<span class=\"biology\">鸟兽</span>氄毛。"]}, {"t": "p", "id": "11.5", "html": "岁三百六<span class=\"timeref\">十六日</span>，以<span class=\"celestial\">闰月</span>正<span class=\"timeref\">四时</span>。信饬百官，众功皆兴。"}, {"t": "h3", "text": "禅让之始"}, {"t": "dialogue", "id": "12", "indent": true, "lines": [{"id": "12.1", "html": "<span class=\"person\">尧</span>曰：「谁可顺此事？」"}, {"id": "12.2", "html": "<span class=\"person\">放齐</span>曰：「嗣子<span class=\"person\">丹硃</span>开明。」"}, {"id": "12.3", "html": "<span class=\"person\">尧</span>曰：「吁！顽凶，不用。」"}, {"id": "12.4", "html": "尧又曰：「谁可者？」"}, {"id": "12.5", "html": "<span class=\"person\">讙兜</span>曰：「<span class=\"person\">共工</span>旁聚布功，可用。」"}, {"id": "12.6", "html": "<span class=\"person\">尧</span>曰：「<span class=\"person\">共工</span>善言，其用僻，似恭漫天，不可。」"}, {"id": "12.7", "html": "尧又曰：「嗟，<span class=\"official\">四岳</span>，汤汤洪水滔天，浩浩怀山<span class=\"place\">襄陵</span>，下民其忧，有能使治者？」"}, {"id": "12.8", "html": "皆曰<span class=\"person\">鲧</span>可。"}, {"id": "12.9", "html": "<span class=\"person\">尧</span>曰：「<span class=\"person\">鲧</span>负命毁族，不可。」"}, {"id": "12.10", "html": "<span class=\"official\">岳</span>曰：「异哉，试不可用而已。」"}, {"id": "12.11", "html": "<span class=\"person\">尧</span>於是听岳用<span class=\"person\">鲧</span>。<span class=\"timeref\">九岁</span>，功用不成。"}]}, {"t": "dialogue", "id": "13", "indent": true, "lines": [{"id": "13.1", "html": "<span class=\"person\">尧</span>曰：「嗟！<span class=\"official\">四岳</span>：朕在位七十载，汝能庸命，践朕位？」"}, {"id": "13.2", "html": "<span class=\"official\">岳</span>应曰：「鄙德忝帝位。」"}, {"id": "13.3", "html": "<span class=\"person\">尧</span>曰：「悉举贵戚及疏远隐匿者。」"}, {"id": "13.4", "html": "众皆言於<span class=\"person\">尧</span>曰：「有矜在民间，曰<span class=\"person\">虞舜</span>。」"}, {"id": "13.5", "html": "<span class=\"person\">尧</span>曰：「然，朕闻之。其何如？」"}, {"id": "13.6", "html": "<span class=\"official\">岳</span>曰：「盲者子。父顽，母嚚，弟傲，能和以孝，烝烝治，不至奸。」"}, {"id": "13.7", "html": "<span class=\"person\">尧</span>曰：「吾其试哉。」"}]}, {"t": "p", "id": "13.8", "html": "於是尧妻之二女，观其德於二女。<span class=\"person\">舜</span>饬下二女於<span class=\"place\">妫汭</span>，如妇礼。尧善之，乃使<span class=\"person\">舜</span>慎和<span class=\"concept\">五典</span>，<span class=\"concept\">五典</span>能从。乃遍入百官，百官时序。宾於四门，四门穆穆，诸侯远方宾客皆敬。<span class=\"person\">尧</span>使<span class=\"person\">舜</span>入山林川泽，暴<span class=\"artifact\">风雷</span>雨，<span class=\"person\">舜</span>行不迷。<span class=\"person\">尧</span>以为圣，召<span class=\"person\">舜</span>曰：「女谋事至而言可绩，<span class=\"timeref\">三年</span>矣。女登帝位。」<span class=\"person\">舜</span>让於德不怿。<span class=\"timeref\">正月上日</span>，<span class=\"person\">舜</span>受终於<span class=\"place\">文祖</span>。<span class=\"place\">文祖</span>者，尧大祖也。"}, {"t": "hr"}, {"t": "h2", "text": "帝舜"}, {"t": "h3", "text": "摄政与礼法"}, {"t": "p", "id": "14", "html": "於是<span class=\"person\">帝尧</span>老，命<span class=\"person\">舜</span>摄行<span class=\"official\">天子</span>之政，以观<span class=\"concept\">天命</span>。<span class=\"person\">舜</span>乃在<span class=\"artifact\">璿玑玉衡</span>，以齐<span class=\"celestial\">七政</span>。遂类于<span class=\"mythical\">上帝</span>，禋于<span class=\"concept\">六宗</span>，望于<span class=\"place\">山川</span>，辩于群神。揖<span class=\"artifact\">五瑞</span>，择吉月日，见<span class=\"official\">四岳</span>诸牧，班瑞。"}, {"t": "p", "id": "14.1", "html": "<span class=\"timeref\">岁二月</span>，东<span class=\"concept\">巡狩</span>，至於<span class=\"place\">岱宗</span>，祡，望秩於<span class=\"place\">山川</span>。遂见<span class=\"place\">东方</span><span class=\"official\">君长</span>，合时月正日，同律度量衡，脩<span class=\"concept\">五礼</span>五玉三帛二生一死为<span class=\"person\">挚</span>，如<span class=\"artifact\">五器</span>，卒乃复。<span class=\"timeref\">五月</span>，南<span class=\"concept\">巡狩</span>；<span class=\"timeref\">八月</span>，西<span class=\"concept\">巡狩</span>；<span class=\"timeref\">十一月</span>，北<span class=\"concept\">巡狩</span>：皆如初。归，至于祖祢庙，用<span class=\"biology\">特牛</span>礼。"}, {"t": "p", "id": "14.2", "html": "<span class=\"timeref\">五岁</span>一<span class=\"concept\">巡狩</span>，群后四朝。遍告以言，明试以功，车服以庸。肇十有二州，决川。象以<span class=\"concept\">典刑</span>，<span class=\"concept\">流宥五刑</span>，鞭作<span class=\"concept\">官刑</span>，扑作<span class=\"concept\">教刑</span>，金作<span class=\"concept\">赎刑</span>。眚灾过，赦；怙终贼，刑。钦哉，钦哉，惟刑之静哉！"}, {"t": "h3", "text": "惩办四罪"}, {"t": "causal", "rid": "c8", "id": "15", "cause": {"rid": "c8a", "html": "<span class=\"person\">讙兜</span>进言<span class=\"person\">共工</span>，<span class=\"person\">尧</span>曰不可而试之<span class=\"official\">工师</span>，<span class=\"person\">共工</span>果淫辟。<span class=\"official\">四岳</span>举<span class=\"person\">鲧</span>治鸿水，<span class=\"person\">尧</span>以为不可，<span class=\"official\">岳</span>彊请试之，试之而无功，故百姓不便。<span class=\"tribe\">三苗</span>在<span class=\"place\">江淮</span>、<span class=\"place\">荆州</span>数为乱。"}, "effect": {"rid": "c8b", "from": "c8a", "html": "於是<span class=\"person\">舜</span>归而言於帝，"}}, {"t": "list", "indent": true, "items": ["[15.1] 请流<span class=\"person\">共工</span>於<span class=\"place\">幽陵</span>，以变<span class=\"tribe\">北狄</span>；", "[15.2] 放<span class=\"person\">驩兜</span>於<span class=\"place\">崇山</span>，以变<span class=\"tribe\">南蛮</span>；", "[15.3] 迁<span class=\"tribe\">三苗</span>於<span class=\"place\">三危</span>，以变<span class=\"tribe\">西戎</span>；", "[15.4] 殛<span class=\"person\">鲧</span>於<span class=\"place\">羽山</span>，以变<span class=\"tribe\">东夷</span>："]}, {"t": "summary", "rid": "s1", "from": "c8b", "id": "15.5", "anchor": "head", "html": "四罪而<span class=\"concept\">天下</span>咸服。"}, {"t": "p", "id": "16", "html": "尧立<span class=\"timeref\">七十年</span>得<span class=\"person\">舜</span>，<span class=\"timeref\">二十年</span>而老，令<span class=\"person\">舜</span>摄行<span class=\"official\">天子</span>之政，荐之於天。尧辟位凡<span class=\"timeref\">二十八年</span>而崩。百姓悲哀，如丧父母。<span class=\"timeref\">三年</span>，四方莫举乐，以思尧。"}, {"t": "causal", "rid": "c9", "id": "16.1", "indent": true, "cause": {"rid": "c9a", "html": "<span class=\"person\">尧</span>知子<span class=\"person\">丹硃</span>之不肖，不足授<span class=\"concept\">天下</span>，"}, "effect": {"rid": "c9b", "from": "c9a", "html": "於是乃权授<span class=\"person\">舜</span>。授<span class=\"person\">舜</span>，则<span class=\"concept\">天下</span>得其利而<span class=\"person\">丹硃</span>病；授<span class=\"person\">丹硃</span>，则<span class=\"concept\">天下</span>病而<span class=\"person\">丹硃</span>得其利。<span class=\"person\">尧</span>曰「终不以<span class=\"concept\">天下</span>之病而利一人」，而卒授<span class=\"person\">舜</span>以<span class=\"concept\">天下</span>。"}}, {"t": "causal", "rid": "c10", "id": "16.2", "indent": true, "cause": {"rid": "c10a", "html": "<span class=\"person\">尧</span>崩，<span class=\"timeref\">三年</span>之丧毕，<span class=\"person\">舜</span>让辟<span class=\"person\">丹硃</span>於<span class=\"place\">南河之南</span>。诸侯<span class=\"action\">朝觐</span>者不之<span class=\"person\">丹硃</span>而之<span class=\"person\">舜</span>，狱讼者不之<span class=\"person\">丹硃</span>而之<span class=\"person\">舜</span>，讴歌者不讴歌<span class=\"person\">丹硃</span>而讴歌<span class=\"person\">舜</span>。"}, "effect": {"rid": "c10b", "from": "c10a", "html": "<span class=\"person\">舜</span>曰「天也」，夫而後之<span class=\"place\">中国</span>践<span class=\"official\">天子</span>位焉，是为<span class=\"person\">帝舜</span>。"}}, {"t": "h3", "text": "德行与磨难"}, {"t": "p", "id": "17", "html": "<span class=\"person\">虞舜</span>者，名曰<span class=\"person\">重华</span>。<span class=\"person\">重华</span>父曰<span class=\"person\">瞽叟</span>，<span class=\"person\">瞽叟</span>父曰<span class=\"person\">桥牛</span>，<span class=\"person\">桥牛</span>父曰<span class=\"person\">句望</span>，<span class=\"person\">句望</span>父曰<span class=\"person\">敬康</span>，<span class=\"person\">敬康</span>父曰<span class=\"person\">穷蝉</span>，<span class=\"person\">穷蝉</span>父曰<span class=\"person\">帝颛顼</span>，<span class=\"person\">颛顼</span>父曰<span class=\"person\">昌意</span>：以至<span class=\"person\">舜</span><span class=\"timeref\">七世</span>矣。自从<span class=\"person\">穷蝉</span>以至<span class=\"person\">帝舜</span>，皆微为庶人。"}, {"t": "causal", "rid": "c11", "id": "18", "cause": {"rid": "c11a", "html": "<span class=\"person\">舜</span>父<span class=\"person\">瞽叟</span>盲，而<span class=\"person\">舜</span>母死，<span class=\"person\">瞽叟</span>更娶妻而生<span class=\"person\">象</span>，<span class=\"person\">象</span>傲。<span class=\"person\">瞽叟</span>爱後妻子，常欲杀<span class=\"person\">舜</span>，<span class=\"person\">舜</span>避逃；及有小过，则受罪。"}, "effect": {"rid": "c11b", "from": "c11a", "html": "顺事父及後母与弟，日以笃谨，匪有解。"}}, {"t": "p", "id": "19", "html": "<span class=\"person\">舜</span>，<span class=\"place\">冀州</span>之人也。<span class=\"person\">舜</span>耕<span class=\"place\">历山</span>，渔<span class=\"place\">雷泽</span>，陶<span class=\"place\">河滨</span>，作什器於<span class=\"place\">寿丘</span>，就时於<span class=\"place\">负夏</span>。<span class=\"person\">舜</span>父<span class=\"person\">瞽叟</span>顽，母嚚，弟<span class=\"person\">象</span>傲，皆欲杀<span class=\"person\">舜</span>。<span class=\"person\">舜</span>顺適不失子道，兄弟孝慈。欲杀，不可得；即求，尝在侧。"}, {"t": "block", "blocks": [{"t": "p", "id": "20", "html": "<span class=\"person\">舜</span><span class=\"timeref\">年二十</span>以孝闻。三十而<span class=\"person\">帝尧</span>问可用者，<span class=\"official\">四岳</span>咸荐<span class=\"person\">虞舜</span>，曰可。於是<span class=\"person\">尧</span>乃以二女妻<span class=\"person\">舜</span>以观其内，使九男与处以观其外。<span class=\"person\">舜</span>居<span class=\"place\">妫汭</span>，内行弥谨。尧二女不敢以贵骄事<span class=\"person\">舜</span>亲戚，甚有妇道。尧九男皆益笃。<span class=\"person\">舜</span>耕<span class=\"place\">历山</span>，<span class=\"place\">历山</span>之人皆让畔；渔<span class=\"place\">雷泽</span>，<span class=\"place\">雷泽</span>上人皆让居；陶<span class=\"place\">河滨</span>，<span class=\"place\">河滨</span>器皆不苦窳。<span class=\"timeref\">一年</span>而所居成聚，<span class=\"timeref\">二年</span>成邑，<span class=\"timeref\">三年</span><span class=\"place\">成都</span>。<span class=\"person\">尧</span>乃赐<span class=\"person\">舜</span>絺衣，与琴，为筑仓廪，予<span class=\"biology\">牛羊</span>。"}, {"t": "causal", "rid": "c12", "id": "20.1", "indent": true, "cause": {"rid": "c12a", "html": "<span class=\"person\">瞽叟</span>尚复欲杀之，使<span class=\"person\">舜</span>上涂廪，<span class=\"person\">瞽叟</span>从下纵火焚廪。"}, "effect": {"rid": "c12b", "from": "c12a", "html": "<span class=\"person\">舜</span>乃以两笠自扞而下，去，得不死。"}}, {"t": "causal", "rid": "c13", "id": "20.2", "indent": true, "cause": {"rid": "c13a", "html": "後<span class=\"person\">瞽叟</span>又使<span class=\"person\">舜</span>穿井，<span class=\"person\">舜</span>穿井为匿空旁出。<span class=\"person\">舜</span>既入深，<span class=\"person\">瞽叟</span>与<span class=\"person\">象</span>共下土实井，"}, "effect": {"rid": "c13b", "from": "c13a", "html": "<span class=\"person\">舜</span>从匿空出，去。<span class=\"person\">瞽叟</span>、象喜，以<span class=\"person\">舜</span>为已死。"}}, {"t": "dialogue", "id": "20.2d", "indent": true, "lines": [{"id": "20.2d.1", "html": "<span class=\"person\">象</span>曰「本谋者象。」"}, {"id": "20.2d.2", "html": "<span class=\"person\">象</span>与其父母分，於是曰：「<span class=\"person\">舜</span>妻尧二女，与琴，象取之。<span class=\"biology\">牛羊</span>仓廪予父母。」"}, {"id": "20.2d.3", "html": "象乃止<span class=\"person\">舜</span>宫居，鼓其琴。<span class=\"person\">舜</span>往见之。"}, {"id": "20.2d.4", "html": "<span class=\"person\">象</span>鄂不怿，曰：「我思<span class=\"person\">舜</span>正郁陶！」"}, {"id": "20.2d.5", "html": "<span class=\"person\">舜</span>曰：「然，尔其庶矣！」"}]}, {"t": "p", "id": "20.3", "html": "<span class=\"person\">舜</span>复事<span class=\"person\">瞽叟</span>爱弟弥谨。於是<span class=\"person\">尧</span>乃试<span class=\"person\">舜</span><span class=\"concept\">五典</span>百官，皆治。"}]}, {"t": "h2", "text": "举贤任能"}, {"t": "h3", "text": "举贤任能"}, {"t": "causal", "rid": "c14", "id": "21", "cause": {"rid": "c14a", "html": "昔<span class=\"clan\">高阳氏</span>有才子八人，世得其利，谓之「<span class=\"person\">八恺</span>」。<span class=\"clan\">高辛氏</span>有才子八人，世谓之「<span class=\"person\">八元</span>」。此十六族者，世济其美，不陨其名。至於<span class=\"person\">尧</span>，尧未能举。"}, "effect": {"rid": "c14b", "from": "c14a", "html": "<span class=\"person\">舜</span>举<span class=\"person\">八恺</span>，使主后土，以揆百事，莫不时序。举<span class=\"person\">八元</span>，使布<span class=\"concept\">五教</span>于四方，父义，母慈，兄友，弟恭，子孝，内平外成。"}}, {"t": "list", "id": "22", "items": ["[22.1] 昔<span class=\"clan\">帝鸿氏</span>有不才子，掩义隐贼，好行凶慝，<span class=\"concept\">天下</span>谓之<span class=\"person\">浑沌</span>。", "[22.2] <span class=\"clan\">少暤氏</span>有不才子，毁信恶忠，崇饰恶言，<span class=\"concept\">天下</span>谓之<span class=\"person\">穷奇</span>。", "[22.3] <span class=\"clan\">颛顼氏</span>有不才子，不可教训，不知话言，<span class=\"concept\">天下</span>谓之<span class=\"person\">檮杌</span>。", "[22.4] 此三族世忧之。至于尧，尧未能去。", "[22.5] <span class=\"clan\">缙云氏</span>有不才子，贪于饮食，冒于货贿，<span class=\"concept\">天下</span>谓之<span class=\"person\">饕餮</span>。"]}, {"t": "causal", "rid": "c15", "id": "22.6", "indent": true, "cause": {"rid": "c15a", "html": "<span class=\"concept\">天下</span>恶之，比之<span class=\"person\">三凶</span>。"}, "effect": {"rid": "c15b", "from": "c15a", "html": "<span class=\"person\">舜</span>宾於四门，乃流<span class=\"person\">四凶族</span>，迁于四裔，以御螭魅，於是四门辟，言毋凶人也。"}}, {"t": "causal", "rid": "c16", "id": "23", "cause": {"rid": "c16a", "html": "<span class=\"person\">舜</span>入于<span class=\"place\">大麓</span>，烈<span class=\"artifact\">风雷</span>雨不迷，<span class=\"person\">尧</span>乃知<span class=\"person\">舜</span>之足授<span class=\"concept\">天下</span>。"}, "effect": {"rid": "c16b", "from": "c16a", "html": "<span class=\"person\">尧</span>老，使<span class=\"person\">舜</span>摄行<span class=\"official\">天子</span>政，<span class=\"concept\">巡狩</span>。<span class=\"person\">舜</span>得举用事<span class=\"timeref\">二十年</span>，而<span class=\"person\">尧</span>使摄政。摄政<span class=\"timeref\">八年</span>而<span class=\"person\">尧</span>崩。<span class=\"timeref\">三年</span>丧毕，让<span class=\"person\">丹硃</span>，<span class=\"concept\">天下</span>归<span class=\"person\">舜</span>。"}}, {"t": "p", "id": "23.1", "html": "而<span class=\"person\">禹</span>、<span class=\"person\">皋陶</span>、<span class=\"person\">契</span>、<span class=\"person\">后稷</span>、<span class=\"person\">伯夷</span>、<span class=\"person\">夔</span>、<span class=\"person\">龙</span>、<span class=\"person\">倕</span>、<span class=\"person\">益</span>、<span class=\"person\">彭祖</span>自<span class=\"person\">尧</span>时而皆举用，未有分职。於是<span class=\"person\">舜</span>乃至於<span class=\"place\">文祖</span>，谋于<span class=\"official\">四岳</span>，辟四门，明通四方耳目，命<span class=\"official\">十二牧</span>论帝德，行厚德，远佞人，则<span class=\"tribe\">蛮夷</span>率服。"}, {"t": "p", "id": "23.2", "html": "<span class=\"person\">舜</span>谓<span class=\"official\">四岳</span>曰：「有能奋庸美<span class=\"person\">尧</span>之事者，使居官相事？」"}, {"t": "list", "indent": true, "items": ["[23.2.1] 皆曰：「<span class=\"person\">伯禹</span>为<span class=\"official\">司空</span>，可美帝功。」<span class=\"person\">舜</span>曰：「嗟，然！<span class=\"person\">禹</span>，汝平水土，维是勉哉。」<span class=\"person\">禹</span>拜稽首，让於<span class=\"official\">稷</span>、<span class=\"person\">契</span>与<span class=\"person\">皋陶</span>。<span class=\"person\">舜</span>曰：「然，往矣。」", "[23.2.2] <span class=\"person\">舜</span>曰：「<span class=\"person\">弃</span>，黎民始饥，汝<span class=\"person\">后稷</span>播时<span class=\"biology\">百穀</span>。」", "[23.2.3] <span class=\"person\">舜</span>曰：「<span class=\"person\">契</span>，百姓不亲，<span class=\"concept\">五品</span>不驯，汝为<span class=\"official\">司徒</span>，而敬敷<span class=\"concept\">五教</span>，在宽。」", "[23.2.4] <span class=\"person\">舜</span>曰：「<span class=\"person\">皋陶</span>，<span class=\"tribe\">蛮夷</span>猾夏，寇贼奸轨，汝作<span class=\"official\">士</span>，<span class=\"concept\">五刑</span>有服，<span class=\"concept\">五服</span>三就；五流有度，五度三居：维明能信。」", "[23.2.5] <span class=\"person\">舜</span>曰：「谁能驯予工？」皆曰<span class=\"person\">垂</span>可。於是以<span class=\"person\">垂</span>为<span class=\"person\">共工</span>。", "[23.2.6] <span class=\"person\">舜</span>曰：「谁能驯予上下<span class=\"biology\">草木</span><span class=\"biology\">鸟兽</span>？」皆曰<span class=\"person\">益</span>可。於是以<span class=\"person\">益</span>为<span class=\"official\">朕虞</span>。<span class=\"person\">益</span>拜稽首，让于诸臣<span class=\"person\">硃虎</span>、<span class=\"person\">熊罴</span>。<span class=\"person\">舜</span>曰：「往矣，汝谐。」遂以<span class=\"person\">硃虎</span>、<span class=\"person\">熊罴</span>为佐。", "[23.2.7] <span class=\"person\">舜</span>曰：「嗟！<span class=\"official\">四岳</span>，有能典朕<span class=\"concept\">三礼</span>？」皆曰<span class=\"person\">伯夷</span>可。<span class=\"person\">舜</span>曰：「嗟！<span class=\"person\">伯夷</span>，以汝为<span class=\"official\">秩宗</span>，夙夜维敬，直哉维静絜。」<span class=\"person\">伯夷</span>让<span class=\"person\">夔</span>、<span class=\"person\">龙</span>。", "[23.2.8] <span class=\"person\">舜</span>曰：「然。以<span class=\"person\">夔</span>为<span class=\"official\">典乐</span>，教稺子，直而温，宽而栗，刚而毋虐，简而毋傲；诗言意，歌长言，声依永，律和声，<span class=\"concept\">八音</span>能谐，毋相夺伦，<span class=\"mythical\">神人</span>以和。」<span class=\"person\">夔</span>曰：「於！予击石拊石，<span class=\"biology\">百兽</span>率舞。」", "[23.2.9] <span class=\"person\">舜</span>曰：「<span class=\"person\">龙</span>，朕畏忌谗说殄伪，振惊朕众，命汝为<span class=\"official\">纳言</span>，夙夜出入朕命，惟信。」"]}, {"t": "p", "id": "23.3", "html": "<span class=\"person\">舜</span>曰：「嗟！女二十有<span class=\"timeref\">二人</span>，敬哉，惟时相天事。」<span class=\"timeref\">三岁</span>一考功，三考绌陟，远近众功咸兴。分北<span class=\"tribe\">三苗</span>。"}, {"t": "p", "id": "24", "html": "此二十<span class=\"timeref\">二人</span>咸成厥功："}, {"t": "list", "indent": true, "items": ["[24.1] <span class=\"person\">皋陶</span>为<span class=\"official\">大理</span>，平，民各伏得其实；", "[24.2] <span class=\"person\">伯夷</span>主礼，上下咸让；", "[24.3] <span class=\"person\">垂</span>主<span class=\"official\">工师</span>，百工致功；", "[24.4] <span class=\"person\">益</span>主<span class=\"official\">虞</span>，山泽辟；", "[24.5] <span class=\"person\">弃</span>主<span class=\"official\">稷</span>，<span class=\"biology\">百穀</span>时茂；", "[24.6] <span class=\"person\">契</span>主<span class=\"official\">司徒</span>，百姓亲和；", "[24.7] <span class=\"person\">龙</span>主宾客，远人至；", "[24.8] <span class=\"official\">十二牧</span>行而<span class=\"place\">九州</span>莫敢辟违；", "[24.9] 唯<span class=\"person\">禹</span>之功为大，披九山，通九泽，决<span class=\"place\">九河</span>，定<span class=\"place\">九州</span>，各以其职来贡，不失厥宜。方<span class=\"timeref\">五千里</span>，至于<span class=\"concept\">荒服</span>。南抚<span class=\"place\">交阯</span>、<span class=\"tribe\">北发</span>，<span class=\"tribe\">西戎</span>、<span class=\"tribe\">析枝</span>、<span class=\"tribe\">渠廋</span>、<span class=\"tribe\">氐</span>、<span class=\"tribe\">羌</span>，北<span class=\"tribe\">山戎</span>、<span class=\"tribe\">发</span>、<span class=\"tribe\">息慎</span>，东长、<span class=\"tribe\">鸟夷</span>，四<span class=\"place\">海</span>之内咸戴<span class=\"person\">帝舜</span>之功。於是<span class=\"person\">禹</span>乃兴九招之乐，致异物，<span class=\"biology\">凤皇</span>来翔。<span class=\"concept\">天下</span>明德皆自<span class=\"person\">虞帝</span>始。"]}, {"t": "p", "id": "25", "html": "<span class=\"person\">舜</span><span class=\"timeref\">年二十</span>以孝闻，<span class=\"timeref\">年三十</span><span class=\"person\">尧</span>举之，<span class=\"timeref\">年五十</span>摄行<span class=\"official\">天子</span>事，<span class=\"timeref\">年五十八</span><span class=\"person\">尧</span>崩，<span class=\"timeref\">年六十一</span>代尧践帝位。践帝位<span class=\"timeref\">三十九年</span>，南<span class=\"concept\">巡狩</span>，崩於<span class=\"place\">苍梧之野</span>。葬於<span class=\"place\">江南九疑</span>，是为<span class=\"place\">零陵</span>。"}, {"t": "p", "id": "25.1", "html": "<span class=\"person\">舜</span>之践帝位，载<span class=\"official\">天子</span>旗，往朝父<span class=\"person\">瞽叟</span>，<span class=\"person\">夔</span><span class=\"person\">夔</span>唯谨，如子道。封弟<span class=\"person\">象</span>为诸侯。<span class=\"person\">舜</span>子<span class=\"person\">商均</span>亦不肖，<span class=\"person\">舜</span>乃豫荐<span class=\"person\">禹</span>於天。<span class=\"timeref\">十七年</span>而崩。<span class=\"timeref\">三年</span>丧毕，<span class=\"person\">禹</span>亦乃让<span class=\"person\">舜</span>子，如<span class=\"person\">舜</span>让<span class=\"person\">尧</span>子。诸侯归之，然後<span class=\"person\">禹</span>践<span class=\"official\">天子</span>位。"}, {"t": "p", "id": "25.2", "html": "尧子<span class=\"person\">丹硃</span>，<span class=\"person\">舜</span>子<span class=\"person\">商均</span>，皆有疆土，以奉先祀。服其服，<span class=\"concept\">礼乐</span>如之。以客见<span class=\"official\">天子</span>，<span class=\"official\">天子</span>弗臣，示不敢专也。"}, {"t": "hr"}, {"t": "h2", "text": "总结：五帝世系"}, {"t": "p", "id": "26", "html": "自<span class=\"person\">黄帝</span>至<span class=\"person\">舜</span>、<span class=\"person\">禹</span>，皆同姓而异其国号，以章明德。"}, {"t": "list", "indent": true, "items": ["故<span class=\"person\">黄帝</span>为<span class=\"clan\">有熊</span>，", "<span class=\"person\">帝颛顼</span>为<span class=\"clan\">高阳</span>，", "<span class=\"person\">帝喾</span>为<span class=\"clan\">高辛</span>，", "<span class=\"person\">帝尧</span>为<span class=\"clan\">陶唐</span>，", "<span class=\"person\">帝舜</span>为<span class=\"clan\">有虞</span>。", "<span class=\"person\">帝禹</span>为<span class=\"clan\">夏后</span>而别氏，姓<span class=\"clan\">姒氏</span>。", "<span class=\"person\">契</span>为<span class=\"clan\">商</span>，姓<span class=\"clan\">子氏</span>。", "<span class=\"person\">弃</span>为<span class=\"clan\">周</span>，姓<span class=\"clan\">姬氏</span>。"]}, {"t": "hr"}, {"t": "h2", "text": "太史公曰"}, {"t": "p", "id": "27", "html": "<span class=\"person\">太史公</span>曰：学者多称<span class=\"clan\">五帝</span>，尚矣。然《尚书》独载<span class=\"person\">尧</span>以来；而<span class=\"concept\">百家</span>言<span class=\"person\">黄帝</span>，其文不雅驯，荐绅先生难言之。<span class=\"person\">孔子</span>所传<span class=\"person\">宰予</span>问<span class=\"clan\">五帝</span>德及帝系姓，<span class=\"concept\">儒者</span>或不传。余尝西至<span class=\"place\">空桐</span>，北过<span class=\"place\">涿鹿</span>，东渐於<span class=\"place\">海</span>，南浮<span class=\"place\">江淮</span>矣，至长老皆各往往称<span class=\"person\">黄帝</span>、<span class=\"person\">尧</span>、<span class=\"person\">舜</span>之处，风教固殊焉，总之不离古文者近是。予观《春秋》、《国语》，其<span class=\"tribe\">发</span>明<span class=\"clan\">五帝</span>德、帝系姓章矣，顾弟弗深考，其所表见皆不虚。书缺有间矣，其轶乃时时见於他说。非好学深思，心知其意，固难为浅见寡闻道也。余并论次，择其言尤雅者，故著为<span class=\"concept\">本纪</span>书首。"}, {"t": "h3", "text": "赞"}, {"t": "cite", "id": "28", "html": "帝出<span class=\"person\">少典</span>，居于<span class=\"place\">轩丘</span>。既代炎历，遂禽<span class=\"person\">蚩尤</span>。<span class=\"person\">高阳</span>嗣位，静深有谋。小大远近，莫不怀柔。爰洎<span class=\"person\">帝喾</span>，列圣同休。<span class=\"person\">帝挚</span>之弟，其号<span class=\"person\">放勋</span>。就之如日，望之如云。<span class=\"place\">郁夷</span>东作，<span class=\"place\">昧谷</span>西曛。明扬仄陋，玄德升闻。能让<span class=\"concept\">天下</span>，贤哉<span class=\"timeref\">二君</span>！"}]};
const NOTES_RAW = {"chapter":"001_五帝本纪","notes":[{"id":"n001","anchor_text":"","items":[{"source":"jijie","label":"集解","text":"凡是徐氏義，稱徐姓名以別之。餘者悉是駰注解，并集眾家義。"},{"source":"suoyin","label":"索隱","text":"紀者，記也。本其事而記之，故曰本紀。又紀，理也，絲縷有紀。而帝王書稱紀者，言爲後代綱紀也。"},{"source":"zhengyi","label":"正義","text":"鄭玄注《中候勅省圖》云：「德合五帝坐星者，稱帝。」又《坤靈圖》云：「德配天地，在正不在私，曰帝。」案：太史公依《世本》、《大戴禮》，以黃帝、顓頊、帝嚳、唐堯、虞舜爲五帝。譙周、應劭、宋均皆同。而孔安國《尚書序》，皇甫謐《帝王世紀》，孫氏注《世本》，並以伏犧、神農、黃帝爲三皇，少昊、顓頊、高辛、唐、虞爲五帝。裴松之《史目》云「天子稱本紀，諸侯曰世家」。本者，繫其本系，故曰本；紀者，理也，統理眾事，繫之年月，名之曰紀；第者，次序之目；一者，舉數之由：故曰《五帝本紀第一》。　《禮》云：「動則左史書之，言則右史書之。」《正義》云：「左陽，故記動。右陰，故記言。言爲《尚書》，事爲《春秋》。」案：春秋時置左右史，故云《史記》也。"}],"sentence_id":null},{"id":"n002","anchor_text":"黃帝者，","items":[{"source":"jijie","label":"集解","text":"徐廣曰：「號有熊。」"},{"source":"suoyin","label":"索隱","text":"案：有土德之瑞，土色黃，故稱黃帝，猶神農火德王而稱炎帝然也。此以黃帝爲五帝之首，蓋依《大戴禮五帝德》。又譙周、宋均亦以爲然。而孔安國、皇甫謐《帝王代紀》及孫氏注《系本》並以伏犧、神農、黃帝爲三皇，少昊、高陽、高辛、唐、虞爲五帝。注「號有熊」者，以其本是有熊國君之子故也。亦號軒轅氏。皇甫謐云：「居軒轅之丘，因以爲名，又以爲號。」又據《左傳》，亦號帝鴻氏也。"},{"source":"zhengyi","label":"正義","text":"《輿地志》云：「涿鹿本名彭城，黃帝初都，遷有熊也。」案：黃帝有熊國君，乃少典國君之次子，號曰有熊氏，又曰縉雲氏，又曰帝鴻氏，亦曰帝軒氏。母曰附寶，之祁野，見大電繞北斗樞星，感而懷孕，二十四月而生黃帝於壽丘。壽丘在魯東門之北，今在兗州曲阜縣東北六里。生日角龍顏，有景雲之瑞，以土德王，故曰黃帝。封泰山，禪亭亭。亭亭在牟陰。"}],"sentence_id":"s001"},{"id":"n003","anchor_text":"少典之子，","items":[{"source":"jijie","label":"集解","text":"譙周曰：「有熊國君，少典之子也。」皇甫謐曰：「有熊，今河南新鄭是也。」"},{"source":"suoyin","label":"索隱","text":"少典者，諸侯國號，非人名也。又案：《國語》云「少典娶有蟜氏女，生黃帝、炎帝」。然則炎帝亦少典之子。炎黃二帝雖則相承，如《帝王代紀》中閒凡隔八帝，五百餘年。若以少典是其父名，豈黃帝經五百餘年而始代炎帝後爲天子乎？何其年之長也！又案：《秦本紀》云「顓頊氏之裔孫曰女脩，吞玄鳥之卵而生大業，大業娶少典氏而生柏翳」。明少典是國號，非人名也。黃帝即少典氏後代之子孫，賈逵亦謂然，故《左傳》「高陽氏有才子八人」，亦謂其後代子孫而稱爲子是也。譙周字允南，蜀人，魏散騎常侍徵，不拜。此注所引者，是其人所著《古史考》之說也。皇甫謐字士安，晉人，號玄晏先生。今所引者，是其所作《帝王代紀》也。"}],"sentence_id":"s001"},{"id":"n004","anchor_text":"姓公孫，名曰軒轅。","items":[{"source":"suoyin","label":"索隱","text":"案：皇甫謐云「黃帝生於壽丘，長於姬水，因以爲姓。居軒轅之丘，因以爲名，又以爲號」。是本姓公孫，長居姬水，因改姓姬。"}],"sentence_id":"s001"},{"id":"n005","anchor_text":"生而神靈，弱而能言，","items":[{"source":"suoyin","label":"索隱","text":"弱謂幼弱時也。蓋未合能言之時而黃帝即言，所以爲神異也。潘岳有《哀弱子》篇，其子未七旬曰弱。"},{"source":"zhengyi","label":"正義","text":"言神異也。《易》曰「陰陽
