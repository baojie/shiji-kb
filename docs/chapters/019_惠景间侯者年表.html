<h1><a href="#pn-0" id="pn-0" class="para-num" title="点击复制链接">0</a> 惠景间侯者年表 <a href="../original_text/019_惠景间侯者年表.txt" class="original-text-link">原文</a></h1>

<h2>太史公读列封至便侯</h2>

<div class="note-box note-太史公曰" title="太史公曰">
<p><a href="#pn-1.1" id="pn-1.1" class="para-num" title="点击复制链接">1.1</a> <a href="../entities/official.html#entity-太史公" class="entity-link" target="_blank"><span class="official" title="官职">太史公</span></a>读列封至<a href="../entities/official.html#entity-便侯" class="entity-link" target="_blank"><span class="official" title="官职">便侯</span></a>曰：有以也夫！</p>

<p><a href="#pn-1.2" id="pn-1.2" class="para-num" title="点击复制链接">1.2</a> <a href="../entities/dynasty.html#entity-长沙" class="entity-link" target="_blank"><span class="dynasty" title="朝代/氏族">长沙</span></a>王者，着<a href="../entities/institution.html#entity-令甲" class="entity-link" target="_blank"><span class="institution" title="制度">令甲</span></a>，称其忠焉。</p>

<p><a href="#pn-2.1" id="pn-2.1" class="para-num" title="点击复制链接">2.1</a> 昔<a href="../entities/official.html#entity-高祖" class="entity-link" target="_blank"><span class="official" title="官职">高祖</span></a>定<a href="../entities/concept.html#entity-天下" class="entity-link" target="_blank"><span class="concept" title="思想">天下</span></a>，<a href="../entities/official.html#entity-功臣" class="entity-link" target="_blank"><span class="official" title="官职">功臣</span></a>非同姓疆土而王者八国。</p>

<p><a href="#pn-2.2" id="pn-2.2" class="para-num" title="点击复制链接">2.2</a> 至<a href="../entities/official.html#entity-孝惠帝" class="entity-link" target="_blank"><span class="official" title="官职">孝惠帝</span></a>时，唯独<a href="../entities/dynasty.html#entity-长沙" class="entity-link" target="_blank"><span class="dynasty" title="朝代/氏族">长沙</span></a>全，禅<a href="../entities/time.html#entity-五世" class="entity-link" target="_blank"><span class="time" title="时间">五世</span></a>，以无嗣绝，竟无过，为籓守职，信矣。</p>

<p><a href="#pn-2.3" id="pn-2.3" class="para-num" title="点击复制链接">2.3</a> 故其泽流枝庶，毋功而侯者<a href="../entities/time.html#entity-数人" class="entity-link" target="_blank"><span class="time" title="时间">数人</span></a>。</p>

<p><a href="#pn-3.1" id="pn-3.1" class="para-num" title="点击复制链接">3.1</a> 及<a href="../entities/official.html#entity-孝惠" class="entity-link" target="_blank"><span class="official" title="官职">孝惠</span></a>讫<a href="../entities/official.html#entity-孝景" class="entity-link" target="_blank"><span class="official" title="官职">孝景</span></a>间<a href="../entities/time.html#entity-五十载" class="entity-link" target="_blank"><span class="time" title="时间">五十载</span></a>，追修<a href="../entities/official.html#entity-高祖" class="entity-link" target="_blank"><span class="official" title="官职">高祖</span></a>时遗<a href="../entities/official.html#entity-功臣" class="entity-link" target="_blank"><span class="official" title="官职">功臣</span></a>，及从<a href="../entities/dynasty.html#entity-代" class="entity-link" target="_blank"><span class="dynasty" title="朝代/氏族">代</span></a>来，<a href="../entities/dynasty.html#entity-吴" class="entity-link" target="_blank"><span class="dynasty" title="朝代/氏族">吴</span></a><a href="../entities/dynasty.html#entity-楚" class="entity-link" target="_blank"><span class="dynasty" title="朝代/氏族">楚</span></a>之劳，诸侯子若肺腑，外国<a href="../entities/person.html#entity-归义" class="entity-link" target="_blank"><span class="person" title="人名">归义</span></a>，封者<a href="../entities/time.html#entity-九十有余" class="entity-link" target="_blank"><span class="time" title="时间">九十有余</span></a>。</p>

<p><a href="#pn-3.2" id="pn-3.2" class="para-num" title="点击复制链接">3.2</a> 咸表始终，当世<a href="../entities/institution.html#entity-仁义" class="entity-link" target="_blank"><span class="institution" title="制度">仁义</span></a>成功之著者也。</p>
